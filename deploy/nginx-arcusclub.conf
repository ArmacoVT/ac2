# Nginx конфигурация за Arcus Club (статичен сайт + Supabase в облака)
# Постави като: /etc/nginx/sites-available/arcusclub  и активирай със symlink в sites-enabled.
server {
    listen 80;
    listen [::]:80;
    server_name arcusclub.example.com;        # ← смени с твоя домейн (или IP за тест)

    root /var/www/arcusclub;                   # ← тук качваш съдържанието на arcus-club-web
    index index.html;

    # hash-рутирането на приложението не иска пренаписвания; раздаваме файловете директно
    location / {
        try_files $uri $uri/ =404;
    }

    # service worker да не се кешира (за да идват промените веднага)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # дълъг кеш за статичните ресурси
    location ~* \.(webp|png|svg|jpg|css|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
}
