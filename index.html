<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f6efe2" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>American College Arcus Club</title>
<link rel="icon" href="favicon.svg" />

<style>
  :root{
    /* Топла редакторска палитра (палитра A) */
    --bg:#f6efe2; --surface:#fffaf0; --surface2:#f7edda;
    --gold:#c8643c; --gold-bright:#d77a4f; --gold-soft:#b07a4a;
    --cream:#3a2c23; --text:#5a4a3c; --mid:#8a6f5c; --muted:#a8927c;
    --line:rgba(58,44,35,0.16); --line-soft:rgba(58,44,35,0.07);
    --oncolor:#fdf3e3; --medallion:#2e231b;
    --serif:'Cormorant Garamond',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(118px + env(safe-area-inset-bottom));}
  .topbar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;background:rgba(246,239,226,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .topbar .mark{font-family:var(--serif);color:var(--gold);font-size:18px;letter-spacing:2px;display:flex;align-items:center;gap:8px;cursor:pointer;}
  .topbar .mark img{width:32px;height:32px;background:var(--medallion);border-radius:50%;padding:6px;object-fit:contain;}
  .pill{border:none;border-radius:20px;padding:7px 14px;color:var(--gold);font-size:13px;letter-spacing:1px;cursor:pointer;background:var(--bg);
    box-shadow:3px 3px 7px #d9cdb6,-3px -3px 7px #fffdf4;}
  .pill:active{box-shadow:inset 2px 2px 5px #d9cdb6,inset -2px -2px 5px #fffdf4;transform:scale(.98);}
  .back{color:var(--gold);font-size:22px;cursor:pointer;line-height:1;padding-right:6px;}
  .hero{text-align:center;padding:34px 20px 10px;}
  .hero .ac2{width:92px;height:92px;margin:0 auto 14px;display:block;background:var(--medallion);border-radius:50%;padding:20px;object-fit:contain;}
  .hero h1{font-family:var(--serif);color:var(--cream);font-size:34px;font-weight:500;letter-spacing:2px;line-height:1.1;}
  .hero p{color:var(--mid);font-size:14px;margin-top:14px;line-height:1.55;padding:0 12px;}
  .hero-illu{display:block;width:min(360px,86%);margin:18px auto 0;}
  .sec-title{color:var(--gold);font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:24px 20px 2px;}
  .sec-sub{color:var(--muted);font-size:13px;padding:0 20px 10px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;}
  .grid{gap:16px;}
  .fcard{display:flex;flex-direction:column;min-height:178px;border-radius:22px;padding:16px;
    cursor:pointer;background:var(--bg);box-shadow:8px 8px 16px #d9cdb6,-8px -8px 16px #fffdf4;
    transition:box-shadow .25s,transform .2s;animation:fadeIn .45s ease both;}
  .fcard:active{box-shadow:inset 6px 6px 12px #d9cdb6,inset -6px -6px 12px #fffdf4;transform:scale(.99);}
  .fcard .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .fcard .well{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;
    background:var(--bg);box-shadow:inset 3px 3px 6px #d9cdb6,inset -3px -3px 6px #fffdf4;}
  .fcard .well svg{width:26px;height:26px;}
  .fcard .ac2{font-family:var(--serif);font-size:17px;opacity:.85;}
  .fcard .body{margin-top:auto;}
  .fcard .lab{font-size:10px;letter-spacing:2px;text-transform:uppercase;}
  .fcard h3{font-family:var(--serif);color:var(--cream);font-size:25px;font-weight:500;line-height:1;margin-top:3px;}
  .fcard .body span{color:var(--mid);font-size:11px;margin-top:4px;display:block;}
  .fcard .evbadge{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--text);
    background:var(--bg);padding:5px 11px;border-radius:12px;box-shadow:3px 3px 7px #d9cdb6,-3px -3px 7px #fffdf4;}
  .fcard .evdot{width:8px;height:8px;border-radius:50%;animation:evp 1.8s ease-in-out infinite;}
  @keyframes evp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
  .grid .fcard:nth-child(2){animation-delay:.05s}.grid .fcard:nth-child(3){animation-delay:.1s}
  .grid .fcard:nth-child(4){animation-delay:.15s}.grid .fcard:nth-child(5){animation-delay:.2s}
  .grid .fcard:nth-child(6){animation-delay:.25s}.grid .fcard:nth-child(7){animation-delay:.3s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .tile{background:var(--bg);border-radius:16px;padding:18px;text-align:center;cursor:pointer;
    box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;transition:box-shadow .2s,transform .15s;}
  .tile:active{box-shadow:inset 5px 5px 10px #d9cdb6,inset -5px -5px 10px #fffdf4;transform:scale(.99);}
  .tile .ic{width:54px;height:54px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;
    background:var(--bg);box-shadow:inset 3px 3px 6px #d9cdb6,inset -3px -3px 6px #fffdf4;}
  .tile .ic svg{width:27px;height:27px;}
  .pill svg{width:17px;height:17px;display:block;}
  .tile .lb{color:var(--text);font-size:14px;margin-top:7px;}
  .contact{margin:32px 20px 0;border-top:1px solid var(--line-soft);padding:22px 0;text-align:center;color:var(--mid);font-size:14px;line-height:1.9;}
  .contact .tag{color:var(--gold);letter-spacing:2px;margin-bottom:8px;font-size:13px;}
  .page{padding:16px;}
  .banner{height:175px;border-radius:16px;border:1px solid var(--line);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .banner .ov{position:absolute;inset:0;background:rgba(26,20,16,.25);}
  .banner img{width:78px;height:78px;position:relative;}
  .banner h2{position:relative;font-family:var(--serif);color:var(--oncolor);font-size:26px;letter-spacing:2px;margin-top:6px;font-weight:500;}
  .fbanner{background:var(--bg);border-radius:18px;padding:12px 12px 6px;text-align:center;box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;}
  .fbanner img{width:100%;max-width:360px;display:block;margin:0 auto;}
  .fbanner h2{font-family:var(--serif);font-size:25px;letter-spacing:1px;font-weight:500;margin:2px 0 8px;}
  .bul{display:flex;gap:11px;padding:7px 4px;}
  .bul .d{color:var(--gold-soft);font-size:10px;margin-top:6px;}
  .bul .x{color:var(--text);font-size:16px;line-height:1.4;}
  .btn{display:block;width:100%;background:var(--gold);color:#fff7ea;border:none;border-radius:14px;padding:15px;
    font-size:16px;font-weight:600;letter-spacing:1px;cursor:pointer;font-family:inherit;text-align:center;
    box-shadow:6px 6px 14px #d9cdb6,-6px -6px 14px #fffdf4;transition:box-shadow .2s,transform .12s;}
  .btn:active{box-shadow:inset 4px 4px 9px rgba(120,45,20,.35),inset -2px -2px 6px rgba(255,255,255,.15);transform:scale(.99);}
  .btn-ghost{background:var(--bg);color:var(--gold);box-shadow:6px 6px 14px #d9cdb6,-6px -6px 14px #fffdf4;margin-top:11px;}
  label{display:block;color:var(--mid);font-size:13px;margin:0 0 6px;}
  input,select,textarea{width:100%;background:var(--bg);border:none;border-radius:12px;
    padding:14px;color:var(--cream);font-size:16px;font-family:inherit;margin-bottom:14px;
    box-shadow:inset 4px 4px 8px #d9cdb6,inset -4px -4px 8px #fffdf4;}
  input:focus,select:focus,textarea:focus{outline:none;box-shadow:inset 5px 5px 10px #d9cdb6,inset -5px -5px 10px #fffdf4;}
  .ev{background:var(--bg);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;}
  .ev .t{color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
  .ev h3{color:var(--cream);font-size:17px;font-weight:500;margin-top:6px;line-height:1.3;}
  .ev .m{color:var(--muted);font-size:13px;margin-top:6px;}
  .ev .row{display:flex;gap:9px;margin-top:13px;}
  .ev .suggest{display:flex;align-items:center;gap:11px;margin-top:13px;padding:11px 13px;border-radius:13px;cursor:pointer;
    background:var(--bg);box-shadow:inset 3px 3px 6px #d9cdb6,inset -3px -3px 6px #fffdf4;}
  .ev .suggest .si{color:#2f6b63;display:flex;flex:none;}
  .ev .suggest .si svg{width:24px;height:24px;}
  .ev .suggest b{display:block;color:var(--cream);font-size:13px;font-weight:500;}
  .ev .suggest small{color:var(--muted);font-size:11px;}
  .ev .suggest .ar{margin-left:auto;color:var(--gold);font-size:20px;}
  .ev .bookform{display:none;margin-top:12px;}
  .ev .bookform.open{display:block;animation:fadeIn .25s ease;}
  .ev .bookform label{margin-bottom:6px;}
  .ev .bookform .bookrow{display:flex;gap:9px;align-items:center;}
  .ev .bookform .bookrow input{margin:0;width:90px;}
  .ev .bookform .bookrow .btn{margin:0;width:auto;padding:12px 20px;font-size:14px;}
  .ev .bookform small{display:block;color:var(--muted);font-size:11px;margin-top:7px;}
  .chip{border:none;border-radius:20px;padding:8px 15px;font-size:13px;color:var(--gold);background:var(--bg);cursor:pointer;
    box-shadow:4px 4px 9px #d9cdb6,-4px -4px 9px #fffdf4;}
  .chip.on{background:var(--gold);color:#fff7ea;font-weight:600;box-shadow:inset 3px 3px 6px rgba(120,45,20,.3),inset -2px -2px 5px rgba(255,255,255,.2);}
  .chip.ghost{box-shadow:none;color:var(--mid);background:transparent;}
  .mcard{background:var(--bg);border-radius:16px;margin-bottom:14px;overflow:hidden;box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;}
  .panel{background:var(--bg);border-radius:18px;box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;}
  .mhead{display:flex;justify-content:space-between;align-items:center;padding:17px;cursor:pointer;}
  .mhead h3{font-family:var(--serif);color:var(--cream);font-size:20px;font-weight:500;letter-spacing:1px;}
  .mhead .tg{color:var(--gold);font-size:12px;letter-spacing:1px;margin-top:3px;}
  .mhead .cv{color:var(--gold);font-size:26px;font-weight:300;}
  .mbody{padding:0 17px 17px;}
  .mbody p{color:var(--text);font-size:14px;line-height:1.5;margin-bottom:13px;}
  .mbody .bl{color:var(--gold-soft);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .selrow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--bg);
    color:var(--cream);padding:12px 22px;border-radius:24px;font-size:14px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;
    box-shadow:6px 6px 14px #d9cdb6,-6px -6px 14px #fffdf4;}
  .toast.show{opacity:1;}
  .tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));
    width:min(94%,500px);display:flex;padding:6px;border-radius:34px;
    background:rgba(241,232,214,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    box-shadow:0 12px 30px rgba(58,44,35,.25),inset 0 1px 0 rgba(255,255,255,.7);
    transition:transform .35s cubic-bezier(.2,.7,.2,1),opacity .35s;}
  .tabbar.mini{transform:translateX(-50%) scale(.86) translateY(8px);opacity:.8;}
  .tabbar a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 7px;color:var(--muted);font-size:9.5px;text-decoration:none;cursor:pointer;transition:color .2s;}
  .tabbar a .ti{display:flex;align-items:center;justify-content:center;}
  .tabbar a .ti svg{width:23px;height:23px;}
  .tabbar a.active{color:var(--gold);}
  .tabbar a.active .ti{background:#f1e8d6;border-radius:50%;box-shadow:3px 3px 6px #d3c6ad,-3px -3px 6px #fff;padding:7px;margin-top:-2px;}
  @keyframes ac2In{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
  @keyframes ringDraw{from{opacity:0;transform:scale(.55);}to{opacity:1;transform:scale(1);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(200,100,60,0);}50%{box-shadow:0 0 26px 3px rgba(200,100,60,.22);}}
  .gate{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 26px;text-align:center;}
  .gate .ring{width:132px;height:132px;background:var(--medallion);border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;padding:14px;box-sizing:border-box;animation:ringDraw 1.2s cubic-bezier(.2,.7,.2,1) both,glow 3.4s ease 1.2s infinite;}
  .gate .ring img{width:86px;height:64px;object-fit:contain;animation:ac2In 1.2s ease .15s both;}
  .gate h1{font-family:var(--serif);color:var(--cream);font-size:30px;font-weight:500;letter-spacing:2px;margin-top:24px;line-height:1.15;animation:fadeUp .8s ease .55s both;}
  .gate .sub{color:var(--mid);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-top:12px;animation:fadeUp .8s ease .75s both;}
  .gate .form{width:100%;max-width:330px;margin-top:30px;animation:fadeUp .9s ease 1.05s both;}
  .gate.ready .ring,.gate.ready .ring img,.gate.ready h1,.gate.ready .sub,.gate.ready .form{animation:none;}
  .gate.ready .ring{box-shadow:0 0 22px 1px rgba(200,100,60,.16);}
  .pwov{position:fixed;inset:0;background:rgba(58,44,35,.38);display:flex;align-items:center;justify-content:center;z-index:99;}
  .pwcard{background:var(--bg);border-radius:22px;padding:22px;width:min(90%,340px);
    box-shadow:9px 9px 18px #d9cdb6,-9px -9px 18px #fffdf4;}
  .pwcard h3{font-family:var(--serif);color:var(--cream);font-size:21px;font-weight:500;margin-bottom:14px;text-align:center;}
  .pwcard .pwerr{color:#b5532f;font-size:12px;min-height:16px;margin:2px 0 8px;text-align:center;}
</style>
</head>

function eventCard(e){
  const on=saved.includes(e.id);
  const fav=`<button class="chip ${on?'on':''}" onclick="event.stopPropagation();toggleSave('${e.id}')">${on?'♥':'♡'} ${tr('fav')}</button>`;
  const book=`<button class="chip" onclick="event.stopPropagation();toggleBook('${e.id}')">${tr('ticket')}</button>`;
  const seats=user?(MEMBERS.find(m=>m.id===user.membership)?.seats||1):1;
  const form=`<div class="bookform" id="bk_${e.id}">
    <label>${tr('party')}</label>
    <div class="bookrow"><input id="bp_${e.id}" type="number" min="1" max="${seats}" value="2"/>
      <button class="btn" onclick="event.stopPropagation();confirmBook('${e.id}')">${tr('send')}</button></div>
    <small>${lang==='bg'?'до':'up to'} ${seats} ${tr('seats')} · ${lang==='bg'?'според членството':'per your membership'}</small></div>`;
  const suggest=endsEarly(e)?`<div class="suggest" onclick="event.stopPropagation();go('reserve?f=table')">
    <span class="si">${ICN.reserve}</span><div><b>${tr('tableSuggest')}</b><small>${tr('afterEvent')} · ${e.ends}</small></div><span class="ar">›</span></div>`:'';
  return `<div class="ev"><div class="t">${e.format}</div><h3>${esc(e.title)}</h3><div class="m">${evMeta(e)}</div>

}

function toggleBook(id){
  if(!user){needLogin();return;}
  const f=document.getElementById('bk_'+id); if(f)f.classList.toggle('open');
}
async function confirmBook(id){
  if(!user){needLogin();return;}
  const e=EVENTS.find(x=>x.id===id); if(!e)return;
  const inp=document.getElementById('bp_'+id); const n=parseInt((inp&&inp.value)||'1',10);
  const seats=MEMBERS.find(m=>m.id===user.membership)?.seats||1;
  if(n<1){toast(tr('party'));return;}
  if(n>seats){toast((lang==='bg'?'Максимум ':'Max ')+seats+' '+tr('seats'));return;}
  await DB.addReservation({event_id:e.id,fmt:e.format,place:e.title,date:e.date,time:e.time,party:n,note:'Билет / ticket'});
  const f=document.getElementById('bk_'+id); if(f)f.classList.remove('open');
  toast(tr('ticketToast'));
}
function streamEmbed(u){
  if(!u)return '';
  let m;
  if((m=u.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/|youtube\.com\/live\/)([\w-]{6,})/)))return 'https://www.youtube.com/embed/'+m[1]+'?autoplay=1';
  if((m=u.match(/vimeo\.com\/(\d+)/)))return 'https://player.vimeo.com/video/'+m[1]+'?autoplay=1';
  return u;
}
function liveView(){
  const liveOnes=EVENTS.filter(e=>e.is_live&&e.stream_url&&canAccess(e));
  let body;
  if(liveOnes.length){
    body=liveOnes.map(e=>`<div class="ev" style="border-color:#d98b6e;">
      <div class="t" style="color:#d98b6e;">● ${tr('liveTag')} · ${e.format}</div>

      <div style="position:relative;padding-top:56.25%;margin-top:12px;border-radius:10px;overflow:hidden;background:#000;">
        <iframe src="${esc(streamEmbed(e.stream_url))}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen
          style="position:absolute;inset:0;width:100%;height:100%;border:0;"></iframe></div>
      <div class="row" style="margin-top:10px;"><a class="chip ghost" href="${esc(e.stream_url)}" target="_blank" rel="noopener">${tr('openExt')}</a></div>
    </div>`).join('');

    const up=EVENTS.filter(canAccess).filter(e=>e.date).sort((a,b)=>a.date<b.date?-1:1)[0];

    if(up)body+=`<div class="sec-title" style="padding:14px 0 8px;">${tr('nextUp')}</div>
      <div class="ev"><div class="t">${up.format}</div><h3>${esc(up.title)}</h3><div class="m">${evMeta(up)}</div></div>`;
  }
  return topbar(tr('live'))+`<div class="page">${body}</div>`;
}

      <p>${tx(m.d)}</p><div class="bl">${tr('benefits')}</div>
      ${tx(m.bn).map(b=>`<div class="bul"><span class="d">◆</span><span class="x" style="font-size:14px;">${b}</span></div>`).join('')}</div></div>`).join('');
  return topbar(tr('membership'))+`<div class="page"><p style="color:var(--mid);font-size:14px;line-height:1.5;margin-bottom:14px;">${tr('memIntro')}</p>${list}</div>`;
}
function toggleMem(i){const b=document.getElementById('mb'+i),c=document.getElementById('cv'+i);
  const open=b.style.display==='block';b.style.display=open?'none':'block';c.textContent=open?'+':'−';}
function reserve(q){
  const pre=new URLSearchParams(q).get('f')||'table';
  const seats=user?(MEMBERS.find(m=>m.id===user.membership)?.seats||1):4;
  let sel=FORMATS.map(f=>`<button type="button" class="chip ${f.id===pre?'on':''}" onclick="selFmt(this)" data-f="${f.id}">${f.t.replace('AC² ','')}</button>`).join('');
  const memInfo=user?`<p style="color:var(--muted);font-size:12px;margin:6px 0 16px;">${tr('memb')}: ${MEMBERS.find(m=>m.id===user.membership)?.t||'Guest'} · ${lang==='bg'?'до':'up to'} ${seats} ${tr('seats')}</p>`
    :`<div class="ev" style="border-color:var(--gold-soft);margin:10px 0 16px;"><h3 style="font-size:15px;">${tr('signinSave')}</h3><div class="row"><button class="chip on" onclick="go('login')">${tr('signin')}</button></div></div>`;
  return topbar(tr('reserve'))+`<div class="page">
    <h2 style="font-family:var(--serif);color:var(--cream);font-size:24px;font-weight:500;">${tr('resTitle')}</h2>
    ${memInfo}
    <label>${tr('format')}</label><div class="selrow" id="fmtsel">${sel}</div>
    <label>${tr('place')}</label><input id="r_place" placeholder="Trapezna"/>
    <label>${tr('date')}</label><input id="r_date" type="date"/>
    <label>${tr('time')}</label><input id="r_time" placeholder="19:30"/>
    <label>${tr('party')}</label><input id="r_party" type="number" value="2" min="1" max="${seats}"/>
    <label>${tr('note')}</label><textarea id="r_note" rows="2"></textarea>
    <button class="btn" onclick="sendRes(${seats})">${tr('send')}</button></div>`;
}
let pickedFmt=null;
function selFmt(b){document.querySelectorAll('#fmtsel .chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');pickedFmt=b.dataset.f;}
async function sendRes(seats){
  if(!user){needLogin();return;}
  const n=parseInt(document.getElementById('r_party').value||'0',10);
  if(n<1){toast(tr('party'));return;}
  if(n>seats){toast((lang==='bg'?'Максимум ':'Max ')+seats+' '+tr('seats'));return;}
  const fmt=pickedFmt||document.querySelector('#fmtsel .chip.on')?.dataset.f||'table';
  await DB.addReservation({fmt,place:document.getElementById('r_place').value,date:document.getElementById('r_date').value,
    time:document.getElementById('r_time').value,party:n,note:document.getElementById('r_note').value});
  toast(tr('resToast'));setTimeout(()=>go('profile'),700);
}
let entered=false;
function gate(){
  const live=DB.live;
  const su=loginMode==='signup';
  const memChips=MEMBERS.concat([{id:'guest',t:'Guest'}]).map(m=>`<button type="button" class="chip ${pickedMem===m.id?'on':''}" onclick="pickMem(this)" data-m="${m.id}">${m.t}</button>`).join('');
  const fields=live
    ? `<input id="l_email" type="email" autocapitalize="none" autocomplete="username" placeholder="${tr('email')}" onkeydown="if(event.key==='Enter')doAuth()"/>
       <input id="l_pass" type="password" autocomplete="current-password" placeholder="${tr('pass')}" onkeydown="if(event.key==='Enter')doAuth()"/>
       <button class="btn" onclick="doAuth()">${tr('enter')}</button>
       <div style="margin-top:14px;"><a style="color:var(--gold);font-size:13px;cursor:pointer;" onclick="doForgot()">${tr('forgot')}</a></div>
       <div style="margin-top:10px;color:var(--muted);font-size:12px;">${tr('inviteOnly')}</div>`
    : `<input id="l_user" autocapitalize="none" autocomplete="username" placeholder="${tr('uname')}" onkeydown="if(event.key==='Enter')doAuth()"/>
       <input id="l_pass" type="password" autocomplete="current-password" placeholder="${tr('pass')}" onkeydown="if(event.key==='Enter')doAuth()"/>
       <button class="btn" onclick="doAuth()">${tr('enter')}</button>
       <div style="margin-top:14px;color:var(--muted);font-size:12px;">${lang==='bg'?'Демо достъп':'Demo access'}: <span style="color:var(--gold);">admin / admin</span></div>`;
  return `<div class="gate${entered?' ready':''}">
    <div style="position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;"><button class="pill" onclick="toggleLang()">${lang==='bg'?'EN':'BG'}</button></div>
    <div class="ring"><img src="${AC2}" alt="AC²"/></div>
    <h1>American College<br>Arcus Club</h1>
    <div class="sub">${su?tr('signupTitle'):(lang==='bg'?'Вход за членове':'Members’ entrance')}</div>
    <div class="form">${fields}</div></div>`;
}
let pickedMem='guest';
function pickMem(b){document.querySelectorAll('#memsel .chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');pickedMem=b.dataset.m;}
function switchMode(){loginMode=loginMode==='login'?'signup':'login';route();}
async function doAuth(){
  if(DB.live){
    const email=(document.getElementById('l_email').value||'').trim();
    const pass=document.getElementById('l_pass').value||'';
    if(!email||!pass){toast(tr('email'));return;}
    if(loginMode==='signup'){
      const uname=(document.getElementById('l_user').value||'').trim();
      const {error}=await DB.signUp(email,pass,uname,pickedMem);
      if(error){toast(error.message);return;}
    }else{
      const {error}=await DB.signIn(email,pass);
      if(error){toast((lang==='bg'?'Грешка: ':'Error: ')+error.message);return;}
    }
  }else{
    const u=document.getElementById('l_user').value,p=document.getElementById('l_pass').value;
    if(!DB.demoLogin(u,p)){toast(lang==='bg'?'Грешно име или парола':'Wrong username or password');return;}
  }
  user=await DB.getUser();
  if(!user){toast(lang==='bg'?'Потвърди имейла си и влез':'Confirm your email, then sign in');return;}
  saved=await DB.listSaved();EVENTS=await DB.listEvents();
  toast(tr('loginToast'));location.hash='';route();
}
async function doForgot(){
  if(!DB.live){toast(tr('demoOnlyLive'));return;}
  const email=(document.getElementById('l_email')?.value||'').trim();
  if(!email){toast(tr('enterEmail'));return;}
  const {error}=await DB.resetPassword(email);
  if(error){toast(error.message);return;}
  toast(tr('resetSent'));
}
function askNewPassword(title,requireCurrent){
  return new Promise(res=>{
    const ov=document.createElement('div');ov.className='pwov';
    ov.innerHTML=`<div class="pwcard"><h3>${title||tr('newPassTitle')}</h3>
      ${requireCurrent?`<input id="pw0" type="password" placeholder="${tr('currentPass')}" autocomplete="current-password"/>`:''}
      <input id="pw1" type="password" placeholder="${tr('newPassTitle')}" autocomplete="new-password"/>
      <input id="pw2" type="password" placeholder="${tr('passConfirm')}" autocomplete="new-password"/>
      <div class="pwerr" id="pwerr"></div>
      <button class="btn" id="pwok">${tr('pwSave')}</button>
      <button class="btn btn-ghost" id="pwcancel">${tr('cancelBtn')}</button></div>`;
    document.body.appendChild(ov);
    ov.querySelector('#pwok').onclick=async ()=>{
      const a=ov.querySelector('#pw1').value,b=ov.querySelector('#pw2').value,err=ov.querySelector('#pwerr');
      if(a.length<6){err.textContent=tr('passShort');return;}
      if(a!==b){err.textContent=tr('passMismatch');return;}
      if(requireCurrent){
        const cur=ov.querySelector('#pw0').value;
        if(!cur){err.textContent=tr('currentPass');return;}
        err.textContent=tr('checking');
        const {error}=await DB.signIn(user.email,cur);
        if(error){err.textContent=tr('wrongCurrent');return;}
      }
      ov.remove();res(a);
    };
    ov.querySelector('#pwcancel').onclick=()=>{ov.remove();res(null);};
  });
}
async function changePass(){
  if(!DB.live){toast(tr('demoOnlyLive'));return;}
  const p=await askNewPassword(tr('changePass'),true);
  if(!p)return;
  const {error}=await DB.updatePassword(p);
  if(error){toast(error.message);return;}
  toast(tr('passChanged'));
}
function profile(){
  if(!user)return gate();
  const m=MEMBERS.find(x=>x.id===user.membership);
  const seats=m?m.seats:1;
  const sev=saved.map(id=>EVENTS.find(e=>e.id===id)).filter(Boolean);
  const res=RES;
  return topbar(tr('profile'))+`<div class="page">
    <div class="panel" style="padding:22px;text-align:center;">
      <div style="color:var(--cream);font-size:22px;font-family:var(--serif);">${esc(user.username||user.email)}</div>
      <div style="display:inline-block;margin-top:8px;border:1px solid var(--gold);border-radius:20px;padding:5px 16px;color:var(--gold);font-size:13px;letter-spacing:2px;text-transform:uppercase;">${m?m.t:'Guest'}</div>
      <div style="color:var(--mid);font-size:13px;margin-top:12px;">${tr('allow')}: <b style="color:var(--text);">${seats}</b></div>
      <div style="color:var(--mid);font-size:12px;margin-top:6px;">${EVENTS.filter(canAccess).length} ${lang==='bg'?'налични събития':'available events'}</div></div>
    <div class="sec-title" style="padding:24px 0 8px;">${tr('myEvents')}</div>
    ${sev.length?sev.map(e=>`<div class="ev" style="margin-bottom:8px;"><h3 style="font-size:15px;">${esc(e.title)}</h3><div class="m">${evMeta(e)}</div></div>`).join(''):`<p style="color:var(--muted);font-style:italic;">${tr('noEvents')}</p>`}
    <div class="sec-title" style="padding:22px 0 8px;">${tr('myRes')}</div>
    ${res.length?res.map(r=>{
      const SL={requested:lang==='bg'?'чакаща':'pending',confirmed:lang==='bg'?'одобрена':'approved',declined:lang==='bg'?'отказана':'declined',cancelled:lang==='bg'?'отменена':'cancelled'};
      const SC={confirmed:'#4f7a43',declined:'#b5532f'};
      const dEu=r.date?r.date.split('-').reverse().join('.'):'';
      return `<div class="ev" style="margin-bottom:8px;"><h3 style="font-size:15px;">${esc(r.place||r.fmt)} · ${r.party} ${tr('seats')}</h3><div class="m">${dEu} — <b style="color:${SC[r.status]||'var(--muted)'};">${SL[r.status]||r.status}</b></div></div>`;}).join(''):`<p style="color:var(--muted);font-style:italic;">${tr('noRes')}</p>`}
    ${DB.live?`<button class="btn btn-ghost" style="margin-top:26px;" onclick="changePass()">${tr('changePass')}</button>`:''}
    <button class="btn btn-ghost" style="margin-top:12px;" onclick="signout()">${tr('signout')}</button></div>`;
}
async function signout(){await DB.signOut();user=null;saved=[];RES=[];go('');}
function tabbar(active){
  const items=[['','home',tr('home')],['events','events',tr('events')],['live','live',tr('live')],['reserve','reserve',tr('reserve')],['membership','membership',tr('membership')],[user?'profile':'login','profile',user?tr('profile'):tr('signin')]];
  document.getElementById('tabbar').innerHTML=items.map(i=>`<a onclick="go('${i[0]}')" class="${active===(i[0]||'home')?'active':''}"><span class="ti">${ICN[i[1]]}</span>${i[2]}</a>`).join('');
}
async function route(){
  const tb=document.getElementById('tabbar');
  if(!user){
    app.innerHTML=gate();window.scrollTo(0,0);tb.style.display='none';entered=true;return;
  }
  tb.style.display='flex';
  const raw=location.hash.replace(/^#/,'');
  const [path,q]=raw.split('?');
  if(path!=='events')previewAs=null;
  const parts=path.split('/');
  if(['','home','events','profile','live'].includes(path)||parts[0]==='format'){ try{EVENTS=await DB.listEvents();saved=await DB.listSaved();}catch(e){} }
  if(path==='profile'){ try{RES=await DB.listReservations();}catch(e){RES=[];} }
  let html,active='home';
  if(path===''||path==='home'){html=home();active='home';}
  else if(parts[0]==='format'){html=formatPage(parts[1]);active='home';}
  else if(path==='events'){html=events();active='events';}
  else if(path==='live'){html=liveView();active='live';}
  else if(path==='reserve'){html=reserve(q||'');active='reserve';}
  else if(path==='membership'){html=membership();active='membership';}
  else if(path==='profile'){html=profile();active='profile';}
  else{html=home();}
  app.innerHTML=html;window.scrollTo(0,0);tabbar(active);
}
window.addEventListener('hashchange',()=>{loginMode='login';route();});
document.documentElement.lang=lang;
// долната лента се смалява при скрол и се връща при покой (като Instagram)
let tbTimer;
window.addEventListener('scroll',()=>{
  const tb=document.getElementById('tabbar');
  if(!tb||tb.style.display==='none')return;
  tb.classList.add('mini');
  clearTimeout(tbTimer);
  tbTimer=setTimeout(()=>tb.classList.remove('mini'),280);
},{passive:true});
// жест: плъзване от левия ръб надясно → назад
let swX=null,swY=null;
window.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  if(t.clientX<30){swX=t.clientX;swY=t.clientY;}else{swX=null;}
},{passive:true});
window.addEventListener('touchend',e=>{
  if(swX===null)return;
  const t=e.changedTouches[0];
  if((t.clientX-swX)>70&&Math.abs(t.clientY-swY)<70)history.back();
  swX=null;
},{passive:true});
// едно общо прозорче за първа/нова парола — пази се да не се покаже два пъти
let pwPrompted=false;
async function promptInitialPassword(){
  if(pwPrompted)return; pwPrompted=true;
  const isInvite=DB.urlType==='invite';
  const p=await askNewPassword(isInvite?tr('setPassTitle'):tr('newPassTitle'));
  if(p){const r=await DB.updatePassword(p);toast(r&&r.error?r.error.message:(isInvite?tr('passSet'):tr('passChanged')));}
}
DB.onRecovery(promptInitialPassword);
(async function(){
  try{ user=await DB.getUser(); if(user){saved=await DB.listSaved();EVENTS=await DB.listEvents();} }catch(e){}
  // дошъл от имейл-покана → задава си парола веднага (с потвърждение)
  if(user&&(DB.urlType==='invite'||DB.urlType==='recovery')) await promptInitialPassword();
  route();
  // известие в приложението при одобрена/отказана резервация
  if(user){try{
    RES=await DB.listReservations();
    const seen=JSON.parse(localStorage.getItem('acac_seen_res')||'{}');
    let changed=null;
    RES.forEach(r=>{ if(seen[r.id]&&seen[r.id]!==r.status&&(r.status==='confirmed'||r.status==='declined'))changed=r; seen[r.id]=r.status; });
    localStorage.setItem('acac_seen_res',JSON.stringify(seen));
    if(changed){const ok=changed.status==='confirmed';
      setTimeout(()=>toast(ok?(lang==='bg'?'✓ Резервацията ви е одобрена':'✓ Your reservation was approved'):(lang==='bg'?'Резервацията ви е отказана':'Your reservation was declined')),900);}
  }catch(e){}}
})();
</script>
