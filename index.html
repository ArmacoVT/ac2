<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<!-- Sentry — мониторинг на грешки (зарежда се рано, за да улавя всичко) -->
<script src="https://js-de.sentry-cdn.com/e5ac0f5176655a8ad5d8c2cf1447a7c6.min.js" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f6efe2" />
<script>(function(){try{if(localStorage.getItem('acac_textbig')==='1')document.documentElement.style.zoom='1.15';}catch(e){}})();</script>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>American College Arcus Club</title>
<link rel="icon" href="favicon.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://twcxfqgknhqicxqghcrx.supabase.co" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Топла редакторска палитра (палитра A) */
    --bg:#f6efe2; --surface:#fffaf0; --surface2:#f7edda;
    --gold:#c8643c; --gold-bright:#d77a4f; --gold-soft:#b07a4a;
    --cream:#3a2c23; --text:#5a4a3c; --mid:#8a6f5c; --muted:#a8927c;
    --line:rgba(58,44,35,0.16); --line-soft:rgba(58,44,35,0.07);
    --oncolor:#fdf3e3; --medallion:#2e231b;
    --serif:'Cormorant Garamond',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(118px + env(safe-area-inset-bottom));}
  .topbar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;background:rgba(246,239,226,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .topbar .mark{font-family:var(--serif);color:var(--gold);font-size:18px;letter-spacing:2px;display:flex;align-items:center;gap:8px;cursor:pointer;}
  .topbar .mark img{width:32px;height:32px;background:var(--medallion);border-radius:50%;padding:3px;object-fit:contain;}
  .pill{border:none;border-radius:20px;padding:7px 14px;color:var(--gold);font-size:13px;letter-spacing:1px;cursor:pointer;background:var(--bg);
    box-shadow:3px 3px 7px #d9cdb6,-3px -3px 7px #fffdf4;}
  .pill:active{box-shadow:inset 2px 2px 5px #d9cdb6,inset -2px -2px 5px #fffdf4;transform:scale(.98);}
  .back{color:var(--gold);font-size:22px;cursor:pointer;line-height:1;padding-right:6px;}
  .hero{text-align:center;padding:34px 20px 10px;}
  .hero .ac2{width:92px;height:92px;margin:0 auto 14px;display:block;background:var(--medallion);border-radius:50%;padding:12px;object-fit:contain;}
  .hero h1{font-family:var(--serif);color:var(--cream);font-size:34px;font-weight:500;letter-spacing:2px;line-height:1.1;}
  .hero p{color:var(--mid);font-size:14px;margin-top:14px;line-height:1.55;padding:0 12px;}
  .hero-illu{display:block;width:min(360px,86%);margin:18px auto 0;}
  .sec-title{color:var(--gold);font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:24px 20px 2px;}
  .resday{color:var(--mid);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:capitalize;margin:14px 0 8px;border-left:3px solid var(--gold-soft);padding:2px 0 2px 10px;}
  .daybody{animation:fadeIn .2s ease;}
  .memcard{position:relative;border-radius:20px;padding:20px;color:#f3e8d0;overflow:hidden;
    background:linear-gradient(135deg,#4a3a2e 0%,#2e241d 60%,#3b2c22 100%);box-shadow:7px 7px 16px #d9cdb6,-7px -7px 16px #fffdf4;}
  .memcard .mc-top{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#cbb389;}
  .memcard .mc-top img{width:26px;height:26px;border-radius:6px;}
  .memcard .mc-name{font-family:var(--serif);font-size:23px;margin-top:18px;color:#fbf3e2;}
  .memcard .mc-lvl{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#d8b878;margin-top:3px;}
  .memcard .mc-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:18px;}
  .memcard .mc-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#a9906c;}
  .memcard .mc-val{font-size:15px;color:#f3e8d0;letter-spacing:1px;}
  .memcard .mc-qr{width:64px;height:64px;border-radius:8px;background:#43352b;padding:3px;}
  .evposter{width:100%;border-radius:12px;margin-bottom:12px;display:block;object-fit:cover;max-height:240px;}
  .evvideo{width:100%;border-radius:12px;margin:10px 0 4px;display:block;background:#000;max-height:300px;}
  .sec-sub{color:var(--muted);font-size:13px;padding:0 20px 10px;}
  /* Предстоящи — програма (timeline) във вдълбано поле */
  .fcard.dim{opacity:.5;}
  .upbox{margin:0 20px;background:var(--bg);border-radius:16px;padding:16px 16px 8px;box-shadow:inset 5px 5px 11px #d6c9b1, inset -5px -5px 11px #fffdf6;}
  .uptl{position:relative;}
  .uptl::before{content:"";position:absolute;left:55px;top:6px;bottom:16px;width:2px;background:var(--line);}
  .uprow{position:relative;padding-left:60px;margin-bottom:16px;cursor:pointer;}
  .uprow:last-child{margin-bottom:8px;}
  .uprow .udt{position:absolute;left:0;top:-1px;width:42px;text-align:right;line-height:1;}
  .uprow .udt .d{font-family:var(--serif);font-size:20px;color:var(--cream);}
  .uprow .udt .mo{font-size:10px;color:var(--muted);margin-top:2px;}
  .uprow .upt{position:absolute;left:50px;top:5px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg);box-sizing:border-box;}
  .uprow h4{font-family:var(--serif);font-size:16px;color:var(--cream);margin:0 0 2px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .uprow .umt{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* Новини от клуба — вдълбана карта, без лого */
  .newswrap{padding:0 20px;}
  .newscard{position:relative;background:var(--bg);border-radius:16px;padding:14px 16px;margin-bottom:12px;
    box-shadow:inset 5px 5px 11px #d6c9b1, inset -5px -5px 11px #fffdf6;}
  .newscard .nrow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .newscard h3{color:var(--cream);font-size:17px;margin:0;font-family:var(--serif,Georgia,serif);font-weight:600;line-height:1.25;display:flex;align-items:center;gap:8px;min-width:0;}
  .newscard .ntext{color:var(--text);font-size:13px;line-height:1.5;margin-top:5px;white-space:pre-wrap;}
  .newscard .ndate{color:var(--muted);font-size:12px;white-space:nowrap;flex:none;}
  .newsdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);flex:none;animation:newsBlink 1.2s ease-in-out infinite;}
  @keyframes newsBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.75)}}
  .newcount{color:var(--gold-bright);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;}
  .grid{gap:16px;}
  .fcard{display:flex;flex-direction:column;min-height:178px;border-radius:22px;padding:16px;
    cursor:pointer;background:var(--bg);box-shadow:8px 8px 16px #d9cdb6,-8px -8px 16px #fffdf4;
    transition:box-shadow .25s,transform .2s;animation:fadeIn .45s ease both;}
  .fcard:active{box-shadow:inset 6px 6px 12px #d9cdb6,inset -6px -6px 12px #fffdf4;transform:scale(.99);}
  .fcard .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .fcard .well{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;
    background:var(--bg);box-shadow:inset 3px 3px 6px #d9cdb6,inset -3px -3px 6px #fffdf4;}
  .fcard .well svg{width:26px;height:26px;}
  .fcard .ac2{font-family:var(--serif);font-size:17px;opacity:.85;}
  .fcard .body{margin-top:auto;}
  .fcard .lab{font-size:10px;letter-spacing:2px;text-transform:uppercase;}
  .fcard h3{font-family:var(--serif);color:var(--cream);font-size:25px;font-weight:500;line-height:1;margin-top:3px;}
  .fcard .body span{color:var(--mid);font-size:11px;margin-top:4px;display:block;}
  .fcard .evbadge{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--text);
    background:var(--bg);padding:5px 11px;border-radius:12px;box-shadow:3px 3px 7px #d9cdb6,-3px -3px 7px #fffdf4;}
  .fcard .evdot{width:8px;height:8px;border-radius:50%;animation:evp 1.8s ease-in-out infinite;}
  @keyframes evp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
  .grid .fcard:nth-child(2){animation-delay:.05s}.grid .fcard:nth-child(3){animation-delay:.1s}
  .grid .fcard:nth-child(4){animation-delay:.15s}.grid .fcard:nth-child(5){animation-delay:.2s}
  .grid .fcard:nth-child(6){animation-delay:.25s}.grid .fcard:nth-child(7){animation-delay:.3s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  /* Splash / launch анимация */
  #splash{position:fixed;inset:0;z-index:5000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .5s ease;}
  #splash.gone{opacity:0;pointer-events:none;}
  #splash .sp-ring{width:128px;height:128px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    box-shadow:9px 9px 22px #d6c9b1,-9px -9px 22px #fffdf6;
    animation:spRing .9s cubic-bezier(.2,.8,.2,1) both;}
  #splash .sp-ring::after{content:"";position:absolute;width:128px;height:128px;border-radius:50%;border:2px solid var(--gold);
    opacity:0;animation:spPulse 1.8s ease-out .5s infinite;}
  #splash .sp-ring img{width:108px;height:auto;object-fit:contain;animation:spLogo 1s ease .15s both;}
  #splash .sp-name{margin-top:26px;font-family:var(--serif);font-size:22px;line-height:1.25;text-align:center;color:var(--cream);
    letter-spacing:.5px;opacity:0;animation:spName .8s ease .5s both;}
  @keyframes spRing{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  @keyframes spLogo{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes spName{0%{transform:translateY(8px);opacity:0}100%{transform:translateY(0);opacity:1}}
  @keyframes spPulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}
  /* Pull-to-refresh индикатор */
  #ptr{position:fixed;top:env(safe-area-inset-top,0px);left:50%;transform:translate(-50%,-46px);z-index:1500;width:34px;height:34px;border-radius:50%;
    background:var(--surface);box-shadow:0 4px 12px rgba(58,44,35,.18);display:flex;align-items:center;justify-content:center;
    transition:transform .2s ease,opacity .2s ease;opacity:0;color:var(--gold);}
  #ptr.show{opacity:1;}
  #ptr svg{width:18px;height:18px;}
  #ptr.spin svg{animation:ptrSpin .7s linear infinite;}
  @keyframes ptrSpin{to{transform:rotate(360deg)}}
  @keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
  @keyframes popIn{0%{transform:scale(.8)}55%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes shimmer{0%{background-position:-220px 0}100%{background-position:220px 0}}
  @keyframes appIn{from{opacity:.4}to{opacity:1}}
  #app.nav{animation:appIn .2s ease}
  .grid>*{animation:cardIn .4s ease backwards}
  .grid>*:nth-child(2){animation-delay:.05s}.grid>*:nth-child(3){animation-delay:.1s}
  .grid>*:nth-child(4){animation-delay:.15s}.grid>*:nth-child(5){animation-delay:.2s}
  .grid>*:nth-child(6){animation-delay:.25s}.grid>*:nth-child(7){animation-delay:.3s}.grid>*:nth-child(n+8){animation-delay:.35s}
  .page .ev{animation:cardIn .38s ease backwards}
  .chip.pop{animation:popIn .42s cubic-bezier(.3,1.5,.5,1)}
  .skel{border-radius:16px;height:96px;margin-bottom:14px;background:linear-gradient(90deg,var(--surface2) 25%,#efe6d3 37%,var(--surface2) 63%);background-size:400px 100%;animation:shimmer 1.2s infinite linear;}
  @media (prefers-reduced-motion:reduce){.grid>*,.page .ev,.chip.pop,#app.nav,.nb,.skel{animation:none!important}}
  .tile{background:var(--bg);border-radius:16px;padding:18px;text-align:center;cursor:pointer;
    box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;transition:box-shadow .2s,transform .15s;}
  .tile:active{box-shadow:inset 5px 5px 10px #d9cdb6,inset -5px -5px 10px #fffdf4;transform:scale(.99);}
  .tile .ic{width:54px;height:54px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;
    background:var(--bg);box-shadow:inset 3px 3px 6px #d9cdb6,inset -3px -3px 6px #fffdf4;}
  .tile .ic svg{width:27px;height:27px;}
  .pill svg{width:17px;height:17px;display:block;}
  .tile .lb{color:var(--text);font-size:14px;margin-top:7px;}
  .livedot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#e0301e;margin-right:6px;vertical-align:middle;
    box-shadow:0 0 0 0 rgba(224,48,30,.6);animation:heartbeat 1.4s ease-in-out infinite;}
  @keyframes heartbeat{
    0%{transform:scale(1);box-shadow:0 0 0 0 rgba(224,48,30,.55);}
    18%{transform:scale(1.35);}
    32%{transform:scale(1);}
    46%{transform:scale(1.25);}
    60%{transform:scale(1);box-shadow:0 0 0 9px rgba(224,48,30,0);}
    100%{transform:scale(1);box-shadow:0 0 0 0 rgba(224,48,30,0);}
  }
  @media (prefers-reduced-motion:reduce){.livedot{animation:none;}}
  .liveposter{position:relative;padding-top:56.25%;margin-top:12px;border-radius:10px;overflow:hidden;cursor:pointer;
    background:radial-gradient(circle at 50% 42%,#3a3330,#1a1614);}
  .liveposter .playbtn{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);width:62px;height:62px;border-radius:50%;
    background:rgba(224,48,30,.92);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;padding-left:4px;
    box-shadow:0 6px 18px rgba(0,0,0,.4);transition:transform .15s;}
  .liveposter:active .playbtn{transform:translate(-50%,-50%) scale(.93);}
  .liveposter .pl{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:#f6efe2;font-size:13px;letter-spacing:.4px;}
  .contact{margin:32px 20px 0;border-top:1px solid var(--line-soft);padding:22px 0;text-align:center;color:var(--mid);font-size:14px;line-height:1.9;}
  .contact .tag{color:var(--gold);letter-spacing:2px;margin-bottom:8px;font-size:13px;}
  .page{padding:16px;}
  .banner{height:175px;border-radius:16px;border:1px solid var(--line);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .banner .ov{position:absolute;inset:0;background:rgba(26,20,16,.25);}
  .banner img{width:78px;height:78px;position:relative;}
  .banner h2{position:relative;font-family:var(--serif);color:var(--oncolor);font-size:26px;letter-spacing:2px;margin-top:6px;font-weight:500;}
  .fbanner{background:var(--bg);border-radius:18px;padding:12px 12px 6px;text-align:center;box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;}
  .fbanner img{width:100%;max-width:360px;display:block;margin:0 auto;}
  .fbanner h2{font-family:var(--serif);font-size:25px;letter-spacing:1px;font-weight:500;margin:2px 0 8px;}
  .bul{display:flex;gap:11px;padding:7px 4px;}
  .bul .d{color:var(--gold-soft);font-size:10px;margin-top:6px;}
  .bul .x{color:var(--text);font-size:16px;line-height:1.4;}
  .btn{display:block;width:100%;background:var(--gold);color:#fff7ea;border:none;border-radius:14px;padding:15px;
    font-size:16px;font-weight:600;letter-spacing:1px;cursor:pointer;font-family:inherit;text-align:center;
    box-shadow:6px 6px 14px #d9cdb6,-6px -6px 14px #fffdf4;transition:box-shadow .2s,transform .12s;}
  .btn:active{box-shadow:inset 4px 4px 9px rgba(120,45,20,.35),inset -2px -2px 6px rgba(255,255,255,.15);transform:scale(.99);}
  .btn-ghost{background:var(--bg);color:var(--gold);box-shadow:6px 6px 14px #d9cdb6,-6px -6px 14px #fffdf4;margin-top:11px;}
  label{display:block;color:var(--mid);font-size:13px;margin:0 0 6px;}
  input,select,textarea{width:100%;background:var(--bg);border:none;border-radius:12px;
    padding:14px;color:var(--cream);font-size:16px;font-family:inherit;margin-bottom:14px;
    box-shadow:inset 4px 4px 8px #d9cdb6,inset -4px -4px 8px #fffdf4;}
  input:focus,select:focus,textarea:focus{outline:none;box-shadow:inset 5px 5px 10px #d9cdb6,inset -5px -5px 10px #fffdf4;}
  .ev{background:var(--bg);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:7px 7px 14px #d9cdb6,-7px -7px 14px #fffdf4;}
  .ev .t{color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
  .ev h3{color:var(--cream);font-size:17px;font-weight:500;margin-top:6px;line-height:1.3;}
  .ev .m{color:var(--muted);font-size:13px;margin-top:6px;}
  .ev .row{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px;}
  .ev .suggest{display:flex;align-items:center;gap:11px;margin-top:13px;padding:11px 13px;border-radius:13px;cursor:pointer;
    background:var(--bg);box-shadow:inset 3px 3px 6px #d9cdb6,inset -3px -3px 6px #fffdf4;}
  .ev .suggest .si{color:#2f6b63;display:flex;flex:none;}
  .ev .suggest .si svg{width:24px;height:24px;}
  .ev .suggest b{display:block;color:var(--cream);font-size:13px;font-weight:500;}
  .ev .suggest small{color:var(--muted);font-size:11px;}
  .ev .suggest .ar{margin-left:auto;color:var(--gold);font-size:20px;}
  .ev .bookform{display:none;margin-top:12px;}
  .ev .bookform.open{display:block;animation:fadeIn .25s ease;}
  .ev .bookform label{margin-bottom:6px;}
  .ev .bookform .bookrow{display:flex;gap:9px;align-items:center;}
  .ev .bookform .bookrow input{margin:0;width:90px;}
  .ev .bookform .bookrow .btn{margin:0;width:auto;padding:12px 20px;font-size:14px;}
  .ev .bookform small{display:block;color:var(--muted);font-size:11px;margin-top:7px;}
  .tableopt{margin-top:12px;padding:12px;border-radius:13px;background:var(--surface2);}
  .tcheck{display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin:0;}
  .tcheck input{width:auto;margin:2px 0 0;box-shadow:none;}
  .tcheck span{color:var(--text);font-size:14px;line-height:1.4;}
  .tcheck small{color:var(--muted);font-size:11px;}
  .tablebox{display:none;margin-top:10px;}
  /* Bottom sheet (плъзгащ панел отдолу) */
  .sheetbd{position:fixed;inset:0;background:rgba(40,30,22,.45);opacity:0;pointer-events:none;transition:opacity .28s ease;z-index:1800;}
  .sheetbd.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:1900;background:var(--bg);border-radius:24px 24px 0 0;
    padding:8px 20px calc(24px + env(safe-area-inset-bottom));transform:translateY(110%);
    transition:transform .34s cubic-bezier(.2,.8,.2,1);box-shadow:0 -8px 26px rgba(58,44,35,.22);max-height:86vh;overflow:auto;}
  .sheet.open{transform:translateY(0);}
  .sheet .handle{width:42px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 14px;}
  .sheet h3{font-family:var(--serif);font-size:22px;color:var(--cream);font-weight:500;margin:0 0 2px;}
  .sheet .ssub{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .sheet label{display:block;color:var(--mid);font-size:13px;margin:0 0 6px;}
  .qrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);}
  .qrow>span{font-size:15px;color:var(--text);}
  .qstep{display:flex;align-items:center;gap:18px;}

// хаптик (вибрация): native Capacitor Haptics на телефон, иначе Vibration API (Android браузър)
let _hap;
function hap(kind){
  try{
    const C=window.Capacitor;
    if(C&&C.isNativePlatform&&C.isNativePlatform()){
      if(_hap===undefined)_hap=(C.Plugins&&C.Plugins.Haptics)||(C.registerPlugin&&C.registerPlugin('Haptics'))||null;
      const H=_hap;
      if(H){
        if(kind==='success'&&H.notification)H.notification({type:'SUCCESS'});
        else if(kind==='warning'&&H.notification)H.notification({type:'WARNING'});
        else if(kind==='select'&&H.impact)H.impact({style:'LIGHT'});
        else if(H.impact)H.impact({style:kind==='medium'?'MEDIUM':'LIGHT'});
        return;
      }
    }
    if(navigator.vibrate)navigator.vibrate(kind==='success'?[8,30,8]:kind==='warning'?[25,25,25]:10);
  }catch(e){}
}

// минало ли е събитието (по крайна дата, ако има, иначе по началната)
function todayISO(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
const evEnd=e=>e.end_date||e.date||'';
const PAST_BUFFER_MS=2*3600000; // 2 часа след края → „Изминали"
function isPast(e){
  const ed=e.end_date||e.date; if(!ed)return false;
  const t=(e.ends&&/^\d{1,2}:\d{2}/.test(e.ends))?e.ends.slice(0,5):'23:59';
  const p=ed.split('-').map(Number),tt=t.split(':').map(Number);
  if(p.length<3)return false;
  return Date.now()>new Date(p[0],p[1]-1,p[2],tt[0]||0,tt[1]||0,0).getTime()+PAST_BUFFER_MS;
}
// дали стриймът е на живо сега: ръчно включен, или авто старт в часа на началото; спира при ръчно спиране или след деня
function isLiveNow(e){
  if(!e||!e.stream_url||e.live_ended||isPast(e))return false;
  if(e.is_live)return true;
  if(e.live_auto&&e.date){
    const t=(e.time&&/^\d{1,2}:\d{2}/.test(e.time))?e.time.slice(0,5):'00:00';
    const p=e.date.split('-').map(Number),tt=t.split(':').map(Number);
    if(p.length>=3)return Date.now()>=new Date(p[0],p[1]-1,p[2],tt[0]||0,tt[1]||0,0).getTime();
  }
  return false;
}

function eventCard(e,i){
  const on=saved.includes(e.id);
  const fav=`<button class="chip ${on?'on':''}" data-fav="${e.id}" onclick="event.stopPropagation();toggleSave('${e.id}')">${on?'♥':'♡'} ${tr('fav')}</button>`;
  const past=isPast(e);
  const booked=user&&hasBooking(e.id);
  const popCls=(justBooked===e.id)?' pop':'';
  const lockISO=(!past&&!booked&&user)?bookOpenISO(e):'';
  const locked=lockISO&&lockISO>todayISO();
  const lockEu=locked?lockISO.split('-').reverse().join('.'):'';
  const lockSvg=`<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/></svg>`;
  const expiredMember=user&&!membershipActive();
  const left=seatsLeft(e); const soldOut=left!==null&&left<=0;
  const book=past?'':(expiredMember?`<button class="chip locked" onclick="event.stopPropagation();go('profile')">${lockSvg}${tr('membershipOver')}</button>`
    :booked?`<button class="chip on${popCls}" onclick="event.stopPropagation();toast(tr('alreadyBooked'))">✓ ${tr('booked')}</button>`
    :locked?`<button class="chip locked" onclick="event.stopPropagation();toast(tr('bookFrom')+' '+'${lockEu}')">${lockSvg}${tr('bookFrom')} ${lockEu}</button>`
    :soldOut?`<button class="chip locked" onclick="event.stopPropagation();toast(lang==='bg'?'Изчерпано':'Sold out')">${lang==='bg'?'Изчерпано':'Sold out'}</button>`

function CalPlugin(){try{const C=window.Capacitor;if(!(C&&C.isNativePlatform&&C.isNativePlatform()))return null;return (C.Plugins&&C.Plugins.CapacitorCalendar)||(C.registerPlugin&&C.registerPlugin('CapacitorCalendar'))||null;}catch(e){return null;}}
async function addToCalendar(id){
  const e=EVENTS.find(x=>x.id===id); if(!e||!e.date)return;
  const toMs=(iso,t)=>{const[Y,M,D]=iso.split('-').map(Number);let h=9,mi=0;if(t&&/\d{1,2}:\d{2}/.test(t)){const p=t.split(':');h=+p[0];mi=+p[1];}return new Date(Y,M-1,D,h,mi,0).getTime();};
  const start=toMs(e.date,e.time), end=toMs(e.end_date||e.date,e.ends||e.time);
  // 1) Телефон: отваря директно системния календар за ново събитие
  const Cal=CalPlugin();
  if(Cal&&Cal.createEventWithPrompt){
    try{
      try{ if(Cal.requestAllPermissions) await Cal.requestAllPermissions(); }catch(_){}
      await Cal.createEventWithPrompt({title:e.title,location:e.place||'',startDate:start,endDate:end,notes:'American College Arcus Club'});
      return;
    }catch(err){/* пада към уеб варианта */}
  }
  // 2) Браузър: меню за избор на календар
  calMenu(e,start,end);
}
function calMenu(e,start,end){
  const pad=n=>String(n).padStart(2,'0');
  const gfmt=ms=>{const d=new Date(ms);return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';};
  const ifmt=ms=>{const d=new Date(ms);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';};
  const loc=e.place||'', details='American College Arcus Club', title=e.title||'';
  const google='https://calendar.google.com/calendar/render?'+new URLSearchParams({action:'TEMPLATE',text:title,dates:gfmt(start)+'/'+gfmt(end),location:loc,details}).toString();
  const outlook='https://outlook.live.com/calendar/0/deeplink/compose?'+new URLSearchParams({path:'/calendar/action/compose',rru:'addevent',subject:title,startdt:ifmt(start),enddt:ifmt(end),location:loc,body:details}).toString();
  const openUrl=u=>{closeCalMenu();window.open(u,'_blank','noopener');};
  const apple=()=>{
    closeCalMenu();
    const esc2=s=>(''+(s||'')).replace(/([,;\\])/g,'\\$1').replace(/\n/g,'\\n');
    const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Arcus Club//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH','BEGIN:VEVENT',
      'UID:'+(e.id||Date.now())+'@arcusclub','DTSTAMP:'+gfmt(Date.now()),'DTSTART:'+gfmt(start),'DTEND:'+gfmt(end),
      'SUMMARY:'+esc2(title),'LOCATION:'+esc2(loc),'DESCRIPTION:'+esc2(details),'END:VEVENT','END:VCALENDAR'].join('\r\n');
    const url=URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));
    const a=document.createElement('a');a.href=url;a.download=(title||'event').replace(/[^\w]+/g,'_')+'.ics';
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);
  };
  window._calApple=apple;window._calG=()=>openUrl(google);window._calO=()=>openUrl(outlook);
  const ov=document.createElement('div');ov.className='pwov';ov.id='calmenu';
  ov.innerHTML=`<div class="pwcard"><h3>${lang==='bg'?'Добави в календара':'Add to calendar'}</h3>
    <button class="btn" onclick="_calG()">Google Calendar</button>
    <button class="btn" style="margin-top:8px;" onclick="_calO()">Outlook</button>
    <button class="btn" style="margin-top:8px;" onclick="_calApple()">Apple Calendar</button>
    <button class="btn btn-ghost" style="margin-top:8px;" onclick="closeCalMenu()">${tr('cancelBtn')}</button></div>`;
  ov.addEventListener('click',ev=>{if(ev.target===ov)closeCalMenu();});
  document.body.appendChild(ov);
}

async function confirmBook(id){
  if(!user){needLogin();return;}
  if(!membershipActive()){toast(tr('memberExpiredTitle'));go('profile');return;}
  const e=EVENTS.find(x=>x.id===id); if(!e)return;
  if(!canBookNow(e)){toast(tr('bookFrom')+' '+bookOpenISO(e).split('-').reverse().join('.'));return;}
  const inp=document.getElementById('bp_'+id); const n=parseInt((inp&&inp.value)||'1',10);
  const bname=(document.getElementById('bn_'+id)?.value||'').trim()||user.full_name||user.username||user.email;
  const seats=MEMBERS.find(m=>m.id===user.membership)?.seats||1;
  if(n<1){toast(tr('party'));return;}
  if(n>seats){toast((lang==='bg'?'Максимум ':'Max ')+seats+' '+tr('seats'));return;}
  // проверка за свободни места
  const left=seatsLeft(e);
  if(left!==null&&n>left){toast(left<=0?(lang==='bg'?'Изчерпано':'Sold out'):(lang==='bg'?('Остават само '+left+' места'):('Only '+left+' seats left')));return;}

  const wantTable=endsEarly(e)&&document.getElementById('tb_'+id)?.checked;
  const tp=parseInt(document.getElementById('tbp_'+id)?.value||'2',10);
  // само една активна заявка на член за събитие
  try{RES=await DB.listReservations();}catch(err){}
  if(hasBooking(id)){toast(tr('alreadyBooked'));route();return;}
  const r=await DB.addReservation({event_id:e.id,fmt:e.format,place:e.title,date:e.date,time:e.time,party:n,note:'Билет / ticket',res_name:bname,email:user.email,phone:user.phone||''});

  if(wantTable){
    await DB.addReservation({fmt:'restaurant',place:venueLabel('restaurant'),date:e.date,time:e.ends||e.time,party:tp>0?tp:2,
      table_event_id:e.id,
      note:(lang==='bg'?'Маса след събитие: ':'Table after event: ')+e.title,
      res_name:bname,email:user.email,phone:user.phone||''});

  justBooked=id;setTimeout(()=>{justBooked=null;},800);

  toast(wantTable?(lang==='bg'?'Билетът и масата са заявени':'Ticket and table requested'):tr('ticketToast'));route();
}

function allowedNominateTargets(prop){
  if(prop==='founder')return ['founder','founding','club','alumni','corporate']; // основателят може всеки тип
  if(prop==='corporate')return ['corporate']; // корпоративен → само корпоративен
  const rank={founding:3,club:2,alumni:1};
  const r=rank[prop]||0;
  if(!r)return []; // guest/без членство не предлага
  // своето ниво и по-надолу сред индивидуалните + винаги може и фирма
  return ['founding','club','alumni'].filter(t=>rank[t]<=r).concat('corporate');
}

  if(!user||!membershipActive())return false;
  if(user.membership==='corporate')return !!(user.company_id&&user.company_id===user.id); // само основният фирмен профил
  return allowedNominateTargets(user.membership).length>0;

async function submitApp(nominate){
  if(nominate&&!canNominate()){toast(lang==='bg'?'Нямате възможност да предлагате членове':'You cannot propose members');return;}
  const v=id=>(document.getElementById(id)?.value||'').trim();
  const m=v('ap_mem'),name=v('ap_name'),email=v('ap_email'),phone=v('ap_phone'),about=v('ap_about');
  if(!name){toast(lang==='bg'?'Въведете име':'Enter a name');return;}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){toast(lang==='bg'?'Въведете валиден имейл':'Enter a valid email');return;}
  if(!phone){toast(lang==='bg'?'Въведете телефон за контакт':'Enter a contact phone');return;}
  const interests=v('ap_interests');
  if(!interests){toast(lang==='bg'?'Попълнете интереси':'Fill in interests');return;}
  if(m==='corporate'){
    if(!v('ap_bulstat')){toast(lang==='bg'?'Въведете БУЛСТАТ / ЕИК':'Enter company ID (BULSTAT)');return;}
    if(!v('ap_activity')){toast(lang==='bg'?'Въведете дейност на фирмата':'Enter company activity');return;}
  }
  if(!about){toast(lang==='bg'?'Опишете мотивацията си':'Describe your motivation');return;}
  let alumni='';
  if(m==='alumni'){
    const parts=[];document.querySelectorAll('#ap_alumniChips .chip.on').forEach(c=>parts.push(c.dataset.v));
    const other=v('ap_alumniOther'); if(other)parts.push(other);
    alumni=parts.join(', ');
    if(!alumni){toast(lang==='bg'?'Изберете връзка с колежа':'Select your connection to the college');return;}
  }
  const r=await DB.submitApplication({nominate,membership:m,name,email,phone,about,
    profession:v('ap_prof'),interests:v('ap_interests'),alumni_relation:alumni,
    corp_bulstat:v('ap_bulstat'),corp_size:v('ap_size'),corp_activity:v('ap_activity')});
  if(r&&r.error){
    if(r.error.cooldown){toast(lang==='bg'?'Скорошна кандидатура с този имейл/БУЛСТАТ беше отказана. Може да опитате отново след 30 дни.':'A recent application with this email/company ID was declined. You can re-apply after 30 days.');return;}
    if(r.error.dup){toast(lang==='bg'?'Вече има подадена кандидатура с този имейл или БУЛСТАТ. Изчакайте да я разгледаме.':'An application with this email or company ID already exists. Please wait for our review.');return;}
    toast(r.error.message);return;
  }
  hap('success');
  toast(lang==='bg'?'Благодарим! Кандидатурата е изпратена.':'Thank you! Your application was sent.');
  setTimeout(()=>{location.hash='';route();},900);
}

function isoToEu(iso){if(!iso)return'';const p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
let rcalM=null;
function openResCal(){
  const inp=document.getElementById('r_date');
  const base=inp.dataset.iso?new Date(inp.dataset.iso+'T00:00:00'):new Date();
  rcalM={y:base.getFullYear(),m:base.getMonth()};drawResCal();
}
function resCalNav(d){rcalM.m+=d;if(rcalM.m<0){rcalM.m=11;rcalM.y--;}if(rcalM.m>11){rcalM.m=0;rcalM.y++;}drawResCal();}
function drawResCal(){
  closeResCal();
  const inp=document.getElementById('r_date');if(!inp)return;
  const months=lang==='bg'?['януари','февруари','март','април','май','юни','юли','август','септември','октомври','ноември','декември']
    :['January','February','March','April','May','June','July','August','September','October','November','December'];
  const wd=lang==='bg'?['пн','вт','ср','чт','пт','сб','нд']:['Mo','Tu','We','Th','Fr','Sa','Su'];
  const first=new Date(rcalM.y,rcalM.m,1);
  const off=(first.getDay()+6)%7;
  const dim=new Date(rcalM.y,rcalM.m+1,0).getDate();
  const t=new Date();
  const tIso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const sel=inp.dataset.iso||'';
  let cells=wd.map((w,i)=>`<div style="font-size:11px;color:${i>4?'#b5532f':'var(--muted)'};text-align:center;padding:4px 0;">${w}</div>`).join('');
  for(let i=0;i<off;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const iso=rcalM.y+'-'+String(rcalM.m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=iso===sel?'background:#b5532f;color:#fffdf4;':(iso===tIso?'box-shadow:inset 0 0 0 1px #b5532f;color:#b5532f;':'color:var(--text);');
    cells+=`<div onclick="pickResDate('${iso}')" style="text-align:center;padding:8px 0;border-radius:9px;cursor:pointer;font-size:13px;${st}">${d}</div>`;
  }
  const pop=document.createElement('div');pop.id='res-cal';
  pop.style.cssText='position:absolute;z-index:9999;background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.22);padding:12px;width:268px;';
  pop.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <button type="button" onclick="resCalNav(-1)" style="border:0;background:none;cursor:pointer;font-size:18px;padding:4px 12px;color:var(--text);">‹</button>
      <b style="font-size:13px;color:var(--text);">${months[rcalM.m]} ${rcalM.y}</b>
      <button type="button" onclick="resCalNav(1)" style="border:0;background:none;cursor:pointer;font-size:18px;padding:4px 12px;color:var(--text);">›</button></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">${cells}</div>
    <div style="text-align:center;margin-top:8px;">
      <button type="button" onclick="pickResDate('${tIso}')" style="border:0;background:none;cursor:pointer;color:#b5532f;font-size:12px;">${lang==='bg'?'Днес':'Today'}</button></div>`;
  const r=inp.getBoundingClientRect();
  pop.style.left=(r.left+window.scrollX)+'px';pop.style.top=(r.bottom+window.scrollY+6)+'px';
  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener('mousedown',resCalOutside),0);
}
function resCalOutside(ev){const p=document.getElementById('res-cal');if(p&&!p.contains(ev.target)&&ev.target.id!=='r_date')closeResCal();}
function closeResCal(){const p=document.getElementById('res-cal');if(p){p.remove();document.removeEventListener('mousedown',resCalOutside);}}
function pickResDate(iso){const inp=document.getElementById('r_date');if(inp){inp.dataset.iso=iso;inp.value=iso?isoToEu(iso):'';}closeResCal();}

// ---------- Биометрия (Face ID / отпечатък) през Capacitor native plugin ----------
const BIO_SERVER='arcusclub';
let _nbCache;
function NB(){
  try{
    const C=window.Capacitor;
    if(!(C&&C.isNativePlatform&&C.isNativePlatform()))return null;
    if(_nbCache!==undefined)return _nbCache;
    if(C.Plugins&&C.Plugins.NativeBiometric)_nbCache=C.Plugins.NativeBiometric;
    else if(C.registerPlugin)_nbCache=C.registerPlugin('NativeBiometric'); // надежден начин при отдалечен сайт
    else _nbCache=null;
    return _nbCache;
  }catch(e){return null;}
}
function bioEnabled(){return !!(NB()&&localStorage.getItem('acac_bio'));}
async function saveBioCreds(email,pass){
  const isNative=!!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());
  const b=NB();
  if(!b){ if(isNative)alert('Face ID диагностика: плъгинът не е зареден (NativeBiometric липсва).'); return; }
  try{
    const a=await b.isAvailable();
    if(!a||!a.isAvailable){ alert('Face ID диагностика: isAvailable = '+JSON.stringify(a)); return; }
    try{await b.deleteCredentials({server:BIO_SERVER});}catch(_){} // чистим стар запис (оцелял от стара инсталация)
    await b.setCredentials({username:email,password:pass,server:BIO_SERVER});
    localStorage.setItem('acac_bio','1'); // успех — бутонът за Face ID ще се появи при следващо влизане
  }catch(e){
    // втори опит: само изтриване + запис
    try{await b.deleteCredentials({server:BIO_SERVER});await b.setCredentials({username:email,password:pass,server:BIO_SERVER});localStorage.setItem('acac_bio','1');}
    catch(e2){alert('Face ID диагностика (запис в Keychain): '+((e2&&e2.message)||JSON.stringify(e2)));}
  }
}
async function bioLogin(){
  const b=NB();if(!b){toast(tr('bioNone'));return;}
  try{
    await b.verifyIdentity({reason:tr('bioReason'),title:'Arcus Club',subtitle:'',description:''});
    const c=await b.getCredentials({server:BIO_SERVER});
    if(!c||!c.username){toast(tr('bioNone'));return;}
    const {error}=await DB.signIn(c.username,c.password);
    if(error){toast(lang==='bg'?'Влез веднъж с парола — Face ID ще се опресни':'Sign in once with your password — Face ID will refresh');return;}
    user=await DB.getUser();
    if(!user){toast(lang==='bg'?'Влез наново':'Sign in again');return;}
    saved=await DB.listSaved();EVENTS=await DB.listEvents();
    toast(tr('loginToast'));location.hash='';route();
  }catch(e){/* отказан/неуспешен Face ID — нищо */}
}

function pwPolicy(p){
  const bg=lang==='bg';
  if(p.length<6)return bg?'Поне 6 знака':'At least 6 characters';
  if(!/[a-z]/.test(p))return bg?'Трябва малка буква':'Need a lowercase letter';
  if(!/[A-Z]/.test(p))return bg?'Трябва главна буква':'Need an uppercase letter';
  if(!/[0-9]/.test(p))return bg?'Трябва цифра':'Need a digit';
  return '';
}

const CANCEL_HOURS_EVENT=72, CANCEL_HOURS_TABLE=24; // билет за събитие / маса в ресторант
function cancelCutoffH(r){ return (r.table_event_id && !r.event_id) ? CANCEL_HOURS_TABLE : CANCEL_HOURS_EVENT; }
function resStartMs(r){
  if(!r.date)return null;
  const t=(r.time&&/^\d{1,2}:\d{2}/.test(r.time))?r.time.slice(0,5):'00:00';
  const p=r.date.split('-').map(Number),tt=t.split(':').map(Number);
  if(p.length<3)return null;
  return new Date(p[0],p[1]-1,p[2],tt[0]||0,tt[1]||0,0).getTime();
}
function resCancellable(r){
  if(r.status==='declined'||r.status==='cancelled')return false;
  const s=resStartMs(r); if(s==null)return false;
  return s-Date.now()>cancelCutoffH(r)*3600000;
}

// групиране по дата (подредено по дата); при повече от 1 за деня — целият ден е сгъваем
function resGroups(list,dim,prefix){
  const groups=[],idx={};
  list.forEach(r=>{const k=r.date||'';if(idx[k]==null){idx[k]=groups.length;groups.push({k,items:[]});}groups[idx[k]].items.push(r);});
  const word=lang==='bg'?'отвори':'open';
  return groups.map((g,gi)=>{
    const lbl=esc(resDayLabel(g.k));
    if(g.items.length<=1) return `<div class="resday">${lbl}</div>`+g.items.map(r=>resCard(r,dim)).join('');
    const id=(prefix||'rg')+gi;
    const cnt=g.items.length+' '+(lang==='bg'?'резервации':'reservations');
    const hasNew=g.items.some(r=>newResSet&&newResSet[r.id]); // ден с ново известие → отворен
    return `<div class="resday">${lbl}</div>
      <div class="ev" id="dh_${id}" onclick="toggleDay('${id}')" style="margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;${dim?'opacity:.6;':''}">

        <span class="dayarrow" style="color:var(--gold);font-size:14px;white-space:nowrap;">${hasNew?(lang==='bg'?'затвори':'close')+' ▴':word+' ▾'}</span></div>
      <div id="${id}" class="daybody" style="display:${hasNew?'block':'none'};">${g.items.map(r=>resCard(r,dim)).join('')}</div>`;
  }).join('');
}

function resSections(res){
  if(!res.length)return `<p style="color:var(--muted);font-style:italic;">${tr('noRes')}</p>`;
  const t=new Date();
  const todayIso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const upcoming=res.filter(r=>!r.date||r.date>=todayIso).sort((a,b)=>((a.date||'9999-99-99')<(b.date||'9999-99-99'))?-1:1);
  const past=res.filter(r=>r.date&&r.date<todayIso).sort((a,b)=>a.date<b.date?1:-1);
  let h=upcoming.length?resGroups(upcoming,false,'up'):`<p style="color:var(--muted);font-style:italic;">${tr('noUpcomingRes')}</p>`;
  if(past.length){
    h+=`<button class="btn btn-ghost" style="margin-top:10px;" onclick="togglePast(this)">${tr('pastRes')} (${past.length}) ▾</button>
      <div id="pastres" style="display:none;margin-top:10px;">${resGroups(past,true,'pa')}</div>`;
  }
  return h;
}

      <button class="btn" id="phok">${tr('pwSave')}</button>
      ${required?'':`<button class="btn btn-ghost" id="phcancel">${tr('cancelBtn')}</button>`}</div>`;
    document.body.appendChild(ov);
    ov.querySelector('#phok').onclick=()=>{const val=ov.querySelector('#ph1').value.trim();
      if(val.replace(/\D/g,'').length<6){ov.querySelector('#pherr').textContent=bg?'Въведете валиден телефон':'Enter a valid phone';return;}
      ov.remove();res(val);};
    const c=ov.querySelector('#phcancel');if(c)c.onclick=()=>{ov.remove();res(null);};
  });
}

function shareEvent(id){

// ---------- ЛОКАЛНИ ИЗВЕСТИЯ (в приложението; иска @capacitor/local-notifications) ----------
function LocalNotif(){try{const C=window.Capacitor;if(!(C&&C.isNativePlatform&&C.isNativePlatform()))return null;return (C.Plugins&&C.Plugins.LocalNotifications)||(C.registerPlugin&&C.registerPlugin('LocalNotifications'))||null;}catch(e){return null;}}
async function scheduleLocalNotifs(){
  const LN=LocalNotif(); if(!LN||!user||!membershipActive())return;
  try{
    let p=await LN.checkPermissions();
    if(p.display!=='granted'){p=await LN.requestPermissions();}
    if(!p||p.display!=='granted')return;
  }catch(e){return;}
  const now=Date.now();
  const idFor=s=>{let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return Math.abs(h)%2000000000;};
  const evStart=e=>{if(!e.date)return null;const t=(e.time&&/\d{1,2}:\d{2}/.test(e.time))?e.time:'19:00';const p=e.date.split('-').map(Number);const tt=t.split(':').map(Number);return new Date(p[0],p[1]-1,p[2],tt[0],tt[1],0);};
  const notifs=[];
  EVENTS.forEach(e=>{
    if(!canAccess(e)||isPast(e))return;
    if(hasBooking(e.id)){
      const st=evStart(e); if(st){const at=new Date(st.getTime()-3600000); if(at.getTime()>now)notifs.push({id:idFor('ev'+e.id),title:lang==='bg'?'Скоро започва':'Starting soon',body:(lang==='bg'?'„'+e.title+'" започва в ':'“'+e.title+'” starts at ')+(e.time||''),schedule:{at}});}
    }
    const w=e.booking_windows&&e.booking_windows[user.membership];
    if(w&&w>=todayISO()&&!hasBooking(e.id)){const p=w.split('-').map(Number);const at=new Date(p[0],p[1]-1,p[2],9,0,0);if(at.getTime()>now)notifs.push({id:idFor('bw'+e.id),title:lang==='bg'?'Билетите се отвориха':'Booking is open',body:(lang==='bg'?'Вече можеш да запазиш билет за „'+e.title+'"':'You can now book “'+e.title+'”'),schedule:{at}});}
  });
  try{if(notifs.length)await LN.schedule({notifications:notifs.slice(0,60)});}catch(e){}
}
function checkUnlocks(){
  if(!user||!membershipActive())return;
  let seen={};try{seen=JSON.parse(localStorage.getItem('acac_unlock')||'{}');}catch(e){}
  const opened=[];
  EVENTS.forEach(e=>{
    if(!canAccess(e)||isPast(e))return;
    const w=e.booking_windows&&e.booking_windows[user.membership];
    if(!w)return; // събитието няма фаза за това ниво
    const isOpen=w<=todayISO();
    if(seen[e.id]==='closed'&&isOpen&&!hasBooking(e.id))opened.push(e);
    seen[e.id]=isOpen?'open':'closed';
  });
  try{localStorage.setItem('acac_unlock',JSON.stringify(seen));}catch(e){}
  if(opened.length){
    hap&&hap('success');
    const msg=opened.length===1
      ?(lang==='bg'?'Записването за „'+opened[0].title+'" вече е отворено!':'Booking for “'+opened[0].title+'” is now open!')
      :(lang==='bg'?('Записването за '+opened.length+' събития вече е отворено!'):('Booking is now open for '+opened.length+' events!'));
    setTimeout(()=>toast(msg),1400);
  }
}

// брой нови известия (резервации с променен статус, които още не са видени)
function notifCount(){
  try{
    const seen=JSON.parse(localStorage.getItem('acac_seen_res')||'{}');
    return RES.filter(r=>(r.status==='confirmed'||r.status==='declined')&&seen[r.id]!==r.status).length;

}

function computeNewRes(){

    RES.forEach(r=>{if((r.status==='confirmed'||r.status==='declined')&&seen[r.id]!==r.status)s[r.id]=true;});}catch(e){}

}

// число върху иконата на приложението
// нативно (iOS/Android) → плъгин @capawesome/capacitor-badge; иначе → Web Badging (PWA)
function NativeBadge(){try{const C=window.Capacitor;if(!(C&&C.isNativePlatform&&C.isNativePlatform()))return null;return (C.Plugins&&C.Plugins.Badge)||(C.registerPlugin&&C.registerPlugin('Badge'))||null;}catch(e){return null;}}
async function setIconBadge(n){
  const NB=NativeBadge();
  if(NB){
    try{
      if(NB.checkPermissions){let p=await NB.checkPermissions();if((!p||p.display!=='granted')&&NB.requestPermissions)await NB.requestPermissions();}
      if(n>0)await NB.set({count:n}); else (NB.clear?await NB.clear():await NB.set({count:0}));
    }catch(e){}
  }else{
    try{ if('setAppBadge' in navigator){ if(n)navigator.setAppBadge(n); else navigator.clearAppBadge(); } }catch(e){}

}
function appBadge(){

function renderPath(path,q,parts){
  let html,active='home';
  if(path===''||path==='home'){html=home();active='home';setTimeout(markAnnSeen,1200);}
  else if(parts[0]==='format'){html=formatPage(parts[1]);active='home';}
  else if(path==='events'){html=events();active='events';}
  else if(path==='live'){html=liveView();active='live';}
  else if(path==='reserve'){html=reserve(q||'');active='reserve';}
  else if(path==='membership'){html=membership();active='membership';}
  else if(path==='profile'){html=profile();active='profile';}
  else if(path==='account'){html=accountView();active='profile';}
  else if(path==='nominate'){html=appForm('nominate');active='profile';}
  else if(path==='company'){html=companyView();active='profile';}
  else{html=home();}
  app.innerHTML=html;
  // лек преход при смяна на екран
  app.classList.remove('nav');void app.offsetWidth;app.classList.add('nav');
  if(document.getElementById('ap_mem'))appToggle();
  if(path==='profile'){
    // ако има ново известие за резервация → скролваме до нея, после маркираме като видяно
    const el=document.querySelector('[data-newres]');
    if(el)setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),200);
    markResSeen();
  }
  tabbar(active);
  // на „На живо" се опреснява всяка минута, за да се появи стриймът сам в часа на началото
  try{clearTimeout(window.__liveTimer);}catch(e){}
  if(active==='live'){window.__liveTimer=setTimeout(()=>{if((location.hash.replace(/^#/,'').split('?')[0])==='live')renderPath('live','',['live']);},60000);}
}
let dataSig='',dataReady=false;
const skel=n=>('<div class="skel"></div>').repeat(n);
async function route(){
  const tb=document.getElementById('tabbar');
  if(!user){
    const p0=location.hash.replace(/^#/,'').split('?')[0];
    if(p0==='apply'){app.innerHTML=appForm('apply');if(document.getElementById('ap_mem'))appToggle();window.scrollTo(0,0);tb.style.display='none';entered=true;return;}
    app.innerHTML=gate();window.scrollTo(0,0);tb.style.display='none';entered=true;return;
  }
  tb.style.display='flex';
  const raw=location.hash.replace(/^#/,'');
  const [path,q]=raw.split('?');
  if(path!=='events')previewAs=null;
  const parts=path.split('/');
  // 1) Рисуваме веднага с наличните данни (без чакане → без забавяне)
  if(path==='company')COMPANY=null;
  renderPath(path,q,parts);
  window.scrollTo(0,0);
  // фирмени профили — зареждаме във фон
  if(path==='company'&&user&&user.membership==='corporate'){
    try{COMPANY=await DB.companyMembers();}catch(e){COMPANY={members:[],max:5};}
    if((location.hash.replace(/^#/,'').split('?')[0])==='company')renderPath(path,q,parts);
  }
  // 2) Във фон опресняваме (паралелно) и пре-рисуваме само ако нещо се е променило
  const needsData=['','home','events','profile','live'].includes(path)||parts[0]==='format';
  if(needsData){
    try{
      const [ev,sv,rs,tk,an]=await Promise.all([DB.listEvents(),DB.listSaved(),DB.listReservations(),DB.listEventTaken(),DB.listAnnouncements()]);
      const sig=JSON.stringify([ev,sv,rs,tk,an]);
      EVENTS=ev;saved=sv;RES=rs;TAKEN=tk||{};ANN=an||[];const wasReady=dataReady;dataReady=true;
      const cur=location.hash.replace(/^#/,'').split('?')[0];
      if(cur===path&&(sig!==dataSig||!wasReady)){dataSig=sig;renderPath(path,q,parts);}
    }catch(e){}
  }
}

// Скриване на splash след кратка анимация
(function(){

  setTimeout(hide,1900);

// Pull-to-refresh (издърпване отгоре → опресняване)
(function(){
  var y=null,on=false;
  function ptr(){return document.getElementById('ptr');}
  document.addEventListener('touchstart',function(e){ y=(window.scrollY<=0)?e.touches[0].clientY:null; on=false; },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(y===null)return;
    var dy=e.touches[0].clientY-y;
    if(dy>10 && window.scrollY<=0){
      var p=ptr();if(!p)return;
      var d=Math.min(dy*0.5,70);
      p.classList.add('show'); p.style.transform='translate(-50%,'+(d-46)+'px)'; p.style.opacity=Math.min(1,dy/80);
      on=dy>75;
    }
  },{passive:true});
  document.addEventListener('touchend',async function(){
    var p=ptr();
    if(p&&p.classList.contains('show')){
      if(on){
        p.classList.add('spin');p.style.transform='translate(-50%,16px)';p.style.opacity='1';
        try{if(typeof dataSig!=='undefined')dataSig=''; if(typeof route==='function')await route();}catch(e){}
        try{if(typeof hap==='function')hap('select');}catch(e){}
        setTimeout(function(){p.classList.remove('show','spin');p.style.transform='translate(-50%,-46px)';p.style.opacity='0';},500);
      }else{p.classList.remove('show');p.style.transform='translate(-50%,-46px)';p.style.opacity='0';}
    }
    y=null;on=false;
  },{passive:true});
})();
</script>
