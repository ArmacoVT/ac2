<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f6efe2" />
<title>Arcus Club ¬Ј –Р–і–Љ–Є–љ –њ–∞–љ–µ–ї</title>
<link rel="icon" href="favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f6efe2;--surface:#fffaf0;--gold:#c8643c;--gold-soft:#b07a4a;--cream:#3a2c23;--text:#5a4a3c;
    --mid:#8a6f5c;--muted:#a8927c;--line:rgba(58,44,35,0.16);--ok:#4f7a43;--warn:#b5532f;--serif:'Cormorant Garamond',Georgia,serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 60px;}
  .top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;background:rgba(246,239,226,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin-bottom:18px;}
  .top .b{font-family:var(--serif);color:var(--gold);font-size:19px;letter-spacing:1px;}
  .top .b small{color:var(--mid);font-size:12px;letter-spacing:0;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:22px;padding:8px 16px;font-size:14px;cursor:pointer;font-family:inherit;}
  .tab.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
  h2{font-family:var(--serif);color:var(--cream);font-weight:500;font-size:22px;margin-bottom:12px;}
  h3{color:var(--cream);font-size:16px;font-weight:500;}
  label{display:block;color:var(--mid);font-size:13px;margin:10px 0 5px;}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:11px;color:var(--cream);font-size:15px;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-soft);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--gold);}
  .btn.sm{padding:7px 13px;font-size:13px;border-radius:18px;}
  .btn.ok{background:var(--ok);color:#fff;}
  .btn.no{background:transparent;border:1px solid var(--warn);color:#d98b6e;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .ck{border:1px solid var(--line);border-radius:20px;padding:7px 13px;font-size:13px;cursor:pointer;user-select:none;}
  .ck.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600;}
  .pill{display:inline-block;font-size:11px;letter-spacing:1px;border:1px solid var(--gold);color:var(--gold);border-radius:14px;padding:2px 9px;}
  .pill.audAll{border-color:var(--ok);color:#3f6235;}
  .muted{color:var(--muted);font-size:13px;}
  .badge{font-size:11px;border-radius:12px;padding:2px 10px;border:1px solid var(--line);color:var(--mid);}
  .badge.live{border-color:var(--ok);color:#3f6235;}
  .gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
  .gate .ring{width:120px;height:120px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .gate .ring span{font-family:var(--serif);color:var(--gold);font-size:38px;}
  .gate h1{font-family:var(--serif);color:var(--cream);font-size:26px;font-weight:500;margin-top:20px;}
  .gate .f{width:100%;max-width:300px;margin-top:24px;}
  .gate input{margin-bottom:11px;}
  .empty{color:var(--muted);font-style:italic;padding:8px 0;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--mid);font-weight:500;padding:8px;border-bottom:1px solid var(--line);}
  td{padding:8px;border-bottom:1px solid var(--line);color:var(--text);}
</style>
</head>
<body>
<div id="root" style="padding:40px;text-align:center;color:var(--muted);">–Ч–∞—А–µ–ґ–і–∞–љ–µвА¶</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script>
const MEMBERS=[{id:'founder',t:'Founder'},{id:'founding',t:'Founding Member'},{id:'club',t:'Club Member'},{id:'alumni',t:'Alumni Member'},{id:'corporate',t:'Corporate Member'}];
const FORMATS=['culture','cinema','table','music','conversation','community','theater'];
const VENUES=['–†–µ—Б—В–Њ—А–∞–љ—В','–Ъ–∞–Љ–µ—А–љ–∞ –Ј–∞–ї–∞','–Ю–љ–ї–∞–є–љ','–Ш–Ј–ї–Њ–ґ–±–µ–љ–Њ —Д–Њ–∞–є–µ','VIP –Ј–∞–ї–∞'];
const memName=id=>(MEMBERS.find(m=>m.id===id)||{t:id}).t;
const esc=s=>(''+(s??'')).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

let tab='events', editId=null, draftAud=['all'], admin=false;
let EVENTS=[], RES=[];
const root=document.getElementById('root');

async function boot(){
  if(DB.live){ const u=await DB.getUser(); admin=!!(u&&u.role==='admin'); }
  else { admin=localStorage.getItem('acac_admin')==='1'; }
  if(admin) await refresh();
  render();
}
async function refresh(){
  try{ EVENTS=await DB.listEvents(); }catch(e){ EVENTS=[]; }
  try{ RES=await DB.listReservations(); }catch(e){ RES=[]; }
  try{ APPS=await DB.listApplications(); }catch(e){ APPS=APPS||[]; }
}

function tabBadge(n){return n?` <span style="background:#b5532f;color:#fffdf4;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;vertical-align:middle;">${n}</span>`:'';}
function render(){
  if(!admin){gate();return;}
  const badge=DB.live?`<span class="badge live">–°–≤—К—А–Ј–∞–љ Supabase</span>`:`<span class="badge">–Ф–µ–Љ–Њ —А–µ–ґ–Є–Љ</span>`;
  let h=`<div class="wrap">
    <div class="top"><div class="b">AC¬≤ ¬Ј –Р–і–Љ–Є–љ –њ–∞–љ–µ–ї<br><small>American College Arcus Club</small></div>
      <div style="display:flex;gap:10px;align-items:center;">${badge}<button class="btn ghost sm" onclick="logout()">–Ш–Ј—Е–Њ–і</button></div></div>
    <div class="tabs">
      <button class="tab ${tab==='events'?'on':''}" onclick="setTab('events')">–°—К–±–Є—В–Є—П</button>
      <button class="tab ${tab==='res'?'on':''}" onclick="setTab('res')">–†–µ–Ј–µ—А–≤–∞—Ж–Є–Є${tabBadge(RES.filter(r=>!r.status||r.status==='requested').length)}</button>
      <button class="tab ${tab==='people'?'on':''}" onclick="setTab('people')">–І–ї–µ–љ–Њ–≤–µ</button>
      <button class="tab ${tab==='apps'?'on':''}" onclick="setTab('apps')">–Ъ–∞–љ–і–Є–і–∞—В—Г—А–Є${tabBadge((APPS||[]).filter(a=>(a.status||'new')==='new').length)}</button>
      <button class="tab ${tab==='members'?'on':''}" onclick="setTab('members')">–Т–Є–і–Є–Љ–Њ—Б—В –њ–Њ —З–ї–µ–љ—Б—В–≤–Њ</button>
      <button class="tab ${tab==='stats'?'on':''}" onclick="setTab('stats')">–°—В–∞—В–Є—Б—В–Є–Ї–∞</button>
    </div>`;
  if(tab==='events')h+=eventsView();
  else if(tab==='res')h+=resView();
  else if(tab==='people')h+=peopleView();
  else if(tab==='apps')h+=appsView();
  else if(tab==='stats')h+=statsView();
  else h+=membersView();
  h+=`</div>`;
  root.innerHTML=h;
  if(tab==='stats')setTimeout(animateCounts,30);
}
function animateCounts(){
  document.querySelectorAll('.countup').forEach(el=>{
    const to=parseInt(el.dataset.to||'0',10);
    if(!to){el.textContent='0';return;}
    const dur=700,start=performance.now();
    const step=now=>{const p=Math.min(1,(now-start)/dur);
      el.textContent=Math.round(to*(1-Math.pow(1-p,3)));
      if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);
  });
}
let PEOPLE=null,APPS=null,PHONES=null;
async function loadPhones(){
  try{const list=await DB.listMembers();const m={};list.forEach(p=>{m[p.id]={email:p.email||'',phone:p.phone||''};});PHONES=m;}catch(e){PHONES={};}
}
async function setTab(t){tab=t;editId=null;await refresh();render();
  if(t==='people'){PEOPLE=null;render();PEOPLE=await DB.listMembers();render();}
  if((t==='res'||t==='events')&&!PHONES){await loadPhones();render();}
}

function audLabel(aud){
  if(aud==='all')return `<span class="pill audAll">–Т—Б–Є—З–Ї–Є —З–ї–µ–љ–Њ–≤–µ</span>`;
  if(!Array.isArray(aud)||!aud.length)return `<span class="pill">–љ–Є–Ї–Њ–є</span>`;
  return aud.map(a=>`<span class="pill">${memName(a)}</span>`).join(' ');
}
// –Ј–∞–µ—В–Є –Љ–µ—Б—В–∞ –Ј–∞ —Б—К–±–Є—В–Є–µ: –њ–Њ—В–≤—К—А–і–µ–љ–Є—В–µ —А–µ–Ј–µ—А–≤–∞—Ж–Є–Є (–Є –Њ—В–і–µ–ї–љ–Њ —З–∞–Ї–∞—Й–Є—В–µ)
function seatsTaken(evId){return RES.filter(r=>r.event_id===evId&&r.status==='confirmed').reduce((s,r)=>s+(r.party||1),0);}
function seatsPending(evId){return RES.filter(r=>r.event_id===evId&&(!r.status||r.status==='requested')).reduce((s,r)=>s+(r.party||1),0);}
function seatsInfo(e){
  if(!e.capacity)return '';
  const taken=seatsTaken(e.id), left=e.capacity-taken, pend=seatsPending(e.id);
  const col=left<=0?'#b5532f':(left<=Math.ceil(e.capacity*0.2)?'#bf8a2e':'#4f7a43');
  return `<span class="pill" style="border-color:${col};color:${col};">${left<=0?'–љ—П–Љ–∞ –Љ–µ—Б—В–∞':'–Њ—Б—В–∞–≤–∞—В '+left+' –Њ—В '+e.capacity}</span>`+
    (pend?` <span class="pill">${pend} —З–∞–Ї–∞—Й–Є</span>`:'');
}
// –Љ–∞—Б–Є —Б–ї–µ–і —Б—К–±–Є—В–Є–µ—В–Њ (—Б–≤—К—А–Ј–∞–љ–Є —З—А–µ–Ј table_event_id)
function tableTaken(evId){return RES.filter(r=>r.table_event_id===evId&&r.status==='confirmed').reduce((s,r)=>s+(r.party||1),0);}
function tableInfo(e){
  if(!e.table_capacity)return '';
  const taken=tableTaken(e.id), left=e.table_capacity-taken;
  const col=left<=0?'#b5532f':(left<=Math.ceil(e.table_capacity*0.2)?'#bf8a2e':'#4f7a43');
  return `<span class="pill" style="border-color:${col};color:${col};">рЯНљ ${left<=0?'–љ—П–Љ–∞ –Љ–∞—Б–Є':'–Љ–∞—Б–Є: –Њ—Б—В–∞–≤–∞—В '+left+' –Њ—В '+e.table_capacity}</span>`;
}
// —А–∞–Ј–≥—К–≤–∞—Й —Б–µ —Б–њ–Є—Б—К–Ї вАЮ–Ї–Њ–є –µ –Ј–∞–њ–∞–Ј–Є–ї" –Ј–∞ –і–∞–і–µ–љ–Њ —Б—К–±–Є—В–Є–µ (–±–Є–ї–µ—В–Є + –Љ–∞—Б–Є)
function eventResList(e){
  const tickets=RES.filter(r=>r.event_id===e.id);
  const tables=RES.filter(r=>r.table_event_id===e.id);
  const all=tickets.concat(tables);
  if(!all.length)return '';
  const stTxt={confirmed:'–Њ–і–Њ–±—А–µ–љ–∞',declined:'–Њ—В–Ї–∞–Ј–∞–љ–∞'};
  const stCol={confirmed:'#4f7a43',declined:'#b5532f'};
  const row=(r,isTable)=>{
    const st=r.status||'requested';
    const nm=r.name||r.who||'—З–ї–µ–љ';
    const info=(PHONES&&r.user_id)?PHONES[r.user_id]:null;
    const em=r.email||(info&&info.email)||'';
    const ph=r.phone||(info&&info.phone)||'';
    const contact=[em,ph].filter(Boolean).map(esc).join(' ¬Ј ');
    return `<div style="padding:8px 0;border-top:1px solid var(--line-soft);">
      <div><b>${esc(nm)}</b> ¬Ј ${r.party||1} ${isTable?'–љ–∞ –Љ–∞—Б–∞':'–Љ–µ—Б—В–∞'}${isTable?' рЯНљ':''}
        <span style="color:${stCol[st]||'var(--muted)'};font-size:12px;"> ¬Ј ${stTxt[st]||'—З–∞–Ї–∞—Й–∞'}</span></div>
      ${contact?`<div class="muted" style="font-size:12px;">${contact}</div>`:''}
      ${r.note&&isTable?`<div class="muted" style="font-size:12px;">вАЮ${esc(r.note)}"</div>`:''}</div>`;
  };
  const body=tickets.map(r=>row(r,false)).join('')+tables.map(r=>row(r,true)).join('');
  return `<button class="btn ghost sm" style="margin-top:10px;" onclick="toggleEvRes('${e.id}')" id="evrb_${e.id}">–Ч–∞–њ–∞–Ј–Є–ї–Є (${all.length}) вЦЊ</button>
    <div id="evr_${e.id}" style="display:none;margin-top:4px;">${body}</div>`;
}
function toggleEvRes(id){
  const d=document.getElementById('evr_'+id),b=document.getElementById('evrb_'+id);
  if(!d)return;const open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  if(b)b.textContent=b.textContent.replace(open?'вЦі':'вЦЊ',open?'вЦЊ':'вЦі');
}
function eventsView(){
  const evCard=e=>{
    const liveBadge=e.is_live?'<span class="pill" style="border-color:#d98b6e;color:#d98b6e;">вЧП –Э–Р –Ц–Ш–Т–Ю</span>':(e.stream_url?'<span class="pill">—Б—В—А–Є–є–Љ –≥–Њ—В–Њ–≤</span>':'');
    const liveBtn=e.stream_url
      ? (e.is_live?`<button class="btn no sm" onclick="toggleLive('${e.id}',false)">–°–њ—А–Є —Б—В—А–Є–є–Љ–∞</button>`
                  :`<button class="btn ok sm" onclick="toggleLive('${e.id}',true)">–Я—Г—Б–љ–Є –љ–∞ –ґ–Є–≤–Њ</button>`)
      : '';
    return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div><h3>${esc(e.title)} ${liveBadge}</h3>
        <div class="muted" style="margin-top:3px;">${esc(e.format)} ¬Ј ${isoToBg(e.date)}${e.end_date?' вАУ '+isoToBg(e.end_date):''} ${esc(e.time||'')} ¬Ј ${esc(e.place||'')} ¬Ј ${e.capacity||0} –Љ–µ—Б—В–∞ ¬Ј ${e.price>0?(e.price+' –ї–≤./–±–Є–ї–µ—В'):'–±–µ–Ј–њ–ї–∞—В–љ–Њ'}</div>
        <div style="margin-top:6px;">${seatsInfo(e)} ${tableInfo(e)}</div>
        <div style="margin-top:8px;">–Т–Є–і–Є–Љ–Њ –Ј–∞: ${audLabel(e.aud)}</div></div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${liveBtn}
        <button class="btn ghost sm" onclick="editEvent('${e.id}')">–†–µ–і–∞–Ї—В–Є—А–∞–є</button>
        <button class="btn no sm" onclick="delEvent('${e.id}')">–Ш–Ј—В—А–Є–є</button></div>
    </div>${eventResList(e)}</div>`;};
  const today=new Date().toISOString().slice(0,10);
  const evEnd=e=>e.end_date||e.date||'';
  const up=EVENTS.filter(e=>!evEnd(e)||evEnd(e)>=today).sort((a,b)=>((a.date||'9999')<(b.date||'9999')?-1:1));
  const past=EVENTS.filter(e=>evEnd(e)&&evEnd(e)<today).sort((a,b)=>(a.date<b.date?1:-1));
  let list=up.length?up.map(evCard).join(''):`<p class="empty">–Э—П–Љ–∞ –њ—А–µ–і—Б—В–Њ—П—Й–Є —Б—К–±–Є—В–Є—П.</p>`;
  if(past.length){
    list+=`<button class="btn ghost" style="margin-top:10px;" onclick="togglePastAdm(this)">–Ш–Ј–Љ–Є–љ–∞–ї–Є —Б—К–±–Є—В–Є—П (${past.length}) вЦЊ</button>
      <div id="pastadm" style="display:none;margin-top:10px;">${past.map(evCard).join('')}</div>`;
  }
  return `<h2>–°—К–±–Є—В–Є—П</h2>${formView()}${list}`;
}
function togglePastAdm(btn){const d=document.getElementById('pastadm');if(!d)return;const open=d.style.display!=='none';d.style.display=open?'none':'block';if(btn)btn.textContent=btn.textContent.replace(open?'вЦі':'вЦЊ',open?'вЦЊ':'вЦі');}
function formView(){
  const e=editId?EVENTS.find(x=>x.id===editId):null;
  const allOn=draftAud.includes('all');
  let memCk=`<div class="ck ${allOn?'on':''}" onclick="toggleAud('all')">вЬУ –Т—Б–Є—З–Ї–Є —З–ї–µ–љ–Њ–≤–µ</div>`+
    MEMBERS.map(m=>`<div class="ck ${(!allOn&&draftAud.includes(m.id))?'on':''}" onclick="toggleAud('${m.id}')">${m.t}</div>`).join('');
  let fmtOpts=FORMATS.map(f=>`<option value="${f}" ${e&&e.format===f?'selected':''}>${f}</option>`).join('');
  let venOpts=VENUES.map(v=>`<option ${e&&e.place===v?'selected':''}>${v}</option>`).join('');
  if(e&&e.place&&!VENUES.includes(e.place))venOpts=`<option selected>${esc(e.place)}</option>`+venOpts;
  return `<div class="card" style="border-color:var(--gold-soft);">
    <h3>${e?'–†–µ–і–∞–Ї—Ж–Є—П –љ–∞ —Б—К–±–Є—В–Є–µ':'–Э–Њ–≤–Њ —Б—К–±–Є—В–Є–µ'}</h3>
    <label>–Ч–∞–≥–ї–∞–≤–Є–µ</label><input id="f_title" value="${esc(e?e.title:'')}" placeholder="–Э–∞–њ—А. –У–∞—Б—В—А–Њ–љ–Њ–Љ–Є—З–µ—Б–Ї–∞ –≤–µ—З–µ—А"/>
    <div class="row2"><div><label>–§–Њ—А–Љ–∞—В</label><select id="f_format">${fmtOpts}</select></div>
      <div><label>–Ь—П—Б—В–Њ / –Ј–∞–ї–∞</label><select id="f_place">${venOpts}</select></div></div>
    <div class="row2"><div><label>–Э–∞—З–∞–ї–љ–∞ –і–∞—В–∞</label><input id="f_date" readonly placeholder="–і–і.–Љ–Љ.–≥–≥–≥–≥" value="${e&&e.date?isoToBg(e.date):''}" data-iso="${esc(e?(e.date||''):'')}" onclick="openCal('f_date')" style="cursor:pointer;"/></div>
      <div><label>–Ъ—А–∞–є–љ–∞ –і–∞—В–∞ (–њ–Њ –ґ–µ–ї–∞–љ–Є–µ)</label><input id="f_end_date" readonly placeholder="–і–і.–Љ–Љ.–≥–≥–≥–≥" value="${e&&e.end_date?isoToBg(e.end_date):''}" data-iso="${esc(e?(e.end_date||''):'')}" onclick="openCal('f_end_date')" style="cursor:pointer;"/></div></div>
    <div class="row2"><div><label>–Э–∞—З–∞–ї–Њ (—З–∞—Б)</label><input id="f_time" value="${esc(e?e.time:'')}" placeholder="19:30"/></div>
      <div><label>–Ъ—А–∞–є (—З–∞—Б)</label><input id="f_ends" value="${esc(e?e.ends:'')}" placeholder="22:00"/></div></div>
    <div class="row2"><div><label>–Ъ–∞–њ–∞—Ж–Є—В–µ—В</label><input id="f_cap" type="number" min="0" value="${e?e.capacity:0}"/></div>
      <div><label>–Ь–µ—Б—В–∞ –љ–∞ –Љ–∞—Б–∞ —Б–ї–µ–і —Б—К–±–Є—В–Є–µ—В–Њ</label><input id="f_tcap" type="number" min="0" value="${e&&e.table_capacity?e.table_capacity:''}" placeholder="–њ–Њ –ґ–µ–ї–∞–љ–Є–µ"/></div></div>
    <div class="row2"><div><label>–¶–µ–љ–∞ –љ–∞ –±–Є–ї–µ—В (–ї–≤.) вАФ 0 = –±–µ–Ј–њ–ї–∞—В–љ–Њ</label><input id="f_price" type="number" min="0" step="0.01" value="${e&&e.price?e.price:0}"/></div><div></div></div>

// –њ—А–Є–Њ—А–Є—В–µ—В–љ–Њ –Ј–∞–њ–Є—Б–≤–∞–љ–µ: вАЮ–Њ—В –і–∞—В–∞" –Ј–∞ –≤—Б—П–Ї–Њ –Є–Ј–±—А–∞–љ–Њ –љ–Є–≤–Њ (–њ—А–∞–Ј–љ–Њ = –≤–µ–і–љ–∞–≥–∞)
function bwSection(e){

  }).join('');
  return `<label style="margin-top:14px;">–Я—А–Є–Њ—А–Є—В–µ—В–љ–Њ –Ј–∞–њ–Є—Б–≤–∞–љ–µ вАФ вАЮ–Ј–∞–њ–Є—Б–≤–∞–љ–µ –Њ—В" –Ј–∞ –≤—Б—П–Ї–Њ –љ–Є–≤–Њ (–њ—А–∞–Ј–љ–Њ = –≤–µ–і–љ–∞–≥–∞)</label>
    <p class="muted" style="margin:2px 0 4px;font-size:12px;">–Ґ–∞–Ї–∞ –љ–∞–њ—А. Founder –Ј–∞–њ–Є—Б–≤–∞—В –≤–µ–і–љ–∞–≥–∞, Founding —Б–ї–µ–і —Б–µ–і–Љ–Є—Ж–∞, Club –Њ—Й–µ –њ–Њ-–Ї—К—Б–љ–Њ. –Т—Б–Є—З–Ї–Є –≤–Є–ґ–і–∞—В —Б—К–±–Є—В–Є–µ—В–Њ; —Б–∞–Љ–Њ –Ј–∞–њ–Є—Б–≤–∞–љ–µ—В–Њ –µ –љ–∞ –≤—К–ї–љ–Є.</p>${rows}`;
}
// –Ј–∞–њ–∞–Ј–≤–∞/–≤—А—К—Й–∞ –≤—К–≤–µ–і–µ–љ–Њ—В–Њ –≤—К–≤ —Д–Њ—А–Љ–∞—В–∞ (–Ј–∞ –і–∞ –љ–µ —Б–µ –≥—Г–±–Є –њ—А–Є –њ—А–µ–љ–∞—З–µ—А—В–∞–≤–∞–љ–µ)
function grabForm(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:null;};
  const live=document.getElementById('f_live');
  const date=document.getElementById('f_date');
  const ed=document.getElementById('f_end_date');
  const bw={};document.querySelectorAll('.bwfield').forEach(el=>{bw[el.dataset.mem]=el.dataset.iso||'';});
  return {title:g('f_title'),format:g('f_format'),place:g('f_place'),time:g('f_time'),ends:g('f_ends'),
    dateIso:date?(date.dataset.iso||''):'',endDateIso:ed?(ed.dataset.iso||''):'',cap:g('f_cap'),tcap:g('f_tcap'),price:g('f_price'),stream:g('f_stream'),live:live?live.checked:false,bw};
}
function putForm(v){
  if(!v)return;
  const s=(id,val)=>{const el=document.getElementById(id);if(el&&val!=null)el.value=val;};
  s('f_title',v.title);s('f_format',v.format);s('f_place',v.place);s('f_time',v.time);s('f_ends',v.ends);
  s('f_cap',v.cap);s('f_tcap',v.tcap);s('f_price',v.price);s('f_stream',v.stream);
  const date=document.getElementById('f_date');
  if(date){date.dataset.iso=v.dateIso||'';date.value=v.dateIso?isoToBg(v.dateIso):'';}
  const ed=document.getElementById('f_end_date');
  if(ed){ed.dataset.iso=v.endDateIso||'';ed.value=v.endDateIso?isoToBg(v.endDateIso):'';}
  if(v.bw)Object.keys(v.bw).forEach(mem=>{const el=document.getElementById('f_bw_'+mem);if(el){el.dataset.iso=v.bw[mem]||'';el.value=v.bw[mem]?isoToBg(v.bw[mem]):'';}});
  const live=document.getElementById('f_live');if(live)live.checked=!!v.live;
}
function toggleAud(id){
  const v=grabForm();
  if(id==='all'){draftAud=['all'];}
  else{draftAud=draftAud.filter(x=>x!=='all');
    if(draftAud.includes(id))draftAud=draftAud.filter(x=>x!==id); else draftAud.push(id);
    if(!draftAud.length)draftAud=['all'];}
  render();
  putForm(v);
}

// ---------- –µ–≤—А–Њ–њ–µ–є—Б–Ї–Є –Ї–∞–ї–µ–љ–і–∞—А (–њ–Њ–љ–µ–і–µ–ї–љ–Є–Ї = –њ—К—А–≤–Є –і–µ–љ) ----------
function isoToBg(iso){if(!iso)return'';const p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
let calM=null,calTarget='f_date';
function openCal(field){
  calTarget=field||'f_date';
  const inp=document.getElementById(calTarget);
  const base=inp.dataset.iso?new Date(inp.dataset.iso+'T00:00:00'):new Date();
  calM={y:base.getFullYear(),m:base.getMonth()};
  drawCal();
}
function calNav(d){calM.m+=d;if(calM.m<0){calM.m=11;calM.y--;}if(calM.m>11){calM.m=0;calM.y++;}drawCal();}
function drawCal(){
  closeCal();
  const inp=document.getElementById(calTarget);if(!inp)return;
  const months=['—П–љ—Г–∞—А–Є','—Д–µ–≤—А—Г–∞—А–Є','–Љ–∞—А—В','–∞–њ—А–Є–ї','–Љ–∞–є','—О–љ–Є','—О–ї–Є','–∞–≤–≥—Г—Б—В','—Б–µ–њ—В–µ–Љ–≤—А–Є','–Њ–Ї—В–Њ–Љ–≤—А–Є','–љ–Њ–µ–Љ–≤—А–Є','–і–µ–Ї–µ–Љ–≤—А–Є'];
  const wd=['–њ–љ','–≤—В','—Б—А','—З—В','–њ—В','—Б–±','–љ–і'];
  const first=new Date(calM.y,calM.m,1);
  const off=(first.getDay()+6)%7; // –њ–Њ–љ–µ–і–µ–ї–љ–Є–Ї –њ—К—А–≤–Є
  const dim=new Date(calM.y,calM.m+1,0).getDate();
  const t=new Date();
  const tIso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const sel=inp.dataset.iso||'';
  let cells=wd.map((w,i)=>`<div style="font-size:11px;color:${i>4?'#c08a6e':'#9a8f7a'};text-align:center;padding:4px 0;">${w}</div>`).join('');
  for(let i=0;i<off;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const iso=calM.y+'-'+String(calM.m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=iso===sel?'background:#c46a4a;color:#fffdf4;':(iso===tIso?'box-shadow:inset 0 0 0 1px #c46a4a;color:#c46a4a;':'');
    cells+=`<div onclick="pickDate('${iso}')" style="text-align:center;padding:7px 0;border-radius:9px;cursor:pointer;font-size:13px;${st}">${d}</div>`;
  }
  const pop=document.createElement('div');pop.id='acac-cal';
  pop.style.cssText='position:absolute;z-index:999;background:#fffaf0;border:1px solid #e6d9bd;border-radius:16px;box-shadow:0 10px 26px rgba(0,0,0,.14);padding:12px;width:266px;';
  pop.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <button type="button" onclick="calNav(-1)" style="border:0;background:none;cursor:pointer;font-size:17px;padding:4px 12px;">вАє</button>
      <b style="font-size:13px;">${months[calM.m]} ${calM.y}</b>
      <button type="button" onclick="calNav(1)" style="border:0;background:none;cursor:pointer;font-size:17px;padding:4px 12px;">вАЇ</button></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">${cells}</div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;">
      <button type="button" onclick="pickDate('${tIso}')" style="border:0;background:none;cursor:pointer;color:#c46a4a;font-size:12px;">–Ф–љ–µ—Б</button>
      <button type="button" onclick="pickDate('')" style="border:0;background:none;cursor:pointer;color:#9a8f7a;font-size:12px;">–Ш–Ј—З–Є—Б—В–Є</button></div>`;
  const r=inp.getBoundingClientRect();
  pop.style.left=(r.left+window.scrollX)+'px';pop.style.top=(r.bottom+window.scrollY+6)+'px';
  document.body.appendChild(pop);
  setTimeout(()=>{document.addEventListener('mousedown',calOutside);},0);
}
function calOutside(ev){
  const p=document.getElementById('acac-cal');
  if(p&&!p.contains(ev.target)&&ev.target.id!==calTarget)closeCal();
}
function closeCal(){
  const p=document.getElementById('acac-cal');
  if(p){p.remove();document.removeEventListener('mousedown',calOutside);}
}
function pickDate(iso){
  const inp=document.getElementById(calTarget);
  if(inp){inp.dataset.iso=iso;inp.value=iso?isoToBg(iso):'';}
  closeCal();
}
function editEvent(id){editId=id;tab='events';const e=EVENTS.find(x=>x.id===id);draftAud=e.aud==='all'?['all']:e.aud.slice();render();window.scrollTo(0,0);}

async function saveEvent(){

  const keep=document.getElementById('f_media_keep');

    const u=await DB.uploadMedia(imgF.files[0]); if(u.error){alert('–°–љ–Є–Љ–Ї–∞—В–∞ –љ–µ —Б–µ –Ї–∞—З–Є: '+u.error.message);if(saveBtn)saveBtn.textContent='–Ч–∞–њ–∞–Ј–Є';return;} imgUrl=u.url; }
  if(vidF&&vidF.files[0]){ if(saveBtn)saveBtn.textContent='–Ъ–∞—З–≤–∞–љ–µ –љ–∞ –≤–Є–і–µ–ЊвА¶';
    const u=await DB.uploadMedia(vidF.files[0]); if(u.error){alert('–Т–Є–і–µ–Њ—В–Њ –љ–µ —Б–µ –Ї–∞—З–Є: '+u.error.message);if(saveBtn)saveBtn.textContent='–Ч–∞–њ–∞–Ј–Є';return;} vidUrl=u.url; }
  const dIso=document.getElementById('f_date').dataset.iso||'';
  const edIso=document.getElementById('f_end_date').dataset.iso||'';
  if(edIso&&dIso&&edIso<dIso){alert('–Ъ—А–∞–є–љ–∞—В–∞ –і–∞—В–∞ –µ –њ—А–µ–і–Є –љ–∞—З–∞–ї–љ–∞—В–∞');return;}
  const obj={title,format:document.getElementById('f_format').value,place:document.getElementById('f_place').value.trim(),
    date:dIso,end_date:edIso,time:document.getElementById('f_time').value.trim(),ends:document.getElementById('f_ends').value.trim(),
    capacity:parseInt(document.getElementById('f_cap').value||'0',10),
    table_capacity:parseInt(document.getElementById('f_tcap').value||'0',10),
    price:parseFloat(document.getElementById('f_price').value||'0')||0,
    booking_windows:(()=>{const bw={};document.querySelectorAll('.bwfield').forEach(el=>{if(el.dataset.iso)bw[el.dataset.mem]=el.dataset.iso;});return Object.keys(bw).length?bw:null;})(),
    image_url:imgUrl,video_url:vidUrl,
    stream_url:document.getElementById('f_stream').value.trim(),
    is_live:document.getElementById('f_live').checked,
    aud:draftAud.includes('all')?'all':draftAud.slice()};
  const r=editId?await DB.updateEvent(editId,obj):await DB.addEvent(obj);
  if(r&&r.error){alert('–°—К–±–Є—В–Є–µ—В–Њ –љ–µ —Б–µ –Ј–∞–њ–Є—Б–∞: '+r.error.message);return;}

    const em=r.email||(info&&info.email)||'';
    const ph=r.phone||(info&&info.phone)||'';

        <div><label style="margin-bottom:4px;">–Ґ–µ–ї–µ—Д–Њ–љ</label><input id="phf_${p.id}" value="${esc(p.phone||'')}" placeholder="+359 ..."/></div>
        <div style="display:flex;flex-direction:column;gap:6px;"><button class="btn ghost sm" onclick="savePhone('${p.id}')">–Ч–∞–њ–∞–Ј–Є —В–µ–ї–µ—Д–Њ–љ–∞</button>
          <button class="btn ghost sm" onclick="requestPhone('${p.id}','${esc(nm)}')">–Я–Њ–Є—Б–Ї–∞–є –љ–Њ–≤ —В–µ–ї–µ—Д–Њ–љ</button></div>
      </div>
      ${p.role==='admin'?'':`<button class="btn no sm" style="margin-top:8px;" onclick="deletePerson('${p.id}','${esc(nm)}',${(p.company_id&&p.company_id===p.id)?PEOPLE.filter(x=>x.company_id===p.id&&x.id!==p.id).length:0})">–Ш–Ј—В—А–Є–є —З–ї–µ–љ–∞</button>`}</div>`;
  };
  // –Ј–∞ –Ї–Њ—А–њ–Њ—А–∞—В–Є–≤–љ–Є—В–µ: –Њ—Б–љ–Њ–≤–µ–љ –њ—А–Њ—Д–Є–ї + –≤–ї–Њ–ґ–µ–љ–Є –њ–Њ–і-–њ—А–Њ—Д–Є–ї–Є
  const corpBlock=list=>{
    const owners=list.filter(p=>!p.company_id||p.company_id===p.id);
    const subsBy={};list.forEach(p=>{if(p.company_id&&p.company_id!==p.id){(subsBy[p.company_id]=subsBy[p.company_id]||[]).push(p);}});
    let h='';
    owners.forEach(o=>{
      const subs=subsBy[o.id]||[];
      const sid='co_'+o.id;
      h+=personRow(o);
      if(subs.length){
        h+=`<button class="btn ghost sm" style="margin:0 0 6px 14px;" onclick="toggleCo('${sid}',this)">–Я—А–Њ—Д–Є–ї–Є –Ї—К–Љ —Д–Є—А–Љ–∞—В–∞ (${subs.length}) вЦЊ</button>
          <div id="${sid}" style="display:none;padding-left:14px;border-left:2px solid var(--gold-soft);margin-bottom:6px;">${subs.map(personRow).join('')}</div>`;
      }
    });
    // –њ–Њ–і-–њ—А–Њ—Д–Є–ї–Є –±–µ–Ј –љ–∞–Љ–µ—А–µ–љ —Б–Њ–±—Б—В–≤–µ–љ–Є–Ї (–Ј–∞ –≤—Б–µ–Ї–Є —Б–ї—Г—З–∞–є)
    const ownerIds=owners.map(o=>o.id);
    const orphans=list.filter(p=>p.company_id&&p.company_id!==p.id&&!ownerIds.includes(p.company_id));
    h+=orphans.map(personRow).join('');
    return h;
  };
  let html='<h2>–І–ї–µ–љ–Њ–≤–µ</h2>';
  cats.forEach((c,ci)=>{
    const list=PEOPLE.filter(p=>p.membership===c.id);
    if(!list.length)return;
    const id='pg'+ci;
    html+=`<div class="card" style="border-color:var(--gold-soft);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-top:10px;" onclick="togglePG('${id}')">
        <h3>${esc(c.t)} <span class="muted" style="font-weight:400;">¬Ј ${list.length}</span></h3>
        <span id="pa_${id}" style="color:var(--gold);">–Њ—В–≤–Њ—А–Є вЦЊ</span></div>
      <div id="${id}" style="display:none;">${c.id==='corporate'?corpBlock(list):list.map(personRow).join('')}</div>`;
  });
  return html;
}
function togglePG(id){
  const d=document.getElementById(id),a=document.getElementById('pa_'+id);
  if(!d)return;const open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  if(a)a.textContent=open?'–Њ—В–≤–Њ—А–Є вЦЊ':'–Ј–∞—В–≤–Њ—А–Є вЦі';
}
function toggleCo(id,btn){
  const d=document.getElementById(id);if(!d)return;
  const open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  if(btn)btn.textContent=btn.textContent.replace(open?'вЦі':'вЦЊ',open?'вЦЊ':'вЦі');
}
async function renewPerson(email,fieldId){
  const f=document.getElementById(fieldId);

  if(error){alert('–У—А–µ—И–Ї–∞: '+error.message);return;}
  toast('–І–ї–µ–љ—Б—В–≤–Њ—В–Њ –µ –њ–Њ–і–љ–Њ–≤–µ–љ–Њ –і–Њ '+(until?isoToBg(until):'вАФ'));

}
async function deletePerson(id,name,subCount){
  let msg='–Ф–∞ –Є–Ј—В—А–Є—П –ї–Є вАЮ'+name+'"? –Ґ–Њ–≤–∞ —В—А–Є–µ –∞–Ї–∞—Г–љ—В–∞, —А–µ–Ј–µ—А–≤–∞—Ж–Є–Є—В–µ –Є –і–Њ—Б—В—К–њ–∞ –Љ—Г. –Ф–µ–є—Б—В–≤–Є–µ—В–Њ –µ –љ–µ–Њ–±—А–∞—В–Є–Љ–Њ.';
  if(subCount>0)msg='вАЮ'+name+'" –µ –Њ—Б–љ–Њ–≤–µ–љ —Д–Є—А–Љ–µ–љ –њ—А–Њ—Д–Є–ї. –Ш–Ј—В—А–Є–≤–∞–љ–µ—В–Њ —Й–µ –њ—А–µ–Љ–∞—Е–љ–µ –Ш '+subCount+' —Б–≤—К—А–Ј–∞–љ–Є –њ—А–Њ—Д–Є–ї–∞ (—Ж—П–ї–∞—В–∞ —Д–Є—А–Љ–∞). –°–Є–≥—Г—А–љ–Є –ї–Є —Б—В–µ? –Ф–µ–є—Б—В–≤–Є–µ—В–Њ –µ –љ–µ–Њ–±—А–∞—В–Є–Љ–Њ.';
  if(!confirm(msg))return;
  const {error}=await DB.deleteMember(id);
  if(error){alert('–У—А–µ—И–Ї–∞: '+error.message);return;}
  toast('–Ш–Ј—В—А–Є—В–Њ');
  PEOPLE=await DB.listMembers();render();
}

function membersView(){
  let rows=MEMBERS.map(m=>{

    ? `<div class="card" style="border-color:var(--gold-soft);">

        <p class="muted" style="margin:6px 0 8px;">–Ш–Ј–њ—А–∞—Й–∞ –Є–Љ–µ–є–ї —Б –њ–Њ–Ї–∞–љ–∞; —З–Њ–≤–µ–Ї—К—В —Б–∞–Љ —Б–Є –Ј–∞–і–∞–≤–∞ –њ–∞—А–Њ–ї–∞ –Њ—В –ї–Є–љ–Ї–∞.</p>

        <div class="row2"><div><label>–Ш–Љ–µ (–њ–Њ –ґ–µ–ї–∞–љ–Є–µ)</label><input id="iv_user"/></div>
          <div><label>–Ъ–∞—В–µ–≥–Њ—А–Є—П</label><select id="iv_mem">${memOpts}</select></div></div>
        <label>–І–ї–µ–љ—Б—В–≤–Њ –≤–∞–ї–Є–і–љ–Њ –Њ—В (1 –≥–Њ–і–Є–љ–∞ –љ–∞–њ—А–µ–і)</label>
        <input id="iv_from" readonly placeholder="–і–і.–Љ–Љ.–≥–≥–≥–≥ (–њ–Њ –њ–Њ–і—А–∞–Ј–±–Є—А–∞–љ–µ –і–љ–µ—Б)" data-iso="" onclick="openCal('iv_from')" style="cursor:pointer;"/>

    : `<div class="card"><h3>–Я–Њ–Ї–∞–љ–Є —З–ї–µ–љ</h3><p class="muted" style="margin-top:6px;">–Э–∞–ї–Є—З–љ–Њ —Б–ї–µ–і —Б–≤—К—А–Ј–≤–∞–љ–µ –љ–∞ Supabase –Є –Ї–∞—З–≤–∞–љ–µ –љ–∞ —Д—Г–љ–Ї—Ж–Є—П—В–∞ <code>invite-member</code> (–≤–Є–ґ ADMIN-README).</p></div>`;
  const resetCard=DB.live
    ? `<div class="card">
        <h3>–Э–Њ–≤–∞ –њ–∞—А–Њ–ї–∞ –љ–∞ —З–ї–µ–љ</h3>
        <p class="muted" style="margin:6px 0 8px;">–Р–Ї–Њ —З–ї–µ–љ –µ –Ј–∞–±—А–∞–≤–Є–ї –њ–∞—А–Њ–ї–∞—В–∞ —Б–Є вАФ –≥–µ–љ–µ—А–Є—А–∞ –љ–Њ–≤–∞ –≤—А–µ–Љ–µ–љ–љ–∞, –Ї–Њ—П—В–Њ –Љ—Г –і–∞–≤–∞—В–µ.</p>
        <label>–Ш–Љ–µ–є–ї –љ–∞ —З–ї–µ–љ–∞</label><input id="rp_email" type="email" placeholder="name@example.com"/>
        <button class="btn ghost" style="margin-top:10px;" onclick="doReset()">–У–µ–љ–µ—А–Є—А–∞–є –љ–Њ–≤–∞ –њ–∞—А–Њ–ї–∞</button></div>`
    : '';
  const renewCard=DB.live
    ? `<div class="card" style="border-color:var(--gold-soft);">
        <h3>–Я–Њ–і–љ–Њ–≤–Є —З–ї–µ–љ—Б—В–≤–Њ</h3>
        <p class="muted" style="margin:6px 0 8px;">–£–і—К–ї–ґ–∞–≤–∞ —З–ї–µ–љ—Б—В–≤–Њ—В–Њ —Б 1 –≥–Њ–і–Є–љ–∞ –Њ—В –Є–Ј–±—А–∞–љ–∞—В–∞ –і–∞—В–∞ (–њ–Њ –њ–Њ–і—А–∞–Ј–±–Є—А–∞–љ–µ –і–љ–µ—Б).</p>
        <label>–Ш–Љ–µ–є–ї –љ–∞ —З–ї–µ–љ–∞</label><input id="rn_email" type="email" placeholder="name@example.com"/>
        <label>–Т–∞–ї–Є–і–љ–Њ –Њ—В</label>
        <input id="rn_from" readonly placeholder="–і–і.–Љ–Љ.–≥–≥–≥–≥ (–њ–Њ –њ–Њ–і—А–∞–Ј–±–Є—А–∞–љ–µ –і–љ–µ—Б)" data-iso="" onclick="openCal('rn_from')" style="cursor:pointer;"/>
        <button class="btn" style="margin-top:12px;" onclick="doRenew()">–Я–Њ–і–љ–Њ–≤–Є —Б 1 –≥–Њ–і–Є–љ–∞</button></div>`
    : '';
  return `<h2>–І–ї–µ–љ–Њ–≤–µ –Є –≤–Є–і–Є–Љ–Њ—Б—В</h2>
    ${inviteCard}
    ${renewCard}
    ${resetCard}
    <div class="card"><p class="muted" style="margin-bottom:12px;">–Ъ–Њ–ї–Ї–Њ –Њ—В —В–µ–Ї—Г—Й–Є—В–µ —Б—К–±–Є—В–Є—П –≤–Є–ґ–і–∞ –≤—Б—П–Ї–∞ –Ї–∞—В–µ–≥–Њ—А–Є—П —Б–њ–Њ—А–µ–і –Ј–∞–і–∞–і–µ–љ–∞—В–∞ –≤–Є–і–Є–Љ–Њ—Б—В.</p>
    <table><thead><tr><th>–Ъ–∞—В–µ–≥–Њ—А–Є—П</th><th>–Т–Є–ґ–і–∞ —Б—К–±–Є—В–Є—П</th></tr></thead><tbody>${rows}</tbody></table></div>

}
async function doReset(){
  const email=document.getElementById('rp_email').value.trim();
  if(!email){alert('–Т—К–≤–µ–і–Є –Є–Љ–µ–є–ї');return;}
  const {error,password}=await DB.adminResetPassword(email);
  if(error){alert('–У—А–µ—И–Ї–∞: '+error.message);return;}
  alert('–Э–Њ–≤–∞ –≤—А–µ–Љ–µ–љ–љ–∞ –њ–∞—А–Њ–ї–∞ –Ј–∞ '+email+':\n\n'+password+'\n\n–Ф–∞–є—В–µ —П –љ–∞ —З–ї–µ–љ–∞ вАФ –њ–Њ—Б–ї–µ –Љ–Њ–ґ–µ –і–∞ —П —Б–Љ–µ–љ–Є –Њ—В –њ—А–Њ—Д–Є–ї–∞ —Б–Є.');
  document.getElementById('rp_email').value='';
}
async function doInvite(){
  const email=document.getElementById('iv_email').value.trim();
  if(!email){alert('–Т—К–≤–µ–і–Є –Є–Љ–µ–є–ї');return;}
  const username=document.getElementById('iv_user').value.trim();
  const membership=document.getElementById('iv_mem').value;
  const validFrom=document.getElementById('iv_from').dataset.iso||'';
  const {error,password,until}=await DB.inviteMember(email,username,membership,validFrom);
  if(error){alert('–У—А–µ—И–Ї–∞: '+error.message);return;}
  const untilTxt=until?'\n–І–ї–µ–љ—Б—В–≤–Њ –≤–∞–ї–Є–і–љ–Њ –і–Њ: '+isoToBg(until):'';
  alert((password
    ?('–Р–Ї–∞—Г–љ—В—К—В –µ —Б—К–Ј–і–∞–і–µ–љ!\n\n–Ш–Љ–µ–є–ї: '+email+'\n–Т—А–µ–Љ–µ–љ–љ–∞ –њ–∞—А–Њ–ї–∞: '+password)
    :('–Я–Њ–Ї–∞–љ–∞—В–∞ –µ –Є–Ј–њ—А–∞—В–µ–љ–∞ –љ–∞ '+email+'.\n–І–Њ–≤–µ–Ї—К—В —Й–µ –њ–Њ–ї—Г—З–Є –Є–Љ–µ–є–ї —Б –ї–Є–љ–Ї, –Њ—В –Ї–Њ–є—В–Њ —Б–∞–Љ —Б–Є –Ј–∞–і–∞–≤–∞ –њ–∞—А–Њ–ї–∞ –Є –≤–ї–Є–Ј–∞.'))+untilTxt);
  document.getElementById('iv_email').value='';document.getElementById('iv_user').value='';
}
async function doRenew(){
  const email=document.getElementById('rn_email').value.trim();
  if(!email){alert('–Т—К–≤–µ–і–Є –Є–Љ–µ–є–ї');return;}
  const validFrom=document.getElementById('rn_from').dataset.iso||'';
  const {error,until}=await DB.renewMembership(email,validFrom);
  if(error){alert('–У—А–µ—И–Ї–∞: '+error.message);return;}
  alert('–І–ї–µ–љ—Б—В–≤–Њ—В–Њ –љ–∞ '+email+' –µ –њ–Њ–і–љ–Њ–≤–µ–љ–Њ.\n–Т–∞–ї–Є–і–љ–Њ –і–Њ: '+(until?isoToBg(until):'вАФ'));
  document.getElementById('rn_email').value='';
  const f=document.getElementById('rn_from');if(f){f.dataset.iso='';f.value='';}
}

function gate(){
  const live=DB.live;
  root.innerHTML=`<div class="gate">
    <div class="ring"><span>AC¬≤</span></div>
    <h1>–Р–і–Љ–Є–љ –њ–∞–љ–µ–ї</h1>
    <div class="f">
      <input id="a_user" placeholder="${live?'–Ш–Љ–µ–є–ї':'–Я–Њ—В—А–µ–±–Є—В–µ–ї—Б–Ї–Њ –Є–Љ–µ'}" onkeydown="if(event.key==='Enter')doLogin()"/>
      <input id="a_pass" type="password" placeholder="–Я–∞—А–Њ–ї–∞" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="btn" style="width:100%;" onclick="doLogin()">–Т—Е–Њ–і</button>
      <div class="muted" style="margin-top:12px;">${live?'–Т—Е–Њ–і —Б –∞–і–Љ–Є–љ –∞–Ї–∞—Г–љ—В (role=admin)':'–Ф–µ–Љ–Њ –і–Њ—Б—В—К–њ: <span style="color:var(--gold);">admin / admin</span>'}</div>
    </div></div>`;
}
async function doLogin(){
  const u=document.getElementById('a_user').value;
  const p=document.getElementById('a_pass').value;
  if(DB.live){
    const {error}=await DB.signIn(u,p);
    if(error){alert('–У—А–µ—И–µ–љ –≤—Е–Њ–і: '+error.message);return;}
    const me=await DB.getUser();
    if(!me||me.role!=='admin'){alert('–Ґ–Њ–Ј–Є –∞–Ї–∞—Г–љ—В –љ—П–Љ–∞ –∞–і–Љ–Є–љ –њ—А–∞–≤–∞.');await DB.signOut();return;}
    admin=true;await refresh();render();
  }else{
    if((u||'').trim().toLowerCase()!=='admin'||(p||'').trim()!=='admin'){alert('–У—А–µ—И–љ–Њ –Є–Љ–µ –Є–ї–Є –њ–∞—А–Њ–ї–∞');return;}
    admin=true;localStorage.setItem('acac_admin','1');await refresh();render();
  }
}
async function logout(){
  if(DB.live)await DB.signOut(); else localStorage.removeItem('acac_admin');
  admin=false;render();
}
