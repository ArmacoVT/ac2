<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<!-- Sentry — мониторинг на грешки -->
<script src="https://js-de.sentry-cdn.com/e5ac0f5176655a8ad5d8c2cf1447a7c6.min.js" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f6efe2" />
<title>Arcus Club · Админ панел</title>
<link rel="icon" href="favicon.png" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f6efe2;--surface:#fffaf0;--gold:#c8643c;--gold-soft:#b07a4a;--cream:#3a2c23;--text:#5a4a3c;
    --mid:#8a6f5c;--muted:#a8927c;--line:rgba(58,44,35,0.16);--ok:#4f7a43;--warn:#b5532f;--serif:'Cormorant Garamond',Georgia,serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 60px;}
  .top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;background:rgba(246,239,226,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin-bottom:18px;}
  .top .b{font-family:var(--serif);color:var(--gold);font-size:19px;letter-spacing:1px;}
  .top .b small{color:var(--mid);font-size:12px;letter-spacing:0;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:22px;padding:8px 16px;font-size:14px;cursor:pointer;font-family:inherit;}
  .tab.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
  h2{font-family:var(--serif);color:var(--cream);font-weight:500;font-size:22px;margin-bottom:12px;}
  h3{color:var(--cream);font-size:16px;font-weight:500;}
  label{display:block;color:var(--mid);font-size:13px;margin:10px 0 5px;}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:11px;color:var(--cream);font-size:15px;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-soft);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--gold);}
  .btn.sm{padding:7px 13px;font-size:13px;border-radius:18px;}
  .btn.ok{background:var(--ok);color:#fff;}
  .btn.no{background:transparent;border:1px solid var(--warn);color:#d98b6e;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .ck{border:1px solid var(--line);border-radius:20px;padding:7px 13px;font-size:13px;cursor:pointer;user-select:none;}
  .ck.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600;}
  .pill{display:inline-block;font-size:11px;letter-spacing:1px;border:1px solid var(--gold);color:var(--gold);border-radius:14px;padding:2px 9px;}
  .pill.audAll{border-color:var(--ok);color:#3f6235;}
  .muted{color:var(--muted);font-size:13px;}
  .badge{font-size:11px;border-radius:12px;padding:2px 10px;border:1px solid var(--line);color:var(--mid);}
  .badge.live{border-color:var(--ok);color:#3f6235;}
  .gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
  .gate .ring{width:120px;height:120px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .gate .ring span{font-family:var(--serif);color:var(--gold);font-size:38px;}
  .gate h1{font-family:var(--serif);color:var(--cream);font-size:26px;font-weight:500;margin-top:20px;}
  .gate .f{width:100%;max-width:300px;margin-top:24px;}
  .gate input{margin-bottom:11px;}
  .empty{color:var(--muted);font-style:italic;padding:8px 0;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--mid);font-weight:500;padding:8px;border-bottom:1px solid var(--line);}
  td{padding:8px;border-bottom:1px solid var(--line);color:var(--text);}
</style>
</head>
<body>
<div id="root" style="padding:40px;text-align:center;color:var(--muted);">Зареждане…</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script>
const MEMBERS=[{id:'founder',t:'Founder'},{id:'founding',t:'Founding Member'},{id:'club',t:'Club Member'},{id:'alumni',t:'Alumni Member'},{id:'corporate',t:'Corporate Member'}];
const FORMATS=['culture','cinema','table','music','conversation','community','theater','online'];
const FMT_LABEL={culture:'AC² Culture',cinema:'AC² Cinema',table:'AC² Table',music:'AC² Music',conversation:'AC² Conversation',community:'AC² Community',theater:'AC² Theater',online:'AC² Online'};
const VENUES=['Ресторант','Камерна зала','Онлайн','Изложбено фоайе','VIP зала'];
const memName=id=>(MEMBERS.find(m=>m.id===id)||{t:id}).t;
const esc=s=>(''+(s??'')).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

let tab='events', editId=null, draftAud=['all'], admin=false;
let EVENTS=[], RES=[];
const root=document.getElementById('root');

async function boot(){
  if(DB.live){ const u=await DB.getUser(); admin=!!(u&&u.role==='admin'); }
  else { admin=localStorage.getItem('acac_admin')==='1'; }
  if(admin) await refresh();
  render();
}
async function refresh(){
  try{ EVENTS=await DB.listEvents(); }catch(e){ EVENTS=[]; }
  try{ RES=await DB.listReservations(); }catch(e){ RES=[]; }
  try{ APPS=await DB.listApplications(); }catch(e){ APPS=APPS||[]; }
}

function tabBadge(n){return n?` <span style="background:#b5532f;color:#fffdf4;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;vertical-align:middle;">${n}</span>`:'';}
function render(){
  if(!admin){gate();return;}
  const badge=DB.live?`<span class="badge live">Свързан Supabase</span>`:`<span class="badge">Демо режим</span>`;
  let h=`<div class="wrap">
    <div class="top"><div class="b">AC² · Админ панел<br><small>American College Arcus Club</small></div>
      <div style="display:flex;gap:10px;align-items:center;">${badge}<button class="btn ghost sm" onclick="logout()">Изход</button></div></div>
    <div class="tabs">
      <button class="tab ${tab==='events'?'on':''}" onclick="setTab('events')">Събития</button>
      <button class="tab ${tab==='res'?'on':''}" onclick="setTab('res')">Резервации${tabBadge(RES.filter(r=>!r.status||r.status==='requested').length)}</button>
      <button class="tab ${tab==='people'?'on':''}" onclick="setTab('people')">Членове</button>
      <button class="tab ${tab==='apps'?'on':''}" onclick="setTab('apps')">Кандидатури${tabBadge((APPS||[]).filter(a=>(a.status||'new')==='new').length)}</button>
      <button class="tab ${tab==='ann'?'on':''}" onclick="setTab('ann')">Новини</button>
      <button class="tab ${tab==='archive'?'on':''}" onclick="setTab('archive')">Архив</button>
      <button class="tab ${tab==='members'?'on':''}" onclick="setTab('members')">Видимост по членство</button>
      <button class="tab ${tab==='stats'?'on':''}" onclick="setTab('stats')">Статистика</button>
      <button class="tab ${tab==='audit'?'on':''}" onclick="setTab('audit')">Журнал</button>
    </div>`;
  if(tab==='events')h+=eventsView();
  else if(tab==='res')h+=resView();
  else if(tab==='people')h+=peopleView();
  else if(tab==='apps')h+=appsView();
  else if(tab==='ann')h+=announcementsView();
  else if(tab==='archive')h+=archiveAdminView();
  else if(tab==='stats')h+=statsView();
  else if(tab==='audit')h+=auditView();
  else h+=membersView();
  h+=`</div>`;
  root.innerHTML=h;
  if(tab==='stats')setTimeout(animateCounts,30);
}
function animateCounts(){
  document.querySelectorAll('.countup').forEach(el=>{
    const to=parseInt(el.dataset.to||'0',10);
    if(!to){el.textContent='0';return;}
    const dur=700,start=performance.now();
    const step=now=>{const p=Math.min(1,(now-start)/dur);
      el.textContent=Math.round(to*(1-Math.pow(1-p,3)));
      if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);
  });
}
let PEOPLE=null,APPS=null,PHONES=null,ANN=null,AUDIT=null,annAud='all',annTitleDraft='',annBodyDraft='',annMemPicked=[],annUserPicked=[],annUserFilter='';
async function annSetAud(v){
  const t=document.getElementById('annTitle'); if(t)annTitleDraft=t.value;
  const b=document.getElementById('annBody'); if(b)annBodyDraft=b.value;
  annAud=v; render();
  if(v==='specific'&&(!PEOPLE||!PEOPLE.length)){ try{PEOPLE=await DB.listMembers();}catch(e){} render(); }
}
function annMemChipsHTML(){ return MEMBERS.map(m=>`<span class="annchip${annMemPicked.includes(m.id)?' on':''}" onclick="annToggleMem('${m.id}')">${m.t}</span>`).join(''); }
function annToggleMem(id){ const i=annMemPicked.indexOf(id); if(i>-1)annMemPicked.splice(i,1); else annMemPicked.push(id); const c=document.getElementById('annMemChips'); if(c)c.innerHTML=annMemChipsHTML(); }
async function annReloadUsers(){
  PEOPLE=await DB.listMembers();
  const l=document.getElementById('annUserList'); if(l)l.innerHTML=annUserListHTML();
  const c=document.getElementById('annUserCount'); if(c)c.textContent=annUserPicked.length;
}
function annUserListHTML(){
  const people=(PEOPLE||[]);
  if(!people.length){
    const err=(typeof window!=='undefined'&&window.__membersErr)?window.__membersErr:'';
    const msg=err?('Грешка при зареждане: '+esc(err)):'Зареждане…';
    return '<div class="muted" style="padding:10px;">'+msg+' <button class="btn ghost sm" style="margin-left:8px;" onclick="annReloadUsers()">Опитай пак</button></div>';
  }
  const q=(annUserFilter||'').toLowerCase().trim();
  const rows=people.filter(p=>((p.full_name||p.username||p.email||'').toLowerCase().indexOf(q)>-1));
  if(!rows.length) return '<div class="muted" style="padding:10px;">Няма съвпадение</div>';
  return rows.map(p=>`<div class="annrow" onclick="annToggleUser('${p.id}')"><span class="annbox${annUserPicked.includes(p.id)?' ck':''}"></span>${esc(p.full_name||p.username||p.email||'')} <span class="muted">· ${esc(memName(p.membership||'guest'))}</span></div>`).join('');
}
function annToggleUser(id){ const i=annUserPicked.indexOf(id); if(i>-1)annUserPicked.splice(i,1); else annUserPicked.push(id); const l=document.getElementById('annUserList'); if(l)l.innerHTML=annUserListHTML(); const c=document.getElementById('annUserCount'); if(c)c.textContent=annUserPicked.length; }
function annFilterUsers(q){ annUserFilter=q; const l=document.getElementById('annUserList'); if(l)l.innerHTML=annUserListHTML(); }
async function loadPhones(){
  try{const list=await DB.listMembers();const m={};list.forEach(p=>{m[p.id]={email:p.email||'',phone:p.phone||''};});PHONES=m;}catch(e){PHONES={};}
}
function recArchiveFilter(){
  const q=((document.getElementById('recSearch')||{}).value||'').toLowerCase().trim();
  const y=(document.getElementById('recYear')||{}).value||'';
  const f=(document.getElementById('recFmt')||{}).value||'';
  const h=(document.getElementById('recHas')||{}).value||'';
  document.querySelectorAll('#recRows .recrow').forEach(el=>{
    const ok=(!q||el.dataset.title.includes(q))&&(!y||el.dataset.year===y)&&(!f||el.dataset.fmt===f)&&(!h||el.dataset.has===h);
    el.style.display=ok?'':'none';
  });
}
function archiveAdminView(){
  const evs=(EVENTS||[]).slice().sort((a,b)=>((a.date||'')<(b.date||'')?1:-1));
  if(!evs.length)return '<p class="muted">Няма събития.</p>';
  const years=[...new Set(evs.map(e=>(e.date||'').slice(0,4)).filter(Boolean))].sort().reverse();
  const fmts=[...new Set(evs.map(e=>e.format).filter(Boolean))];
  const yearOpts='<option value="">Всички години</option>'+years.map(y=>`<option value="${y}">${y}</option>`).join('');
  const fmtOpts='<option value="">Всички формати</option>'+fmts.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('');
  const controls=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
    <input id="recSearch" oninput="recArchiveFilter()" placeholder="Търси по заглавие…" style="flex:1;min-width:160px;"/>
    <select id="recYear" onchange="recArchiveFilter()" style="width:auto;">${yearOpts}</select>
    <select id="recFmt" onchange="recArchiveFilter()" style="width:auto;">${fmtOpts}</select>
    <select id="recHas" onchange="recArchiveFilter()" style="width:auto;"><option value="">Всички</option><option value="yes">Само със запис</option><option value="no">Без запис</option></select>
  </div>`;
  const rows=evs.map(e=>{
    const has=e.recording_url?'<span class="pill" style="border-color:#4f7a43;color:#4f7a43;">има запис</span>':'';
    return `<div class="card recrow" data-title="${esc((e.title||'').toLowerCase())}" data-year="${(e.date||'').slice(0,4)}" data-fmt="${esc(e.format||'')}" data-has="${e.recording_url?'yes':'no'}" style="margin-bottom:12px;">
      <h3>${esc(e.title)} ${has}</h3>
      <div class="muted" style="margin:3px 0 10px;font-size:12px;">${isoToBg(e.date)} · ${esc(e.format)} · видимо за: ${audLabel(e.aud)}</div>
      <label>Име на записа</label>
      <input id="rt_${e.id}" value="${esc(e.rec_title||'')}" placeholder="напр. Пълен запис"/>
      <label style="margin-top:8px;">Линк за запис (YouTube/Vimeo/файл)</label>
      <input id="ru_${e.id}" value="${esc(e.recording_url||'')}" placeholder="https://..."/>
      <div class="row2" style="margin-top:8px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;"><input type="checkbox" id="rg_${e.id}" ${e.rec_gated?'checked':''} style="width:auto;"/> Само за посетили събитието</label>
        <div><label>Цена (€) — 0 = безплатно</label><input id="rp_${e.id}" type="number" min="0" step="0.01" value="${e.rec_price||0}"/></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn ok sm" onclick="recSave('${e.id}')">Запази записа</button>
        ${e.recording_url?`<button class="btn no sm" onclick="recClear('${e.id}')">Премахни записа</button>`:''}
      </div>
    </div>`;
  }).join('');
  return `<p class="muted" style="margin-bottom:12px;">Добави запис към събитие. Появява се при членовете в „Профил → Видео архив", с достъпа на самото събитие (същите членски категории). Не изчезва след 30 дни.</p>`+controls+`<div id="recRows">${rows}</div>`;
}
async function recSave(id){
  const rec={
    rec_title:document.getElementById('rt_'+id).value.trim(),
    recording_url:document.getElementById('ru_'+id).value.trim(),
    rec_gated:document.getElementById('rg_'+id).checked,
    rec_price:parseFloat(document.getElementById('rp_'+id).value||'0')||0
  };
  const r=await DB.setRecording(id,rec);
  if(r&&r.error){alert('Записът не се запази: '+r.error.message);return;}
  try{await DB.logAudit('recording_set',rec.rec_title||rec.recording_url||'',id);}catch(e){}
  await refresh();render();
}
async function recClear(id){
  if(!confirm('Да премахна ли записа от това събитие? (събитието остава)'))return;
  const r=await DB.setRecording(id,{rec_title:'',recording_url:'',rec_gated:false,rec_price:0});
  if(r&&r.error){alert('Грешка: '+r.error.message);return;}
  try{await DB.logAudit('recording_cleared','',id);}catch(e){}
  await refresh();render();
}
async function setTab(t){tab=t;editId=null;await refresh();render();
  if(t==='people'){PEOPLE=null;render();PEOPLE=await DB.listMembers();render();}
  if((t==='res'||t==='events')&&!PHONES){await loadPhones();render();}
  if(t==='ann'){ANN=await DB.listAnnouncements();if(!PEOPLE)PEOPLE=await DB.listMembers();render();}
  if(t==='audit'){AUDIT=await DB.listAudit(300);render();}
}

function audLabel(aud){
  if(aud==='all')return `<span class="pill audAll">Всички членове</span>`;
  if(!Array.isArray(aud)||!aud.length)return `<span class="pill">никой</span>`;
  return aud.map(a=>`<span class="pill">${memName(a)}</span>`).join(' ');
}
// заети места за събитие: потвърдените резервации (и отделно чакащите)
function seatsTaken(evId){return RES.filter(r=>r.event_id===evId&&r.status==='confirmed').reduce((s,r)=>s+(r.party||1),0);}
function seatsPending(evId){return RES.filter(r=>r.event_id===evId&&(!r.status||r.status==='requested')).reduce((s,r)=>s+(r.party||1),0);}
function seatsInfo(e){
  if(!e.capacity)return '';
  const taken=seatsTaken(e.id), left=e.capacity-taken, pend=seatsPending(e.id);
  const col=left<=0?'#b5532f':(left<=Math.ceil(e.capacity*0.2)?'#bf8a2e':'#4f7a43');
  return `<span class="pill" style="border-color:${col};color:${col};">${left<=0?'няма места':'остават '+left+' от '+e.capacity}</span>`+
    (pend?` <span class="pill">${pend} чакащи</span>`:'');
}
// маси след събитието (свързани чрез table_event_id)
function tableTaken(evId){return RES.filter(r=>r.table_event_id===evId&&r.status==='confirmed').reduce((s,r)=>s+(r.party||1),0);}
function tableInfo(e){
  if(!e.table_capacity)return '';
  const taken=tableTaken(e.id), left=e.table_capacity-taken;
  const col=left<=0?'#b5532f':(left<=Math.ceil(e.table_capacity*0.2)?'#bf8a2e':'#4f7a43');
  return `<span class="pill" style="border-color:${col};color:${col};">🍽 ${left<=0?'няма маси':'маси: остават '+left+' от '+e.table_capacity}</span>`;
}
// разгъващ се списък „кой е запазил" за дадено събитие (билети + маси)
function eventResList(e){
  const tickets=RES.filter(r=>r.event_id===e.id);
  const tables=RES.filter(r=>r.table_event_id===e.id);
  const all=tickets.concat(tables);
  if(!all.length)return '';
  const stTxt={confirmed:'одобрена',declined:'отказана'};
  const stCol={confirmed:'#4f7a43',declined:'#b5532f'};
  const row=(r,isTable)=>{
    const st=r.status||'requested';
    const nm=r.name||r.who||'член';
    const info=(PHONES&&r.user_id)?PHONES[r.user_id]:null;
    const em=r.email||(info&&info.email)||'';
    const ph=r.phone||(info&&info.phone)||'';
    const contact=[em,ph].filter(Boolean).map(esc).join(' · ');
    return `<div style="padding:8px 0;border-top:1px solid var(--line-soft);">
      <div><b>${esc(nm)}</b> · ${r.party||1} ${isTable?'на маса':'места'}${isTable?' 🍽':''}
        <span style="color:${stCol[st]||'var(--muted)'};font-size:12px;"> · ${stTxt[st]||'чакаща'}</span></div>
      ${contact?`<div class="muted" style="font-size:12px;">${contact}</div>`:''}
      ${r.note&&isTable?`<div class="muted" style="font-size:12px;">„${esc(r.note)}"</div>`:''}</div>`;
  };
  const body=tickets.map(r=>row(r,false)).join('')+tables.map(r=>row(r,true)).join('');
  return `<button class="btn ghost sm" style="margin-top:10px;" onclick="toggleEvRes('${e.id}')" id="evrb_${e.id}">Запазили (${all.length}) ▾</button>
    <div id="evr_${e.id}" style="display:none;margin-top:4px;">${body}</div>`;
}
function toggleEvRes(id){
  const d=document.getElementById('evr_'+id),b=document.getElementById('evrb_'+id);
  if(!d)return;const open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  if(b)b.textContent=b.textContent.replace(open?'▴':'▾',open?'▾':'▴');
}
function admEvStartMs(e){
  if(!e.date)return null;
  const t=(e.time&&/^\d{1,2}:\d{2}/.test(e.time))?e.time.slice(0,5):'00:00';
  const p=e.date.split('-').map(Number),tt=t.split(':').map(Number);
  if(p.length<3)return null;
  return new Date(p[0],p[1]-1,p[2],tt[0]||0,tt[1]||0,0).getTime();
}
function admIsPast(e){
  const ed=e.end_date||e.date; if(!ed)return false;
  const t=(e.ends&&/^\d{1,2}:\d{2}/.test(e.ends))?e.ends.slice(0,5):'23:59';
  const p=ed.split('-').map(Number),tt=t.split(':').map(Number);
  if(p.length<3)return false;
  return Date.now()>new Date(p[0],p[1]-1,p[2],tt[0]||0,tt[1]||0,0).getTime()+2*3600000; // 2 ч след края
}
function admLiveNow(e){
  if(!e.stream_url||e.live_ended||admIsPast(e))return false;
  if(e.is_live)return true;
  if(e.live_auto){const s=admEvStartMs(e);return s&&Date.now()>=s;}
  return false;
}
function eventsView(){
  const evCard=e=>{
    const liveNow=admLiveNow(e);
    const waiting=e.stream_url&&e.live_auto&&!liveNow&&!e.live_ended&&!admIsPast(e);
    const liveBadge=liveNow?'<span class="pill" style="border-color:#d98b6e;color:#d98b6e;">● НА ЖИВО</span>'
      :(waiting?`<span class="pill">⏱ авто старт ${esc(e.time||'')}</span>`
      :(e.stream_url?'<span class="pill">стрийм готов</span>':''));
    const liveBtn=e.stream_url
      ? (liveNow?`<button class="btn no sm" onclick="toggleLive('${e.id}',false)">Спри стрийма</button>`
                  :`<button class="btn ok sm" onclick="toggleLive('${e.id}',true)">Пусни сега</button>`)
      : '';
    return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div><h3>${esc(e.title)} ${liveBadge}</h3>
        <div class="muted" style="margin-top:3px;">${esc(e.format)} · ${isoToBg(e.date)}${e.end_date?' – '+isoToBg(e.end_date):''} ${esc(e.time||'')} · ${esc(e.place||'')} · ${e.capacity||0} места · ${e.price>0?(e.price+' €/билет'):'безплатно'}</div>
        <div style="margin-top:6px;">${seatsInfo(e)} ${tableInfo(e)}</div>
        <div style="margin-top:8px;">Видимо за: ${audLabel(e.aud)}</div></div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${liveBtn}
        <button class="btn ghost sm" onclick="editEvent('${e.id}')">Редактирай</button>
        <button class="btn no sm" onclick="delEvent('${e.id}')">Изтрий</button></div>
    </div>${eventResList(e)}</div>`;};
  const up=EVENTS.filter(e=>!admIsPast(e)).sort((a,b)=>((a.date||'9999')<(b.date||'9999')?-1:1));
  const past=EVENTS.filter(e=>admIsPast(e)).sort((a,b)=>(a.date<b.date?1:-1));
  let list=up.length?up.map(evCard).join(''):`<p class="empty">Няма предстоящи събития.</p>`;
  if(past.length){
    list+=`<button class="btn ghost" style="margin-top:10px;" onclick="togglePastAdm(this)">Изминали събития (${past.length}) ▾</button>
      <div id="pastadm" style="display:none;margin-top:10px;">${past.map(evCard).join('')}</div>`;
  }
  return `<h2>Събития</h2>${formView()}${list}`;
}
function togglePastAdm(btn){const d=document.getElementById('pastadm');if(!d)return;const open=d.style.display!=='none';d.style.display=open?'none':'block';if(btn)btn.textContent=btn.textContent.replace(open?'▴':'▾',open?'▾':'▴');}

    <div class="row2"><div><label>Цена на билет (€) — 0 = безплатно</label><input id="f_price" type="number" min="0" step="0.01" value="${e&&e.price?e.price:0}"/></div><div></div></div>

    <label>Видео на събитието (по желание — качи файл)</label>
    ${e&&e.video_url?`<div style="margin-bottom:8px;"><video src="${esc(e.video_url)}" controls style="max-width:100%;border-radius:10px;"></video><div><a href="#" onclick="clearMedia('vid');return false;" style="color:#b5532f;font-size:12px;">Премахни видеото</a></div></div>`:''}
    <input id="f_vid" type="file" accept="video/*"/>

      <input type="checkbox" id="f_live" ${e&&e.is_live?'checked':''} style="width:auto;"/> На живо сега (ръчно пускане веднага)</label>

      <input type="checkbox" id="f_gated" ${(e?e.stream_gated:true)?'checked':''} style="width:auto;"/> Излъчването е само за записани/платили</label>

// приоритетно записване: „от дата" за всяко избрано ниво (празно = веднага)
function bwSection(e){
  // при „всички членове" фазите важат за всички нива; иначе само за избраните
  const list=draftAud.includes('all')?MEMBERS.map(m=>m.id):draftAud.filter(id=>id!=='all');
  if(!list.length)return '';
  const rows=list.map(id=>{
    const mem=MEMBERS.find(m=>m.id===id);
    const iso=(e&&e.booking_windows&&e.booking_windows[id])||'';
    return `<div class="row2" style="align-items:center;margin-top:6px;">
      <div style="padding-top:8px;">${mem?mem.t:id}</div>
      <div><input class="bwfield" data-mem="${id}" id="f_bw_${id}" readonly placeholder="веднага" value="${iso?isoToBg(iso):''}" data-iso="${esc(iso)}" onclick="openCal('f_bw_${id}')" style="cursor:pointer;"/></div></div>`;
  }).join('');
  return `<label style="margin-top:14px;">Приоритетно записване — „записване от" за всяко ниво (празно = веднага)</label>
    <p class="muted" style="margin:2px 0 4px;font-size:12px;">Така напр. Founder записват веднага, Founding след седмица, Club още по-късно. Всички виждат събитието; само записването е на вълни.</p>${rows}`;
}
// запазва/връща въведеното във формата (за да не се губи при преначертаване)
function grabForm(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:null;};
  const live=document.getElementById('f_live');
  const auto=document.getElementById('f_auto');
  const gated=document.getElementById('f_gated');
  const date=document.getElementById('f_date');
  const ed=document.getElementById('f_end_date');
  const bw={};document.querySelectorAll('.bwfield').forEach(el=>{bw[el.dataset.mem]=el.dataset.iso||'';});
  return {title:g('f_title'),format:g('f_format'),place:g('f_place'),time:g('f_time'),ends:g('f_ends'),
    dateIso:date?(date.dataset.iso||''):'',endDateIso:ed?(ed.dataset.iso||''):'',cap:g('f_cap'),tcap:g('f_tcap'),price:g('f_price'),stream:g('f_stream'),live:live?live.checked:false,auto:auto?auto.checked:false,gated:gated?gated.checked:false,bw};
}
// Избирачка за час: 24-часов (00–23) + минути през 5; пази стойност HH:MM в скрито поле
function timePickerHTML(id,val){
  val=(val||'').trim();
  let h='',m='';const mt=val.match(/^(\d{1,2}):(\d{2})/);
  if(mt){h=String(+mt[1]).padStart(2,'0');m=String(Math.round(+mt[2]/5)*5%60).padStart(2,'0');}
  let ho='<option value="">--</option>';
  for(let i=0;i<24;i++){const v=String(i).padStart(2,'0');ho+=`<option value="${v}"${v===h?' selected':''}>${v}</option>`;}
  let mo='<option value="">--</option>';
  for(let i=0;i<60;i+=5){const v=String(i).padStart(2,'0');mo+=`<option value="${v}"${v===m?' selected':''}>${v}</option>`;}
  return `<div style="display:flex;align-items:center;gap:6px;">
    <select id="${id}_h" onchange="syncTime('${id}')" style="flex:1;">${ho}</select>
    <b style="opacity:.5;">:</b>
    <select id="${id}_m" onchange="syncTime('${id}')" style="flex:1;">${mo}</select>
    <input type="hidden" id="${id}" value="${val}"></div>`;
}
function syncTime(id){
  const h=document.getElementById(id+'_h').value,m=document.getElementById(id+'_m').value;
  document.getElementById(id).value=h?(h+':'+(m||'00')):'';
}
function setTimeField(id,val){
  const el=document.getElementById(id);if(!el)return;el.value=val||'';
  const mt=(val||'').match(/^(\d{1,2}):(\d{2})/);
  const hs=document.getElementById(id+'_h'),ms=document.getElementById(id+'_m');
  if(hs)hs.value=mt?String(+mt[1]).padStart(2,'0'):'';
  if(ms)ms.value=mt?String(Math.round(+mt[2]/5)*5%60).padStart(2,'0'):'';
}
function putForm(v){
  if(!v)return;
  const s=(id,val)=>{const el=document.getElementById(id);if(el&&val!=null)el.value=val;};
  s('f_title',v.title);s('f_format',v.format);s('f_place',v.place);setTimeField('f_time',v.time);setTimeField('f_ends',v.ends);
  s('f_cap',v.cap);s('f_tcap',v.tcap);s('f_price',v.price);s('f_stream',v.stream);
  const date=document.getElementById('f_date');
  if(date){date.dataset.iso=v.dateIso||'';date.value=v.dateIso?isoToBg(v.dateIso):'';}
  const ed=document.getElementById('f_end_date');
  if(ed){ed.dataset.iso=v.endDateIso||'';ed.value=v.endDateIso?isoToBg(v.endDateIso):'';}
  if(v.bw)Object.keys(v.bw).forEach(mem=>{const el=document.getElementById('f_bw_'+mem);if(el){el.dataset.iso=v.bw[mem]||'';el.value=v.bw[mem]?isoToBg(v.bw[mem]):'';}});
  const live=document.getElementById('f_live');if(live)live.checked=!!v.live;
  const auto=document.getElementById('f_auto');if(auto)auto.checked=!!v.auto;
  const gated=document.getElementById('f_gated');if(gated)gated.checked=!!v.gated;
}
function toggleAud(id){
  const v=grabForm();
  if(id==='all'){draftAud=['all'];}
  else{draftAud=draftAud.filter(x=>x!=='all');
    if(draftAud.includes(id))draftAud=draftAud.filter(x=>x!==id); else draftAud.push(id);
    if(!draftAud.length)draftAud=['all'];}
  render();
  putForm(v);
}

// ---------- европейски календар (понеделник = първи ден) ----------
function isoToBg(iso){if(!iso)return'';const p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
let calM=null,calTarget='f_date';
function openCal(field){
  calTarget=field||'f_date';
  const inp=document.getElementById(calTarget);
  const base=inp.dataset.iso?new Date(inp.dataset.iso+'T00:00:00'):new Date();
  calM={y:base.getFullYear(),m:base.getMonth()};
  drawCal();
}
function calNav(d){calM.m+=d;if(calM.m<0){calM.m=11;calM.y--;}if(calM.m>11){calM.m=0;calM.y++;}drawCal();}
function drawCal(){
  closeCal();
  const inp=document.getElementById(calTarget);if(!inp)return;
  const months=['януари','февруари','март','април','май','юни','юли','август','септември','октомври','ноември','декември'];
  const wd=['пн','вт','ср','чт','пт','сб','нд'];
  const first=new Date(calM.y,calM.m,1);
  const off=(first.getDay()+6)%7; // понеделник първи
  const dim=new Date(calM.y,calM.m+1,0).getDate();
  const t=new Date();
  const tIso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const sel=inp.dataset.iso||'';
  let cells=wd.map((w,i)=>`<div style="font-size:11px;color:${i>4?'#c08a6e':'#9a8f7a'};text-align:center;padding:4px 0;">${w}</div>`).join('');
  for(let i=0;i<off;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const iso=calM.y+'-'+String(calM.m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=iso===sel?'background:#c46a4a;color:#fffdf4;':(iso===tIso?'box-shadow:inset 0 0 0 1px #c46a4a;color:#c46a4a;':'');
    cells+=`<div onclick="pickDate('${iso}')" style="text-align:center;padding:7px 0;border-radius:9px;cursor:pointer;font-size:13px;${st}">${d}</div>`;
  }
  const pop=document.createElement('div');pop.id='acac-cal';
  pop.style.cssText='position:absolute;z-index:999;background:#fffaf0;border:1px solid #e6d9bd;border-radius:16px;box-shadow:0 10px 26px rgba(0,0,0,.14);padding:12px;width:266px;';
  pop.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <button type="button" onclick="calNav(-1)" style="border:0;background:none;cursor:pointer;font-size:17px;padding:4px 12px;">‹</button>
      <b style="font-size:13px;">${months[calM.m]} ${calM.y}</b>
      <button type="button" onclick="calNav(1)" style="border:0;background:none;cursor:pointer;font-size:17px;padding:4px 12px;">›</button></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">${cells}</div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;">
      <button type="button" onclick="pickDate('${tIso}')" style="border:0;background:none;cursor:pointer;color:#c46a4a;font-size:12px;">Днес</button>
      <button type="button" onclick="pickDate('')" style="border:0;background:none;cursor:pointer;color:#9a8f7a;font-size:12px;">Изчисти</button></div>`;
  const r=inp.getBoundingClientRect();
  pop.style.left=(r.left+window.scrollX)+'px';pop.style.top=(r.bottom+window.scrollY+6)+'px';
  document.body.appendChild(pop);
  setTimeout(()=>{document.addEventListener('mousedown',calOutside);},0);
}
function calOutside(ev){
  const p=document.getElementById('acac-cal');
  if(p&&!p.contains(ev.target)&&ev.target.id!==calTarget)closeCal();
}
function closeCal(){
  const p=document.getElementById('acac-cal');
  if(p){p.remove();document.removeEventListener('mousedown',calOutside);}
}
function pickDate(iso){
  const inp=document.getElementById(calTarget);
  if(inp){inp.dataset.iso=iso;inp.value=iso?isoToBg(iso):'';}
  closeCal();
}
function editEvent(id){editId=id;tab='events';const e=EVENTS.find(x=>x.id===id);draftAud=e.aud==='all'?['all']:e.aud.slice();render();window.scrollTo(0,0);}
function cancelEdit(){editId=null;draftAud=['all'];render();}
async function delEvent(id){if(!confirm('Да изтрия ли събитието?'))return;const ev=EVENTS.find(x=>x.id===id);await DB.deleteEvent(id);DB.logAudit('event_deleted',(ev&&ev.title)||'','');await refresh();render();}
async function toggleLive(id,on){await DB.setLive(id,on);await refresh();render();}
function clearMedia(which){
  const keep=document.getElementById('f_media_keep');if(!keep)return;
  if(which==='img')keep.dataset.img='';else keep.dataset.vid='';
  alert(which==='img'?'Снимката ще се премахне при запис.':'Видеото ще се премахне при запис.');
}
async function saveEvent(){
  const title=document.getElementById('f_title').value.trim();
  if(!title){alert('Въведи заглавие');return;}
  // качване на снимка/видео, ако са избрани
  const keep=document.getElementById('f_media_keep');
  let imgUrl=keep?keep.dataset.img:'', vidUrl=keep?keep.dataset.vid:'';
  const imgF=document.getElementById('f_img'), vidF=document.getElementById('f_vid');
  const saveBtn=document.querySelector('#root .btn');
  if(imgF&&imgF.files[0]){ if(saveBtn)saveBtn.textContent='Качване на снимка…';
    const u=await DB.uploadMedia(imgF.files[0]); if(u.error){alert('Снимката не се качи: '+u.error.message);if(saveBtn)saveBtn.textContent='Запази';return;} imgUrl=u.url; }
  if(vidF&&vidF.files[0]){ if(saveBtn)saveBtn.textContent='Качване на видео…';
    const u=await DB.uploadMedia(vidF.files[0]); if(u.error){alert('Видеото не се качи: '+u.error.message);if(saveBtn)saveBtn.textContent='Запази';return;} vidUrl=u.url; }
  const dIso=document.getElementById('f_date').dataset.iso||'';
  const edIso=document.getElementById('f_end_date').dataset.iso||'';
  if(edIso&&dIso&&edIso<dIso){alert('Крайната дата е преди началната');return;}
  const obj={title,format:document.getElementById('f_format').value,place:document.getElementById('f_place').value.trim(),
    date:dIso,end_date:edIso,time:document.getElementById('f_time').value.trim(),ends:document.getElementById('f_ends').value.trim(),
    capacity:parseInt(document.getElementById('f_cap').value||'0',10),
    table_capacity:parseInt(document.getElementById('f_tcap').value||'0',10),
    price:parseFloat(document.getElementById('f_price').value||'0')||0,
    booking_windows:(()=>{const bw={};document.querySelectorAll('.bwfield').forEach(el=>{if(el.dataset.iso)bw[el.dataset.mem]=el.dataset.iso;});return Object.keys(bw).length?bw:null;})(),
    image_url:imgUrl,video_url:vidUrl,
    stream_url:document.getElementById('f_stream').value.trim(),
    is_live:document.getElementById('f_live').checked,
    live_auto:document.getElementById('f_auto')?document.getElementById('f_auto').checked:false,
    stream_gated:document.getElementById('f_gated')?document.getElementById('f_gated').checked:false,
    aud:draftAud.includes('all')?'all':draftAud.slice()};
  const r=editId?await DB.updateEvent(editId,obj):await DB.addEvent(obj);
  if(r&&r.error){alert('Събитието не се записа: '+r.error.message);return;}
  editId=null;draftAud=['all'];await refresh();render();window.scrollTo(0,0);
}

let resFilter='all';
function setResFilter(id){resFilter=id;render();}
function resView(){
  if(!RES.length)return `<h2>Резервации</h2><p class="empty">Все още няма запитвания за резервация.</p>`;
  // групиране по събитие
  const groups={};
  RES.forEach(r=>{const k=r.event_id||'other';(groups[k]=groups[k]||[]).push(r);});
  const pend=list=>list.filter(r=>!r.status||r.status==='requested').length;
  const cnt=n=>n?` <span style="display:inline-block;background:#b5532f;color:#fffdf4;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;vertical-align:middle;">${n}</span>`:'';
  let chips=`<button class="tab ${resFilter==='all'?'on':''}" onclick="setResFilter('all')">Всички${cnt(pend(RES))}</button>`;
  EVENTS.forEach(e=>{
    if(!groups[e.id])return;
    const t=e.title.length>22?e.title.slice(0,22)+'…':e.title;
    chips+=`<button class="tab ${resFilter===e.id?'on':''}" onclick="setResFilter('${e.id}')">${esc(t)}${cnt(pend(groups[e.id]))}</button>`;
  });

function csvCell(v){const s=(''+(v??'')).replace(/"/g,'""');return /[",;\n]/.test(s)?`"${s}"`:s;}
function csvDownload(name,rows){
  const csv=rows.map(r=>r.map(csvCell).join(';')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
async function exportCSV(kind){
  if(kind==='members'){
    const list=PEOPLE||await DB.listMembers();
    const rows=[['Име','Потребител','Имейл','Телефон','Членство','Валидно до','Роля']];
    list.forEach(p=>rows.push([p.full_name||'',p.username||'',p.email||'',p.phone||'',memName(p.membership||'guest'),p.membership_until||'',p.role||'member']));
    csvDownload('chlenove',rows);
  } else if(kind==='res'){
    const rows=[['Дата','Час','Място/Формат','Име','Имейл','Телефон','Места','Статус']];
    RES.forEach(r=>rows.push([r.date||'',r.time||'',r.place||r.fmt||'',r.name||r.who||'',r.email||'',r.phone||'',r.party||'',r.status||'requested']));
    csvDownload('rezervacii',rows);
  } else {
    const list=APPS||await DB.listApplications();
    const rows=[['Тип','Име','Имейл','Телефон','Членство','Професия','Интереси','Връзка с колежа','БУЛСТАТ','Статус']];
    list.forEach(a=>rows.push([a.type||'application',a.name||'',a.email||'',a.phone||'',a.membership||'',a.profession||'',a.interests||'',a.alumni_relation||'',a.corp_bulstat||'',a.status||'new']));
    csvDownload('kandidaturi',rows);
  }
}

  if(!confirm('Да поканя ли '+email+' като член ('+( (MEMBERS.find(m=>m.id===membership)||{t:membership}).t )+')?'))return;
  const {error}=await DB.inviteMember(email,name,membership,'');
  if(error){alert('Грешка при поканата: '+error.message);return;}
  await DB.setApplicationStatus(id,'approved');
  DB.logAudit('application_approved',name||email,memName(membership));
  appMark(id,'approved');
  toast('Поканата е изпратена и кандидатурата е одобрена');
}
async function setApp(id,status){
  const r=await DB.setApplicationStatus(id,status);
  if(r&&r.error){alert('Грешка: '+r.error.message);return;}
  if(status==='declined')DB.logAudit('application_declined',(APPS||[]).find(a=>a.id===id)?.email||'','');
  appMark(id,status);
  toast(status==='declined'?'Кандидатурата е отказана':'Готово');
}
async function delApp(id){
  if(!confirm('Да изтрия ли тази кандидатура?'))return;
  const r=await DB.deleteApplication(id);
  if(r&&r.error){alert('Грешка: '+r.error.message);return;}
  APPS=(APPS||[]).filter(x=>x.id!==id);
  const c=document.getElementById('appcard_'+id);if(c)c.remove();
  toast('Изтрита');
}
function peopleView(){
  if(PEOPLE===null)return `<h2>Членове</h2><p class="empty">Зареждане…</p>`;
  if(!PEOPLE.length)return `<h2>Членове</h2><p class="empty">Все още няма членове.</p>`;
  const today=new Date().toISOString().slice(0,10);
  const cats=MEMBERS.slice();
  // събираме и категории извън списъка (напр. guest)
  const known=cats.map(c=>c.id);
  const extra=[...new Set(PEOPLE.map(p=>p.membership).filter(m=>!known.includes(m)))];
  extra.forEach(id=>cats.push({id,t:id}));
  const byId={};PEOPLE.forEach(x=>{byId[x.id]=x;});
  const personRow=p=>{
    const nm=p.full_name||p.username||p.email||'член';
    const exp=p.membership_until&&p.membership_until<today;
    const until=p.membership_until?`Членство до ${isoToBg(p.membership_until)}${exp?' · <span style="color:#b5532f;">изтекло</span>':''}`:'Без зададен срок';
    // връзка към фирма (корпоративни)
    let companyTag='';
    if(p.company_id){
      if(p.company_id===p.id)companyTag=`<span class="pill" style="border-color:var(--gold);color:var(--gold);">основен фирмен профил</span>`;
      else{const owner=byId[p.company_id];companyTag=`<span class="pill">профил към ${esc(owner?(owner.full_name||owner.username||owner.email):'фирма')}</span>`;}
    }
    const fid='rnf_'+p.id;
    const mid='mch_'+p.id;
    const memOpts=MEMBERS.concat([{id:'guest',t:'Guest'}]).map(m=>`<option value="${m.id}" ${p.membership===m.id?'selected':''}>${m.t}</option>`).join('');
    return `<div class="card" style="margin-top:8px;">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
        <div><b>${esc(nm)}</b>${p.role==='admin'?' <span class="pill" style="border-color:var(--gold);color:var(--gold);">админ</span>':''} ${companyTag}
          <div class="muted" style="margin-top:2px;">${esc(p.email)}${p.phone?' · '+esc(p.phone):' · <span style="color:#bf8a2e;">без телефон</span>'}</div>
          <div class="muted" style="margin-top:3px;color:${exp?'#b5532f':'var(--mid)'};">${until}</div></div>
      </div>
      <div class="row2" style="margin-top:10px;align-items:center;">
        <div><input id="${fid}" readonly placeholder="удължи от дата (по подразб. днес)" data-iso="" onclick="openCal('${fid}')" style="cursor:pointer;"/></div>
        <div><button class="btn sm" onclick="renewPerson('${esc(p.email)}','${fid}')">Поднови с 1 година</button></div>
      </div>
      <div class="row2" style="margin-top:8px;align-items:center;">
        <div><label style="margin-bottom:4px;">Членство</label><select id="${mid}">${memOpts}</select></div>
        <div><button class="btn ghost sm" onclick="changeMembership('${esc(p.email)}','${p.id}')">Промени членството</button></div>
      </div>
      <div class="row2" style="margin-top:8px;align-items:center;">
        <div><label style="margin-bottom:4px;">Име</label><input id="nmf_${p.id}" value="${esc(p.full_name||p.username||'')}" placeholder="Име Фамилия"/></div>
        <div><button class="btn ghost sm" onclick="changeName('${p.id}')">Запази името</button></div>
      </div>
      <div class="row2" style="margin-top:8px;align-items:center;">
        <div><label style="margin-bottom:4px;">Телефон</label><input id="phf_${p.id}" value="${esc(p.phone||'')}" placeholder="+359 ..."/></div>
        <div style="display:flex;flex-direction:column;gap:6px;"><button class="btn ghost sm" onclick="savePhone('${p.id}')">Запази телефона</button>
          <button class="btn ghost sm" onclick="requestPhone('${p.id}','${esc(nm)}')">Поискай нов телефон</button></div>
      </div>
      ${p.role==='admin'?'':`<button class="btn no sm" style="margin-top:8px;" onclick="deletePerson('${p.id}','${esc(nm)}',${(p.company_id&&p.company_id===p.id)?PEOPLE.filter(x=>x.company_id===p.id&&x.id!==p.id).length:0})">Изтрий члена</button>`}</div>`;
  };
  // за корпоративните: основен профил + вложени под-профили
  const corpBlock=list=>{
    const owners=list.filter(p=>!p.company_id||p.company_id===p.id);
    const subsBy={};list.forEach(p=>{if(p.company_id&&p.company_id!==p.id){(subsBy[p.company_id]=subsBy[p.company_id]||[]).push(p);}});
    let h='';
    owners.forEach(o=>{
      const subs=subsBy[o.id]||[];
      const sid='co_'+o.id;
      h+=personRow(o);
      if(subs.length){
        h+=`<button class="btn ghost sm" style="margin:0 0 6px 14px;" onclick="toggleCo('${sid}',this)">Профили към фирмата (${subs.length}) ▾</button>
          <div id="${sid}" style="display:none;padding-left:14px;border-left:2px solid var(--gold-soft);margin-bottom:6px;">${subs.map(personRow).join('')}</div>`;
      }
    });
    // под-профили без намерен собственик (за всеки случай)
    const ownerIds=owners.map(o=>o.id);
    const orphans=list.filter(p=>p.company_id&&p.company_id!==p.id&&!ownerIds.includes(p.company_id));
    h+=orphans.map(personRow).join('');
    return h;
  };
  let html='<h2>Членове</h2>';
  cats.forEach((c,ci)=>{
    const list=PEOPLE.filter(p=>p.membership===c.id);
    if(!list.length)return;
    const id='pg'+ci;
    html+=`<div class="card" style="border-color:var(--gold-soft);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-top:10px;" onclick="togglePG('${id}')">
        <h3>${esc(c.t)} <span class="muted" style="font-weight:400;">· ${list.length}</span></h3>
        <span id="pa_${id}" style="color:var(--gold);">отвори ▾</span></div>
      <div id="${id}" style="display:none;">${c.id==='corporate'?corpBlock(list):list.map(personRow).join('')}</div>`;
  });
  return html;
}
function togglePG(id){
  const d=document.getElementById(id),a=document.getElementById('pa_'+id);
  if(!d)return;const open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  if(a)a.textContent=open?'отвори ▾':'затвори ▴';
}
function toggleCo(id,btn){
  const d=document.getElementById(id);if(!d)return;
  const open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  if(btn)btn.textContent=btn.textContent.replace(open?'▴':'▾',open?'▾':'▴');
}
async function renewPerson(email,fieldId){
  const f=document.getElementById(fieldId);
  const from=f?(f.dataset.iso||''):'';
  const {error,until}=await DB.renewMembership(email,from);
  if(error){alert('Грешка: '+error.message);return;}
  DB.logAudit('member_renewed',email,until?isoToBg(until):'');
  toast('Членството е подновено до '+(until?isoToBg(until):'—'));
  PEOPLE=await DB.listMembers();render();
}
async function deletePerson(id,name,subCount){
  let msg='Да изтрия ли „'+name+'"? Това трие акаунта, резервациите и достъпа му. Действието е необратимо.';
  if(subCount>0)msg='„'+name+'" е основен фирмен профил. Изтриването ще премахне И '+subCount+' свързани профила (цялата фирма). Сигурни ли сте? Действието е необратимо.';
  if(!confirm(msg))return;
  const {error}=await DB.deleteMember(id);
  if(error){alert('Грешка: '+error.message);return;}
  DB.logAudit('member_deleted',name||'',subCount>0?('фирма, +'+subCount+' профила'):'');
  toast('Изтрито');
  PEOPLE=await DB.listMembers();render();
}
async function changeName(id){
  const f=document.getElementById('nmf_'+id);if(!f)return;
  const v=f.value.trim();if(!v){alert('Въведи име');return;}
  const {error}=await DB.adminSetName(id,v);
  if(error){alert('Грешка: '+error.message);return;}
  try{DB.logAudit('member_name_changed',v,'');}catch(e){}
  toast('Името е обновено');
  PEOPLE=await DB.listMembers();render();
}
async function savePhone(id){
  const f=document.getElementById('phf_'+id);if(!f)return;
  const {error}=await DB.adminSetPhone(id,f.value.trim());
  if(error){alert('Грешка: '+error.message);return;}
  DB.logAudit('phone_set',(PHONES&&PHONES[id]&&PHONES[id].email)||id,f.value.trim());
  toast('Телефонът е обновен');
  PEOPLE=await DB.listMembers();render();
}
async function requestPhone(id,name){
  if(!confirm('Да поискам ли нов телефон от „'+name+'"? Ще му излезе подкана при следващо влизане.'))return;
  const {error}=await DB.adminRequestPhone(id);
  if(error){alert('Грешка: '+error.message);return;}
  DB.logAudit('phone_requested',name||'','');
  toast('Поискан е нов телефон от члена');
}
async function changeMembership(email,id){
  const sel=document.getElementById('mch_'+id); if(!sel)return;
  const m=sel.value;
  const label=(MEMBERS.find(x=>x.id===m)||{t:m}).t;
  if(!confirm('Да сменя ли членството на '+email+' на „'+label+'"?'))return;
  const {error}=await DB.setMembership(email,m);
  if(error){alert('Грешка: '+error.message);return;}
  DB.logAudit('membership_changed',email,label);
  toast('Членството е променено на '+label);
  PEOPLE=await DB.listMembers();render();
}
function membersView(){
  let rows=MEMBERS.map(m=>{
    const cnt=EVENTS.filter(e=>e.aud==='all'||(Array.isArray(e.aud)&&e.aud.includes(m.id))).length;
    return `<tr><td>${m.t}</td><td>${cnt} / ${EVENTS.length}</td></tr>`;}).join('');
  let memOpts=MEMBERS.map(m=>`<option value="${m.id}">${m.t}</option>`).join('');
  const inviteCard=DB.live
    ? `<div class="card" style="border-color:var(--gold-soft);">
        <h3>Покани член</h3>
        <p class="muted" style="margin:6px 0 8px;">Изпраща имейл с покана; човекът сам си задава парола от линка.</p>
        <label>Имейл</label><input id="iv_email" type="email" placeholder="name@example.com"/>
        <div class="row2"><div><label>Име (по желание)</label><input id="iv_user"/></div>
          <div><label>Категория</label><select id="iv_mem">${memOpts}</select></div></div>
        <label>Членство валидно от (1 година напред)</label>
        <input id="iv_from" readonly placeholder="дд.мм.гггг (по подразбиране днес)" data-iso="" onclick="openCal('iv_from')" style="cursor:pointer;"/>
        <button class="btn" style="margin-top:14px;" onclick="doInvite()">Изпрати покана</button></div>`
    : `<div class="card"><h3>Покани член</h3><p class="muted" style="margin-top:6px;">Налично след свързване на Supabase и качване на функцията <code>invite-member</code> (виж ADMIN-README).</p></div>`;
  const resetCard=DB.live
    ? `<div class="card">
        <h3>Нова парола на член</h3>
        <p class="muted" style="margin:6px 0 8px;">Ако член е забравил паролата си — генерира нова временна, която му давате.</p>
        <label>Имейл на члена</label><input id="rp_email" type="email" placeholder="name@example.com"/>
        <button class="btn ghost" style="margin-top:10px;" onclick="doReset()">Генерирай нова парола</button></div>`
    : '';
  const renewCard=DB.live
    ? `<div class="card" style="border-color:var(--gold-soft);">
        <h3>Поднови членство</h3>
        <p class="muted" style="margin:6px 0 8px;">Удължава членството с 1 година от избраната дата (по подразбиране днес).</p>
        <label>Имейл на члена</label><input id="rn_email" type="email" placeholder="name@example.com"/>
        <label>Валидно от</label>
        <input id="rn_from" readonly placeholder="дд.мм.гггг (по подразбиране днес)" data-iso="" onclick="openCal('rn_from')" style="cursor:pointer;"/>
        <button class="btn" style="margin-top:12px;" onclick="doRenew()">Поднови с 1 година</button></div>`
    : '';
  return `<h2>Членове и видимост</h2>
    ${inviteCard}
    ${renewCard}
    ${resetCard}
    <div class="card"><p class="muted" style="margin-bottom:12px;">Колко от текущите събития вижда всяка категория според зададената видимост.</p>
    <table><thead><tr><th>Категория</th><th>Вижда събития</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card"><p class="muted">Категорията/ролята на всеки член се сменя и в Supabase → Table Editor → profiles.</p></div>`;
}
async function doReset(){
  const email=document.getElementById('rp_email').value.trim();
  if(!email){alert('Въведи имейл');return;}
  const {error,password}=await DB.adminResetPassword(email);
  if(error){alert('Грешка: '+error.message);return;}
  alert('Нова временна парола за '+email+':\n\n'+password+'\n\nДайте я на члена — после може да я смени от профила си.');
  document.getElementById('rp_email').value='';
}
async function doInvite(){
  const email=document.getElementById('iv_email').value.trim();
  if(!email){alert('Въведи имейл');return;}
  const username=document.getElementById('iv_user').value.trim();
  const membership=document.getElementById('iv_mem').value;
  const validFrom=document.getElementById('iv_from').dataset.iso||'';
  const {error,password,until}=await DB.inviteMember(email,username,membership,validFrom);
  if(error){alert('Грешка: '+error.message);return;}
  const untilTxt=until?'\nЧленство валидно до: '+isoToBg(until):'';
  alert((password
    ?('Акаунтът е създаден!\n\nИмейл: '+email+'\nВременна парола: '+password)
    :('Поканата е изпратена на '+email+'.\nЧовекът ще получи имейл с линк, от който сам си задава парола и влиза.'))+untilTxt);
  document.getElementById('iv_email').value='';document.getElementById('iv_user').value='';
}
async function doRenew(){
  const email=document.getElementById('rn_email').value.trim();
  if(!email){alert('Въведи имейл');return;}
  const validFrom=document.getElementById('rn_from').dataset.iso||'';
  const {error,until}=await DB.renewMembership(email,validFrom);
  if(error){alert('Грешка: '+error.message);return;}
  alert('Членството на '+email+' е подновено.\nВалидно до: '+(until?isoToBg(until):'—'));
  document.getElementById('rn_email').value='';
  const f=document.getElementById('rn_from');if(f){f.dataset.iso='';f.value='';}
}

function gate(){
  const live=DB.live;
  root.innerHTML=`<div class="gate">
    <div class="ring"><span>AC²</span></div>
    <h1>Админ панел</h1>
    <div class="f">
      <input id="a_user" placeholder="${live?'Имейл':'Потребителско име'}" onkeydown="if(event.key==='Enter')doLogin()"/>
      <input id="a_pass" type="password" placeholder="Парола" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="btn" style="width:100%;" onclick="doLogin()">Вход</button>
      <div class="muted" style="margin-top:12px;">${live?'Вход с админ акаунт (role=admin)':'Демо достъп: <span style="color:var(--gold);">admin / admin</span>'}</div>
    </div></div>`;
}
async function doLogin(){
  const u=document.getElementById('a_user').value;
  const p=document.getElementById('a_pass').value;
  if(DB.live){
    const {error}=await DB.signIn(u,p);
    if(error){alert('Грешен вход: '+error.message);return;}
    const me=await DB.getUser();
    if(!me||me.role!=='admin'){alert('Този акаунт няма админ права.');await DB.signOut();return;}
    admin=true;await refresh();render();
  }else{
    if((u||'').trim().toLowerCase()!=='admin'||(p||'').trim()!=='admin'){alert('Грешно име или парола');return;}
    admin=true;localStorage.setItem('acac_admin','1');await refresh();render();
  }
}
async function logout(){
  if(DB.live)await DB.signOut(); else localStorage.removeItem('acac_admin');
  admin=false;render();
}
boot();
</script>
