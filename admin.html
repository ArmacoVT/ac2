<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f6efe2" />
<title>Arcus Club · Админ панел</title>
<link rel="icon" href="favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f6efe2;--surface:#fffaf0;--gold:#c8643c;--gold-soft:#b07a4a;--cream:#3a2c23;--text:#5a4a3c;
    --mid:#8a6f5c;--muted:#a8927c;--line:rgba(58,44,35,0.16);--ok:#4f7a43;--warn:#b5532f;--serif:'Cormorant Garamond',Georgia,serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 60px;}
  .top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;background:rgba(246,239,226,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin-bottom:18px;}
  .top .b{font-family:var(--serif);color:var(--gold);font-size:19px;letter-spacing:1px;}
  .top .b small{color:var(--mid);font-size:12px;letter-spacing:0;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:22px;padding:8px 16px;font-size:14px;cursor:pointer;font-family:inherit;}
  .tab.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
  h2{font-family:var(--serif);color:var(--cream);font-weight:500;font-size:22px;margin-bottom:12px;}
  h3{color:var(--cream);font-size:16px;font-weight:500;}
  label{display:block;color:var(--mid);font-size:13px;margin:10px 0 5px;}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:11px;color:var(--cream);font-size:15px;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-soft);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--gold);}
  .btn.sm{padding:7px 13px;font-size:13px;border-radius:18px;}
  .btn.ok{background:var(--ok);color:#fff;}
  .btn.no{background:transparent;border:1px solid var(--warn);color:#d98b6e;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .ck{border:1px solid var(--line);border-radius:20px;padding:7px 13px;font-size:13px;cursor:pointer;user-select:none;}
  .ck.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600;}
  .pill{display:inline-block;font-size:11px;letter-spacing:1px;border:1px solid var(--gold);color:var(--gold);border-radius:14px;padding:2px 9px;}
  .pill.audAll{border-color:var(--ok);color:#3f6235;}
  .muted{color:var(--muted);font-size:13px;}
  .badge{font-size:11px;border-radius:12px;padding:2px 10px;border:1px solid var(--line);color:var(--mid);}
  .badge.live{border-color:var(--ok);color:#3f6235;}
  .gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
  .gate .ring{width:120px;height:120px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .gate .ring span{font-family:var(--serif);color:var(--gold);font-size:38px;}
  .gate h1{font-family:var(--serif);color:var(--cream);font-size:26px;font-weight:500;margin-top:20px;}
  .gate .f{width:100%;max-width:300px;margin-top:24px;}
  .gate input{margin-bottom:11px;}
  .empty{color:var(--muted);font-style:italic;padding:8px 0;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--mid);font-weight:500;padding:8px;border-bottom:1px solid var(--line);}
  td{padding:8px;border-bottom:1px solid var(--line);color:var(--text);}
</style>
</head>
<body>
<div id="root" style="padding:40px;text-align:center;color:var(--muted);">Зареждане…</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script>
const MEMBERS=[{id:'founder',t:'Founder'},{id:'founding',t:'Founding Member'},{id:'club',t:'Club Member'},{id:'alumni',t:'Alumni Member'},{id:'corporate',t:'Corporate Member'}];
const FORMATS=['culture','cinema','table','music','conversation','community','theater'];
const VENUES=['Ресторант','Камерна зала','Онлайн','Изложбено фоайе','VIP зала'];
const memName=id=>(MEMBERS.find(m=>m.id===id)||{t:id}).t;
const esc=s=>(''+(s??'')).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

let tab='events', editId=null, draftAud=['all'], admin=false;
let EVENTS=[], RES=[];
const root=document.getElementById('root');

async function boot(){
  if(DB.live){ const u=await DB.getUser(); admin=!!(u&&u.role==='admin'); }
  else { admin=localStorage.getItem('acac_admin')==='1'; }
  if(admin) await refresh();
  render();
}
async function refresh(){
  try{ EVENTS=await DB.listEvents(); }catch(e){ EVENTS=[]; }
  try{ RES=await DB.listReservations(); }catch(e){ RES=[]; }
}

function render(){
  if(!admin){gate();return;}
  const badge=DB.live?`<span class="badge live">Свързан Supabase</span>`:`<span class="badge">Демо режим</span>`;
  let h=`<div class="wrap">
    <div class="top"><div class="b">AC² · Админ панел<br><small>American College Arcus Club</small></div>
      <div style="display:flex;gap:10px;align-items:center;">${badge}<button class="btn ghost sm" onclick="logout()">Изход</button></div></div>
    <div class="tabs">
      <button class="tab ${tab==='events'?'on':''}" onclick="setTab('events')">Събития</button>
      <button class="tab ${tab==='res'?'on':''}" onclick="setTab('res')">Резервации</button>
      <button class="tab ${tab==='members'?'on':''}" onclick="setTab('members')">Видимост по членство</button>
      <button class="tab ${tab==='stats'?'on':''}" onclick="setTab('stats')">Статистика</button>
    </div>`;
  if(tab==='events')h+=eventsView();
  else if(tab==='res')h+=resView();
  else if(tab==='stats')h+=statsView();
  else h+=membersView();
  h+=`</div>`;
  root.innerHTML=h;
  if(tab==='stats')setTimeout(animateCounts,30);
}
function animateCounts(){
  document.querySelectorAll('.countup').forEach(el=>{
    const to=parseInt(el.dataset.to||'0',10);
    if(!to){el.textContent='0';return;}
    const dur=700,start=performance.now();
    const step=now=>{const p=Math.min(1,(now-start)/dur);
      el.textContent=Math.round(to*(1-Math.pow(1-p,3)));
      if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);
  });
}
async function setTab(t){tab=t;editId=null;await refresh();render();}

function audLabel(aud){
  if(aud==='all')return `<span class="pill audAll">Всички членове</span>`;
  if(!Array.isArray(aud)||!aud.length)return `<span class="pill">никой</span>`;
  return aud.map(a=>`<span class="pill">${memName(a)}</span>`).join(' ');
}
// заети места за събитие: потвърдените резервации (и отделно чакащите)
function seatsTaken(evId){return RES.filter(r=>r.event_id===evId&&r.status==='confirmed').reduce((s,r)=>s+(r.party||1),0);}
function seatsPending(evId){return RES.filter(r=>r.event_id===evId&&(!r.status||r.status==='requested')).reduce((s,r)=>s+(r.party||1),0);}
function seatsInfo(e){
  if(!e.capacity)return '';
  const taken=seatsTaken(e.id), left=e.capacity-taken, pend=seatsPending(e.id);
  const col=left<=0?'#b5532f':(left<=Math.ceil(e.capacity*0.2)?'#bf8a2e':'#4f7a43');
  return `<span class="pill" style="border-color:${col};color:${col};">${left<=0?'няма места':'остават '+left+' от '+e.capacity}</span>`+
    (pend?` <span class="pill">${pend} чакащи</span>`:'');
}
// маси след събитието (свързани чрез table_event_id)
function tableTaken(evId){return RES.filter(r=>r.table_event_id===evId&&r.status==='confirmed').reduce((s,r)=>s+(r.party||1),0);}
function tableInfo(e){
  if(!e.table_capacity)return '';
  const taken=tableTaken(e.id), left=e.table_capacity-taken;
  const col=left<=0?'#b5532f':(left<=Math.ceil(e.table_capacity*0.2)?'#bf8a2e':'#4f7a43');
  return `<span class="pill" style="border-color:${col};color:${col};">🍽 ${left<=0?'няма маси':'маси: остават '+left+' от '+e.table_capacity}</span>`;
}
// разгъващ се списък „кой е запазил" за дадено събитие (билети + маси)
function eventResList(e){
  const tickets=RES.filter(r=>r.event_id===e.id);
  const tables=RES.filter(r=>r.table_event_id===e.id);
  const all=tickets.concat(tables);
  if(!all.length)return '';
  const stTxt={confirmed:'одобрена',declined:'отказана'};
  const stCol={confirmed:'#4f7a43',declined:'#b5532f'};
  const row=(r,isTable)=>{
    const st=r.status||'requested';
    const nm=r.name||r.who||'член';
    const contact=[r.email,r.phone].filter(Boolean).map(esc).join(' · ');
    return `<div style="padding:8px 0;border-top:1px solid var(--line-soft);">
      <div><b>${esc(nm)}</b> · ${r.party||1} ${isTable?'на маса':'места'}${isTable?' 🍽':''}
        <span style="color:${stCol[st]||'var(--muted)'};font-size:12px;"> · ${stTxt[st]||'чакаща'}</span></div>
      ${contact?`<div class="muted" style="font-size:12px;">${contact}</div>`:''}
      ${r.note&&isTable?`<div class="muted" style="font-size:12px;">„${esc(r.note)}"</div>`:''}</div>`;
  };
  const body=tickets.map(r=>row(r,false)).join('')+tables.map(r=>row(r,true)).join('');
  return `<button class="btn ghost sm" style="margin-top:10px;" onclick="toggleEvRes('${e.id}')" id="evrb_${e.id}">Запазили (${all.length}) ▾</button>
    <div id="evr_${e.id}" style="display:none;margin-top:4px;">${body}</div>`;
}
function toggleEvRes(id){
  const d=document.getElementById('evr_'+id),b=document.getElementById('evrb_'+id);
  if(!d)return;const open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  if(b)b.textContent=b.textContent.replace(open?'▴':'▾',open?'▾':'▴');
}
function eventsView(){
  const evCard=e=>{
    const liveBadge=e.is_live?'<span class="pill" style="border-color:#d98b6e;color:#d98b6e;">● НА ЖИВО</span>':(e.stream_url?'<span class="pill">стрийм готов</span>':'');
    const liveBtn=e.stream_url
      ? (e.is_live?`<button class="btn no sm" onclick="toggleLive('${e.id}',false)">Спри стрийма</button>`
                  :`<button class="btn ok sm" onclick="toggleLive('${e.id}',true)">Пусни на живо</button>`)
      : '';
    return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div><h3>${esc(e.title)} ${liveBadge}</h3>
        <div class="muted" style="margin-top:3px;">${esc(e.format)} · ${isoToBg(e.date)}${e.end_date?' – '+isoToBg(e.end_date):''} ${esc(e.time||'')} · ${esc(e.place||'')} · ${e.capacity||0} места</div>
        <div style="margin-top:6px;">${seatsInfo(e)} ${tableInfo(e)}</div>
        <div style="margin-top:8px;">Видимо за: ${audLabel(e.aud)}</div></div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${liveBtn}
        <button class="btn ghost sm" onclick="editEvent('${e.id}')">Редактирай</button>
        <button class="btn no sm" onclick="delEvent('${e.id}')">Изтрий</button></div>
    </div>${eventResList(e)}</div>`;};
  const today=new Date().toISOString().slice(0,10);
  const evEnd=e=>e.end_date||e.date||'';
  const up=EVENTS.filter(e=>!evEnd(e)||evEnd(e)>=today).sort((a,b)=>((a.date||'9999')<(b.date||'9999')?-1:1));
  const past=EVENTS.filter(e=>evEnd(e)&&evEnd(e)<today).sort((a,b)=>(a.date<b.date?1:-1));
  let list=up.length?up.map(evCard).join(''):`<p class="empty">Няма предстоящи събития.</p>`;
  if(past.length){
    list+=`<button class="btn ghost" style="margin-top:10px;" onclick="togglePastAdm(this)">Изминали събития (${past.length}) ▾</button>
      <div id="pastadm" style="display:none;margin-top:10px;">${past.map(evCard).join('')}</div>`;
  }
  return `<h2>Събития</h2>${formView()}${list}`;
}
function togglePastAdm(btn){const d=document.getElementById('pastadm');if(!d)return;const open=d.style.display!=='none';d.style.display=open?'none':'block';if(btn)btn.textContent=btn.textContent.replace(open?'▴':'▾',open?'▾':'▴');}
function formView(){
  const e=editId?EVENTS.find(x=>x.id===editId):null;
  const allOn=draftAud.includes('all');
  let memCk=`<div class="ck ${allOn?'on':''}" onclick="toggleAud('all')">✓ Всички членове</div>`+
    MEMBERS.map(m=>`<div class="ck ${(!allOn&&draftAud.includes(m.id))?'on':''}" onclick="toggleAud('${m.id}')">${m.t}</div>`).join('');
  let fmtOpts=FORMATS.map(f=>`<option value="${f}" ${e&&e.format===f?'selected':''}>${f}</option>`).join('');
  let venOpts=VENUES.map(v=>`<option ${e&&e.place===v?'selected':''}>${v}</option>`).join('');
  if(e&&e.place&&!VENUES.includes(e.place))venOpts=`<option selected>${esc(e.place)}</option>`+venOpts;
  return `<div class="card" style="border-color:var(--gold-soft);">
    <h3>${e?'Редакция на събитие':'Ново събитие'}</h3>
    <label>Заглавие</label><input id="f_title" value="${esc(e?e.title:'')}" placeholder="Напр. Гастрономическа вечер"/>
    <div class="row2"><div><label>Формат</label><select id="f_format">${fmtOpts}</select></div>
      <div><label>Място / зала</label><select id="f_place">${venOpts}</select></div></div>
    <div class="row2"><div><label>Начална дата</label><input id="f_date" readonly placeholder="дд.мм.гггг" value="${e&&e.date?isoToBg(e.date):''}" data-iso="${esc(e?(e.date||''):'')}" onclick="openCal('f_date')" style="cursor:pointer;"/></div>
      <div><label>Крайна дата (по желание)</label><input id="f_end_date" readonly placeholder="дд.мм.гггг" value="${e&&e.end_date?isoToBg(e.end_date):''}" data-iso="${esc(e?(e.end_date||''):'')}" onclick="openCal('f_end_date')" style="cursor:pointer;"/></div></div>
    <div class="row2"><div><label>Начало (час)</label><input id="f_time" value="${esc(e?e.time:'')}" placeholder="19:30"/></div>
      <div><label>Край (час)</label><input id="f_ends" value="${esc(e?e.ends:'')}" placeholder="22:00"/></div></div>
    <div class="row2"><div><label>Капацитет</label><input id="f_cap" type="number" min="0" value="${e?e.capacity:0}"/></div>
      <div><label>Места на маса след събитието</label><input id="f_tcap" type="number" min="0" value="${e&&e.table_capacity?e.table_capacity:''}" placeholder="по желание"/></div></div>
    <label>Постер / снимка на събитието (по желание)</label>
    ${e&&e.image_url?`<div style="margin-bottom:8px;"><img src="${esc(e.image_url)}" style="max-width:100%;border-radius:10px;"/><div><a href="#" onclick="clearMedia('img');return false;" style="color:#b5532f;font-size:12px;">Премахни снимката</a></div></div>`:''}
    <input id="f_img" type="file" accept="image/*"/>
    <label>Видео на събитието (по желание — качи файл)</label>
    ${e&&e.video_url?`<div style="margin-bottom:8px;"><video src="${esc(e.video_url)}" controls style="max-width:100%;border-radius:10px;"></video><div><a href="#" onclick="clearMedia('vid');return false;" style="color:#b5532f;font-size:12px;">Премахни видеото</a></div></div>`:''}
    <input id="f_vid" type="file" accept="video/*"/>
    <div id="f_media_keep" data-img="${esc(e?(e.image_url||''):'')}" data-vid="${esc(e?(e.video_url||''):'')}"></div>
    <label style="margin-top:14px;">Линк за live stream (по желание — YouTube, Vimeo или друг)</label>
    <input id="f_stream" value="${esc(e?e.stream_url:'')}" placeholder="https://www.youtube.com/watch?v=..."/>
    <label style="display:flex;align-items:center;gap:10px;margin-top:12px;cursor:pointer;">
      <input type="checkbox" id="f_live" ${e&&e.is_live?'checked':''} style="width:auto;"/> На живо сега (стриймът е активен)</label>
    <label>Видимо за (кой може да го вижда / гледа / запазва)</label>
    <div class="chips">${memCk}</div>
    ${bwSection(e)}
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn" onclick="saveEvent()">${e?'Запази промените':'Добави събитие'}</button>
      ${e?`<button class="btn ghost" onclick="cancelEdit()">Откажи</button>`:''}
    </div></div>`;
}
// приоритетно записване: „от дата" за всяко избрано ниво (празно = веднага)
function bwSection(e){
  if(draftAud.includes('all'))return '';
  const list=draftAud.filter(id=>id!=='all');
  if(!list.length)return '';
  const rows=list.map(id=>{
    const mem=MEMBERS.find(m=>m.id===id);
    const iso=(e&&e.booking_windows&&e.booking_windows[id])||'';
    return `<div class="row2" style="align-items:center;margin-top:6px;">
      <div style="padding-top:8px;">${mem?mem.t:id}</div>
      <div><input class="bwfield" data-mem="${id}" id="f_bw_${id}" readonly placeholder="веднага" value="${iso?isoToBg(iso):''}" data-iso="${esc(iso)}" onclick="openCal('f_bw_${id}')" style="cursor:pointer;"/></div></div>`;
  }).join('');
  return `<label style="margin-top:14px;">Приоритетно записване — „записване от" за всяко ниво (празно = веднага)</label>
    <p class="muted" style="margin:2px 0 4px;font-size:12px;">Така напр. Founder записват веднага, Founding след седмица, Club още по-късно. Всички виждат събитието; само записването е на вълни.</p>${rows}`;
}
// запазва/връща въведеното във формата (за да не се губи при преначертаване)
function grabForm(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:null;};
  const live=document.getElementById('f_live');
  const date=document.getElementById('f_date');
  const ed=document.getElementById('f_end_date');
  const bw={};document.querySelectorAll('.bwfield').forEach(el=>{bw[el.dataset.mem]=el.dataset.iso||'';});
  return {title:g('f_title'),format:g('f_format'),place:g('f_place'),time:g('f_time'),ends:g('f_ends'),
    dateIso:date?(date.dataset.iso||''):'',endDateIso:ed?(ed.dataset.iso||''):'',cap:g('f_cap'),tcap:g('f_tcap'),stream:g('f_stream'),live:live?live.checked:false,bw};
}
function putForm(v){
  if(!v)return;
  const s=(id,val)=>{const el=document.getElementById(id);if(el&&val!=null)el.value=val;};
  s('f_title',v.title);s('f_format',v.format);s('f_place',v.place);s('f_time',v.time);s('f_ends',v.ends);
  s('f_cap',v.cap);s('f_tcap',v.tcap);s('f_stream',v.stream);
  const date=document.getElementById('f_date');
  if(date){date.dataset.iso=v.dateIso||'';date.value=v.dateIso?isoToBg(v.dateIso):'';}
  const ed=document.getElementById('f_end_date');
  if(ed){ed.dataset.iso=v.endDateIso||'';ed.value=v.endDateIso?isoToBg(v.endDateIso):'';}
  if(v.bw)Object.keys(v.bw).forEach(mem=>{const el=document.getElementById('f_bw_'+mem);if(el){el.dataset.iso=v.bw[mem]||'';el.value=v.bw[mem]?isoToBg(v.bw[mem]):'';}});
  const live=document.getElementById('f_live');if(live)live.checked=!!v.live;
}
function toggleAud(id){
  const v=grabForm();
  if(id==='all'){draftAud=['all'];}
  else{draftAud=draftAud.filter(x=>x!=='all');
    if(draftAud.includes(id))draftAud=draftAud.filter(x=>x!==id); else draftAud.push(id);
    if(!draftAud.length)draftAud=['all'];}
  render();
  putForm(v);
}

// ---------- европейски календар (понеделник = първи ден) ----------
function isoToBg(iso){if(!iso)return'';const p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
let calM=null,calTarget='f_date';
function openCal(field){
  calTarget=field||'f_date';
  const inp=document.getElementById(calTarget);
  const base=inp.dataset.iso?new Date(inp.dataset.iso+'T00:00:00'):new Date();
  calM={y:base.getFullYear(),m:base.getMonth()};
  drawCal();
}
function calNav(d){calM.m+=d;if(calM.m<0){calM.m=11;calM.y--;}if(calM.m>11){calM.m=0;calM.y++;}drawCal();}
function drawCal(){
  closeCal();
  const inp=document.getElementById(calTarget);if(!inp)return;
  const months=['януари','февруари','март','април','май','юни','юли','август','септември','октомври','ноември','декември'];
  const wd=['пн','вт','ср','чт','пт','сб','нд'];
  const first=new Date(calM.y,calM.m,1);
  const off=(first.getDay()+6)%7; // понеделник първи
  const dim=new Date(calM.y,calM.m+1,0).getDate();
  const t=new Date();
  const tIso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const sel=inp.dataset.iso||'';
  let cells=wd.map((w,i)=>`<div style="font-size:11px;color:${i>4?'#c08a6e':'#9a8f7a'};text-align:center;padding:4px 0;">${w}</div>`).join('');
  for(let i=0;i<off;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const iso=calM.y+'-'+String(calM.m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=iso===sel?'background:#c46a4a;color:#fffdf4;':(iso===tIso?'box-shadow:inset 0 0 0 1px #c46a4a;color:#c46a4a;':'');
    cells+=`<div onclick="pickDate('${iso}')" style="text-align:center;padding:7px 0;border-radius:9px;cursor:pointer;font-size:13px;${st}">${d}</div>`;
  }
  const pop=document.createElement('div');pop.id='acac-cal';
  pop.style.cssText='position:absolute;z-index:999;background:#fffaf0;border:1px solid #e6d9bd;border-radius:16px;box-shadow:0 10px 26px rgba(0,0,0,.14);padding:12px;width:266px;';
  pop.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <button type="button" onclick="calNav(-1)" style="border:0;background:none;cursor:pointer;font-size:17px;padding:4px 12px;">‹</button>
      <b style="font-size:13px;">${months[calM.m]} ${calM.y}</b>
      <button type="button" onclick="calNav(1)" style="border:0;background:none;cursor:pointer;font-size:17px;padding:4px 12px;">›</button></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">${cells}</div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;">
      <button type="button" onclick="pickDate('${tIso}')" style="border:0;background:none;cursor:pointer;color:#c46a4a;font-size:12px;">Днес</button>
      <button type="button" onclick="pickDate('')" style="border:0;background:none;cursor:pointer;color:#9a8f7a;font-size:12px;">Изчисти</button></div>`;
  const r=inp.getBoundingClientRect();
  pop.style.left=(r.left+window.scrollX)+'px';pop.style.top=(r.bottom+window.scrollY+6)+'px';
  document.body.appendChild(pop);
  setTimeout(()=>{document.addEventListener('mousedown',calOutside);},0);
}
function calOutside(ev){
  const p=document.getElementById('acac-cal');
  if(p&&!p.contains(ev.target)&&ev.target.id!==calTarget)closeCal();
}
function closeCal(){
  const p=document.getElementById('acac-cal');
  if(p){p.remove();document.removeEventListener('mousedown',calOutside);}
}
function pickDate(iso){
  const inp=document.getElementById(calTarget);
  if(inp){inp.dataset.iso=iso;inp.value=iso?isoToBg(iso):'';}
  closeCal();
}
function editEvent(id){editId=id;tab='events';const e=EVENTS.find(x=>x.id===id);draftAud=e.aud==='all'?['all']:e.aud.slice();render();window.scrollTo(0,0);}
function cancelEdit(){editId=null;draftAud=['all'];render();}
async function delEvent(id){if(!confirm('Да изтрия ли събитието?'))return;await DB.deleteEvent(id);await refresh();render();}
async function toggleLive(id,on){await DB.setLive(id,on);await refresh();render();}
function clearMedia(which){
  const keep=document.getElementById('f_media_keep');if(!keep)return;
  if(which==='img')keep.dataset.img='';else keep.dataset.vid='';
  alert(which==='img'?'Снимката ще се премахне при запис.':'Видеото ще се премахне при запис.');
}
async function saveEvent(){
  const title=document.getElementById('f_title').value.trim();
  if(!title){alert('Въведи заглавие');return;}
  // качване на снимка/видео, ако са избрани
  const keep=document.getElementById('f_media_keep');
  let imgUrl=keep?keep.dataset.img:'', vidUrl=keep?keep.dataset.vid:'';
  const imgF=document.getElementById('f_img'), vidF=document.getElementById('f_vid');
  const saveBtn=document.querySelector('#root .btn');
  if(imgF&&imgF.files[0]){ if(saveBtn)saveBtn.textContent='Качване на снимка…';
    const u=await DB.uploadMedia(imgF.files[0]); if(u.error){alert('Снимката не се качи: '+u.error.message);if(saveBtn)saveBtn.textContent='Запази';return;} imgUrl=u.url; }
  if(vidF&&vidF.files[0]){ if(saveBtn)saveBtn.textContent='Качване на видео…';
    const u=await DB.uploadMedia(vidF.files[0]); if(u.error){alert('Видеото не се качи: '+u.error.message);if(saveBtn)saveBtn.textContent='Запази';return;} vidUrl=u.url; }
  const dIso=document.getElementById('f_date').dataset.iso||'';
  const edIso=document.getElementById('f_end_date').dataset.iso||'';
  if(edIso&&dIso&&edIso<dIso){alert('Крайната дата е преди началната');return;}
  const obj={title,format:document.getElementById('f_format').value,place:document.getElementById('f_place').value.trim(),
    date:dIso,end_date:edIso,time:document.getElementById('f_time').value.trim(),ends:document.getElementById('f_ends').value.trim(),
    capacity:parseInt(document.getElementById('f_cap').value||'0',10),
    table_capacity:parseInt(document.getElementById('f_tcap').value||'0',10),
    booking_windows:(()=>{const bw={};document.querySelectorAll('.bwfield').forEach(el=>{if(el.dataset.iso)bw[el.dataset.mem]=el.dataset.iso;});return Object.keys(bw).length?bw:null;})(),
    image_url:imgUrl,video_url:vidUrl,
    stream_url:document.getElementById('f_stream').value.trim(),
    is_live:document.getElementById('f_live').checked,
    aud:draftAud.includes('all')?'all':draftAud.slice()};
  const r=editId?await DB.updateEvent(editId,obj):await DB.addEvent(obj);
  if(r&&r.error){alert('Събитието не се записа: '+r.error.message);return;}
  editId=null;draftAud=['all'];await refresh();render();window.scrollTo(0,0);
}

let resFilter='all';
function setResFilter(id){resFilter=id;render();}
function resView(){
  if(!RES.length)return `<h2>Резервации</h2><p class="empty">Все още няма запитвания за резервация.</p>`;
  // групиране по събитие
  const groups={};
  RES.forEach(r=>{const k=r.event_id||'other';(groups[k]=groups[k]||[]).push(r);});
  const pend=list=>list.filter(r=>!r.status||r.status==='requested').length;
  const cnt=n=>n?` <span style="display:inline-block;background:#b5532f;color:#fffdf4;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;vertical-align:middle;">${n}</span>`:'';
  let chips=`<button class="tab ${resFilter==='all'?'on':''}" onclick="setResFilter('all')">Всички${cnt(pend(RES))}</button>`;
  EVENTS.forEach(e=>{
    if(!groups[e.id])return;
    const t=e.title.length>22?e.title.slice(0,22)+'…':e.title;
    chips+=`<button class="tab ${resFilter===e.id?'on':''}" onclick="setResFilter('${e.id}')">${esc(t)}${cnt(pend(groups[e.id]))}</button>`;
  });
  if(groups.other)chips+=`<button class="tab ${resFilter==='other'?'on':''}" onclick="setResFilter('other')">Общи запитвания${cnt(pend(groups.other))}</button>`;
  // ако избраният таб вече няма заявки — връщаме се на „Всички"
  if(resFilter!=='all'&&!groups[resFilter])resFilter='all';
  const shown=resFilter==='all'?RES:groups[resFilter]||[];
  // заглавна карта при избрано събитие
  let head='';
  if(resFilter!=='all'&&resFilter!=='other'){
    const e=EVENTS.find(x=>x.id===resFilter);
    if(e)head=`<div class="card" style="border-color:var(--gold-soft);"><h3>${esc(e.title)}</h3>
      <div class="muted" style="margin-top:3px;">${esc(e.format)} · ${isoToBg(e.date)} ${esc(e.time||'')} · ${esc(e.place||'')} · капацитет ${e.capacity||0}</div>
      <div style="margin-top:6px;">${seatsInfo(e)}</div></div>`;
  }
  let rows=shown.map(r=>{
    const st=r.status||'requested';
    const badge=st==='confirmed'?'<span class="pill audAll">потвърдена</span>':st==='declined'?'<span class="pill" style="border-color:var(--warn);color:#d98b6e;">отказана</span>':'<span class="pill">чакаща</span>';
    const ev=r.event_id?EVENTS.find(e=>e.id===r.event_id):null;
    const cap=ev&&ev.capacity?` ${seatsInfo(ev)}`:'';
    const nm=r.name||r.who||'член';
    const contact=[r.email,r.phone].filter(Boolean).map(esc).join(' · ');
    return `<div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
      <div><h3>${esc(r.place||r.fmt||'Резервация')} · ${r.party||1} места</h3>
        <div class="muted" style="margin-top:3px;"><b style="color:var(--text);">${esc(nm)}</b> · ${esc(memName(r.membership||'guest'))} · ${isoToBg(r.date||'')} ${esc(r.time||'')}</div>
        ${contact?`<div class="muted" style="margin-top:3px;">${contact}</div>`:''}
        ${r.note?`<div class="muted" style="margin-top:4px;">„${esc(r.note)}"</div>`:''}
        <div style="margin-top:7px;">${badge}${cap}</div></div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="btn ok sm" onclick="setRes('${r.id}','confirmed')">Потвърди</button>
        <button class="btn no sm" onclick="setRes('${r.id}','declined')">Откажи</button>
        <button class="btn ghost sm" onclick="delRes('${r.id}')">Изтрий</button></div>
    </div></div>`;}).join('');
  if(!rows)rows=`<p class="empty">Няма заявки в този раздел.</p>`;
  return `<h2>Резервации</h2>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px;">${chips}</div>
    ${head}${rows}`;
}
function toast(msg,bad){
  let t=document.getElementById('acac-toast');
  if(!t){t=document.createElement('div');t.id='acac-toast';
    t.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);padding:12px 20px;border-radius:14px;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .25s;max-width:90%;text-align:center;color:#fffdf4;';
    document.body.appendChild(t);}
  t.style.background=bad?'#b05b3f':'#3f6b5e';
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._h);t._h=setTimeout(()=>{t.style.opacity='0';},3500);
}
async function delRes(id){
  if(!confirm('Да изтрия ли тази резервация? Действието е необратимо.'))return;
  const r=await DB.deleteReservation(id);
  if(r&&r.error){alert('Грешка при изтриване: '+r.error.message);return;}
  toast('Резервацията е изтрита');
  await refresh();render();
}
async function setRes(id,st){
  const r=await DB.setReservationStatus(id,st);
  if(r&&r.error){alert('Грешка при промяна на статуса: '+r.error.message);return;}
  if(st==='confirmed'||st==='declined'){
    toast('Изпращане на имейл до члена…');
    const n=await DB.notifyReservation(id,st);
    if(n&&n.error){toast('Статусът е сменен, но имейлът не тръгна: '+n.error.message,true);}
    else{toast(st==='confirmed'?'Резервацията е одобрена · имейлът до члена е изпратен ✓':'Резервацията е отказана · имейлът до члена е изпратен ✓');}
  }
  await refresh();render();
}

function statsView(){
  const today=new Date().toISOString().slice(0,10);
  const evEnd=e=>e.end_date||e.date||'';
  const upcoming=EVENTS.filter(e=>!evEnd(e)||evEnd(e)>=today);
  const past=EVENTS.filter(e=>evEnd(e)&&evEnd(e)<today);
  const tickets=RES.filter(r=>r.event_id);
  const tables=RES.filter(r=>r.table_event_id);
  const cnt=s=>RES.filter(r=>(r.status||'requested')===s).length;
  const confirmed=cnt('confirmed'),requested=cnt('requested'),declined=cnt('declined');
  // запълване на предстоящи събития с капацитет
  const fill=upcoming.filter(e=>e.capacity).map(e=>{
    const t=seatsTaken(e.id);const pct=Math.min(100,Math.round(t/e.capacity*100));
    const col=pct>=90?'#b5532f':(pct>=60?'#bf8a2e':'#4f7a43');
    return `<div style="margin-top:10px;"><div style="display:flex;justify-content:space-between;font-size:13px;"><span>${esc(e.title)}</span><span class="muted">${t}/${e.capacity}</span></div>
      <div style="height:8px;border-radius:5px;background:var(--surface2);margin-top:4px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};"></div></div></div>`;
  }).join('')||`<p class="muted" style="margin-top:8px;">Няма предстоящи събития с капацитет.</p>`;
  // популярни формати по брой резервации
  const byFmt={};
  RES.forEach(r=>{const f=r.fmt||'—';byFmt[f]=(byFmt[f]||0)+1;});
  const fmtRows=Object.entries(byFmt).sort((a,b)=>b[1]-a[1]).map(([f,n])=>`<tr><td>${esc(f)}</td><td style="text-align:right;">${n}</td></tr>`).join('')||'<tr><td class="muted">—</td><td></td></tr>';
  const stat=(label,val,col)=>`<div class="card" style="flex:1;min-width:120px;text-align:center;padding:16px;">
    <div class="countup" data-to="${val}" style="font-size:26px;color:${col||'var(--text)'};">0</div><div class="muted" style="font-size:12px;margin-top:2px;">${label}</div></div>`;
  return `<h2>Статистика</h2>
    <div style="display:flex;flex-wrap:wrap;gap:10px;">
      ${stat('Събития общо',EVENTS.length)}
      ${stat('Предстоящи',upcoming.length,'#4f7a43')}
      ${stat('Изминали',past.length,'var(--muted)')}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;">
      ${stat('Резервации',RES.length)}
      ${stat('Чакащи',requested,'#bf8a2e')}
      ${stat('Одобрени',confirmed,'#4f7a43')}
      ${stat('Откази',declined,'#b5532f')}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;">
      ${stat('Билети за събития',tickets.length)}
      ${stat('Маси след събитие',tables.length)}
    </div>
    <h3 style="margin-top:22px;">Запълване на предстоящи събития</h3>
    <div class="card">${fill}</div>
    <h3 style="margin-top:18px;">Най-търсени места/формати</h3>
    <div class="card"><table style="width:100%;border-collapse:collapse;">${fmtRows}</table></div>`;
}
function membersView(){
  let rows=MEMBERS.map(m=>{
    const cnt=EVENTS.filter(e=>e.aud==='all'||(Array.isArray(e.aud)&&e.aud.includes(m.id))).length;
    return `<tr><td>${m.t}</td><td>${cnt} / ${EVENTS.length}</td></tr>`;}).join('');
  let memOpts=MEMBERS.map(m=>`<option value="${m.id}">${m.t}</option>`).join('');
  const inviteCard=DB.live
    ? `<div class="card" style="border-color:var(--gold-soft);">
        <h3>Покани член</h3>
        <p class="muted" style="margin:6px 0 8px;">Изпраща имейл с покана; човекът сам си задава парола от линка.</p>
        <label>Имейл</label><input id="iv_email" type="email" placeholder="name@example.com"/>
        <div class="row2"><div><label>Име (по желание)</label><input id="iv_user"/></div>
          <div><label>Категория</label><select id="iv_mem">${memOpts}</select></div></div>
        <button class="btn" style="margin-top:14px;" onclick="doInvite()">Изпрати покана</button></div>`
    : `<div class="card"><h3>Покани член</h3><p class="muted" style="margin-top:6px;">Налично след свързване на Supabase и качване на функцията <code>invite-member</code> (виж ADMIN-README).</p></div>`;
  const resetCard=DB.live
    ? `<div class="card">
        <h3>Нова парола на член</h3>
        <p class="muted" style="margin:6px 0 8px;">Ако член е забравил паролата си — генерира нова временна, която му давате.</p>
        <label>Имейл на члена</label><input id="rp_email" type="email" placeholder="name@example.com"/>
        <button class="btn ghost" style="margin-top:10px;" onclick="doReset()">Генерирай нова парола</button></div>`
    : '';
  return `<h2>Членове и видимост</h2>
    ${inviteCard}
    ${resetCard}
    <div class="card"><p class="muted" style="margin-bottom:12px;">Колко от текущите събития вижда всяка категория според зададената видимост.</p>
    <table><thead><tr><th>Категория</th><th>Вижда събития</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card"><p class="muted">Категорията/ролята на всеки член се сменя и в Supabase → Table Editor → profiles.</p></div>`;
}
async function doReset(){
  const email=document.getElementById('rp_email').value.trim();
  if(!email){alert('Въведи имейл');return;}
  const {error,password}=await DB.adminResetPassword(email);
  if(error){alert('Грешка: '+error.message);return;}
  alert('Нова временна парола за '+email+':\n\n'+password+'\n\nДайте я на члена — после може да я смени от профила си.');
  document.getElementById('rp_email').value='';
}
async function doInvite(){
  const email=document.getElementById('iv_email').value.trim();
  if(!email){alert('Въведи имейл');return;}
  const username=document.getElementById('iv_user').value.trim();
  const membership=document.getElementById('iv_mem').value;
  const {error,password}=await DB.inviteMember(email,username,membership);
  if(error){alert('Грешка: '+error.message);return;}
  alert(password
    ?('Акаунтът е създаден!\n\nИмейл: '+email+'\nВременна парола: '+password)
    :('Поканата е изпратена на '+email+'.\nЧовекът ще получи имейл с линк, от който сам си задава парола и влиза.'));
  document.getElementById('iv_email').value='';document.getElementById('iv_user').value='';
}

function gate(){
  const live=DB.live;
  root.innerHTML=`<div class="gate">
    <div class="ring"><span>AC²</span></div>
    <h1>Админ панел</h1>
    <div class="f">
      <input id="a_user" placeholder="${live?'Имейл':'Потребителско име'}" onkeydown="if(event.key==='Enter')doLogin()"/>
      <input id="a_pass" type="password" placeholder="Парола" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="btn" style="width:100%;" onclick="doLogin()">Вход</button>
      <div class="muted" style="margin-top:12px;">${live?'Вход с админ акаунт (role=admin)':'Демо достъп: <span style="color:var(--gold);">admin / admin</span>'}</div>
    </div></div>`;
}
async function doLogin(){
  const u=document.getElementById('a_user').value;
  const p=document.getElementById('a_pass').value;
  if(DB.live){
    const {error}=await DB.signIn(u,p);
    if(error){alert('Грешен вход: '+error.message);return;}
    const me=await DB.getUser();
    if(!me||me.role!=='admin'){alert('Този акаунт няма админ права.');await DB.signOut();return;}
    admin=true;await refresh();render();
  }else{
    if((u||'').trim().toLowerCase()!=='admin'||(p||'').trim()!=='admin'){alert('Грешно име или парола');return;}
    admin=true;localStorage.setItem('acac_admin','1');await refresh();render();
  }
}
async function logout(){
  if(DB.live)await DB.signOut(); else localStorage.removeItem('acac_admin');
  admin=false;render();
}
boot();
